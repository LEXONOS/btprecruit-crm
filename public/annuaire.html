<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Annuaire</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#09090a;--s1:#111112;--s2:#18181a;--s3:#202022;--s4:#27272a;
  --bd:#2a2a2e;--bd2:#38383d;--bd3:#48484f;
  --tx:#f0f0ec;--mu:#8c8c84;--mu2:#4a4a44;
  --ac:#c8e040;--ac-dim:rgba(200,224,64,.06);--ac-border:rgba(200,224,64,.2);
  --green:#2dd4a0;--green-dim:rgba(45,212,160,.06);--green-border:rgba(45,212,160,.2);
  --blue:#4a84e2;--blue-dim:rgba(74,132,226,.06);--blue-border:rgba(74,132,226,.2);
  --orange:#e89830;--orange-dim:rgba(232,152,48,.06);
  --purple:#9048e0;--purple-dim:rgba(144,72,224,.06);
  --red:#f04b4b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh}

.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(74,132,226,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(74,132,226,.012) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

.topbar{position:sticky;top:0;z-index:100;background:rgba(9,9,10,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 32px;height:52px;display:flex;align-items:center;gap:14px}
.tb-back{padding:6px 12px;font-size:11px;background:var(--s2);border:1px solid var(--bd);color:var(--mu);border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;transition:.15s;text-decoration:none;display:flex;align-items:center;gap:6px}
.tb-back:hover{border-color:var(--bd2);color:var(--tx);background:var(--s3)}
.tb-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.4px}
.tb-logo span{color:var(--blue)}
.tb-sep{color:var(--mu2)}
.tb-page{font-size:12px;color:var(--mu)}
.tb-spacer{flex:1}
.tb-search{padding:7px 14px;font-size:11px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;width:260px;font-family:'DM Mono',monospace;outline:none;transition:.15s}
.tb-search:focus{border-color:var(--blue-border);background:var(--s1)}

.main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:32px 32px 60px}
.page-header{margin-bottom:28px}
.page-tag{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.page-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue)}
.page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.8px;margin-bottom:6px}
.page-sub{font-size:11px;color:var(--mu);line-height:1.6}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--bd);padding-bottom:0}
.tab{padding:10px 18px;font-size:11px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;font-family:'DM Mono',monospace;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Contact cards */
.contacts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.contact-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;transition:.2s;cursor:default}
.contact-card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.cc-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.cc-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0}
.cc-info{flex:1}
.cc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px}
.cc-role{font-size:10px;color:var(--mu);margin-top:2px}
.cc-badge{font-size:8px;padding:3px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.1em}
.cc-details{display:flex;flex-direction:column;gap:6px}
.cc-detail{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mu)}
.cc-detail span:first-child{font-size:13px;width:18px;text-align:center}
.cc-actions{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd);display:flex;gap:8px}
.cc-btn{padding:6px 12px;font-size:10px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);cursor:pointer;font-family:'DM Mono',monospace;transition:.15s;text-decoration:none}
.cc-btn:hover{border-color:var(--bd2);color:var(--tx);background:var(--s3)}
.cc-btn.primary{background:var(--blue-dim);border-color:var(--blue-border);color:var(--blue)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--mu2)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-text{font-size:12px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.contacts-grid{animation:none}

@media(max-width:700px){
  .contacts-grid{grid-template-columns:1fr}
  .main{padding:20px 16px 40px}
  .topbar{padding:0 16px}
  .tb-search{width:160px}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

/* ═══ ANNUAIRE — PREMIUM ANIMATIONS ═══ */

.topbar{animation:topIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes topIn{from{transform:translateY(-52px);opacity:0}to{transform:none;opacity:1}}

.page-header{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .05s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* Grid drift */
.bg-grid{animation:gridDrift 60s linear infinite}
@keyframes gridDrift{to{background-position:60px 60px,60px 60px}}

/* Contact cards stagger entrance */
.contact-card{opacity:0;transform:translateY(16px) scale(.97);transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1),border-color .2s,box-shadow .2s}
.contact-card.visible{opacity:1;transform:none}

/* Contact card hover — 3D tilt */
.contact-card:hover{transform:translateY(-3px) perspective(400px) rotateX(1deg);box-shadow:0 12px 36px rgba(0,0,0,.45),0 0 0 1px var(--bd2)}

/* Avatar glow on hover */
.cc-avatar{transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.contact-card:hover .cc-avatar{transform:scale(1.1);box-shadow:0 0 18px currentColor}

/* Badge pulse */
.cc-badge{transition:opacity .15s}
.contact-card:hover .cc-badge{filter:brightness(1.2)}

/* Button hover */
.cc-btn{transition:all .15s cubic-bezier(.16,1,.3,1)}
.cc-btn:hover{transform:translateY(-1px)}
.cc-btn.primary:hover{box-shadow:0 4px 16px rgba(74,132,226,.25)}

/* Tab active indicator slide */
.tabs{position:relative}
.tab{transition:color .18s;position:relative}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--blue);transform:scaleX(0);transition:transform .2s cubic-bezier(.34,1.56,.64,1);transform-origin:center}
.tab.active::after{transform:scaleX(1)}
.tab.active{border-bottom-color:transparent !important}

/* Search focus glow */
.tb-search{transition:border-color .2s,box-shadow .2s,width .25s}
.tb-search:focus{box-shadow:0 0 0 3px rgba(74,132,226,.1),0 2px 12px rgba(0,0,0,.2);width:300px}

/* Cursor glow */
.cursor-ann{position:fixed;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(74,132,226,.025) 0%,transparent 60%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .2s linear,top .2s linear}

/* Ripple keyframe (used by JS) */
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a href="/hub" class="tb-back">← Hub</a>
  <div class="tb-logo">Nova<span>lem</span></div>
  <div class="tb-sep">/</div>
  <div class="tb-page">Annuaire</div>
  <div class="tb-spacer"></div>
  <input type="text" class="tb-search" id="search" placeholder="Rechercher un contact..." oninput="filterContacts()">
</div>

<div class="main">
  <div class="page-header">
    <div class="page-tag">Annuaire</div>
    <div class="page-title">Contacts & Equipe</div>
    <div class="page-sub">Repertoire centralise de toute l'equipe Novalem, partenaires et contacts utiles.</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('team')">Equipe Novalem</button>
    <button class="tab" onclick="switchTab('partners')">Partenaires</button>
    <button class="tab" onclick="switchTab('useful')">Contacts utiles</button>
  </div>

  <div class="contacts-grid" id="contacts-grid"></div>
</div>

<script>
// Auth check
const raw = sessionStorage.getItem('novalem_user');
if (!raw) window.location.href = '/';
try { const u = JSON.parse(raw); if (!u||!u.ts||(Date.now()-u.ts)>8*3600000){sessionStorage.removeItem('novalem_user');window.location.href='/';}} catch(e){window.location.href='/';}

const CONTACTS = {
  team: [
    {name:'Louis Renault',role:'Fondateur & Directeur',initials:'LR',color:'#c8e040',phone:'—',email:'louis@novalem-recrutement.fr',location:'Paris / Ile-de-France',badge:'Admin',badgeColor:'var(--ac)'},
    {name:'Corentin',role:'Commercial / Scout BTP',initials:'C',color:'#2dd4a0',phone:'—',email:'corentin@novalem-recrutement.fr',location:'Ile-de-France',badge:'Scout',badgeColor:'var(--green)'},
  ],
  partners: [
    {name:'France Travail',role:'Partenaire institutionnel',initials:'FT',color:'#4a84e2',phone:'3949',email:'—',location:'National',badge:'Institutionnel',badgeColor:'var(--blue)'},
    {name:'Supabase',role:'Infrastructure & Base de donnees',initials:'SB',color:'#3ECF8E',phone:'—',email:'support@supabase.io',location:'Cloud',badge:'Tech',badgeColor:'var(--green)'},
    {name:'Vercel',role:'Hebergement & Deploiement',initials:'V',color:'#fff',phone:'—',email:'support@vercel.com',location:'Cloud',badge:'Tech',badgeColor:'var(--green)'},
    {name:'Anthropic',role:'Intelligence Artificielle (Claude)',initials:'A',color:'#d4a574',phone:'—',email:'—',location:'Cloud',badge:'Tech / IA',badgeColor:'var(--orange)'},
  ],
  useful: [
    {name:'URSSAF',role:'Cotisations sociales',initials:'U',color:'#e89830',phone:'3957',email:'—',location:'National',badge:'Admin',badgeColor:'var(--orange)'},
    {name:'OPPBTP',role:'Securite BTP',initials:'OP',color:'#f04b4b',phone:'01 46 09 27 00',email:'—',location:'National',badge:'Securite',badgeColor:'var(--red)'},
    {name:'FFB',role:'Federation Francaise du Batiment',initials:'FFB',color:'#4a84e2',phone:'01 40 69 51 00',email:'—',location:'Paris',badge:'Federation',badgeColor:'var(--blue)'},
    {name:'CAPEB',role:'Artisanat du Batiment',initials:'CA',color:'#9048e0',phone:'01 53 60 50 00',email:'—',location:'Paris',badge:'Federation',badgeColor:'var(--purple)'},
  ]
};

let currentTab = 'team';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderContacts();
}

function renderContacts() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = CONTACTS[currentTab].filter(c =>
    c.name.toLowerCase().includes(search) ||
    c.role.toLowerCase().includes(search)
  );

  if (!list.length) {
    document.getElementById('contacts-grid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">&#128269;</div><div class="empty-text">Aucun contact trouve</div></div>`;
    return;
  }

  document.getElementById('contacts-grid').innerHTML = list.map(c => `
    <div class="contact-card">
      <div class="cc-top">
        <div class="cc-avatar" style="background:${c.color}22;color:${c.color}">${c.initials}</div>
        <div class="cc-info">
          <div class="cc-name">${c.name}</div>
          <div class="cc-role">${c.role}</div>
        </div>
        <span class="cc-badge" style="background:${c.badgeColor}18;color:${c.badgeColor}">${c.badge}</span>
      </div>
      <div class="cc-details">
        <div class="cc-detail"><span>&#128222;</span>${c.phone}</div>
        <div class="cc-detail"><span>&#9993;</span>${c.email}</div>
        <div class="cc-detail"><span>&#128205;</span>${c.location}</div>
      </div>
      ${c.email !== '—' ? `<div class="cc-actions">
        <a href="mailto:${c.email}" class="cc-btn primary">Envoyer un email</a>
        ${c.phone !== '—' ? `<a href="tel:${c.phone}" class="cc-btn">Appeler</a>` : ''}
      </div>` : ''}
    </div>
  `).join('');
}

function filterContacts() { renderContacts(); }
renderContacts();

/* === ANNUAIRE PREMIUM ANIMATIONS JS === */
(function(){
  /* Cursor glow */
  const cg = document.createElement('div');
  cg.className = 'cursor-ann';
  document.body.appendChild(cg);
  document.addEventListener('mousemove', e => {
    cg.style.left = e.clientX + 'px';
    cg.style.top = e.clientY + 'px';
  });

  /* Stagger contact cards on render */
  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05 });

  function observeCards() {
    document.querySelectorAll('.contact-card').forEach((card, i) => {
      card.style.transitionDelay = `${i * 60}ms`;
      io.observe(card);
    });
  }

  /* Watch for DOM updates when switching tabs */
  new MutationObserver(observeCards).observe(
    document.getElementById('contacts-grid'), { childList: true }
  );
  observeCards();

  /* Tab click ripple */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('pointerdown', function(e) {
      const ripple = document.createElement('span');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      Object.assign(ripple.style, {
        position:'absolute', borderRadius:'50%',
        width: size + 'px', height: size + 'px',
        left: (e.clientX - rect.left - size/2) + 'px',
        top: (e.clientY - rect.top - size/2) + 'px',
        background: 'rgba(74,132,226,.12)',
        transform: 'scale(0)',
        animation: 'rippleAnim .6s ease-out forwards',
        pointerEvents: 'none',
      });
      this.style.position = 'relative';
      this.style.overflow = 'hidden';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);
    });
  });
})();
</script>
</body>
</html>
