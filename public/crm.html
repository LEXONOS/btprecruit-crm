/* ═══════════════════════════════════════════════════════
 NOVALEM CRM — Design System
 Dark premium · Minimal · Motion
════════════════════════════════════════════════════════ */
:root{
 /* Surface palette */
 --bg:#09090a;--s1:#111112;--s2:#18181a;--s3:#202022;--s4:#27272a;
 --bd:#2a2a2e;--bd2:#38383d;--bd3:#48484f;
 /* Text */
 --tx:#f0f0ec;--mu:#8c8c84;--mu2:#4a4a44;--mu3:#2e2e2a;
 /* Accent — Novalem gold-lime */
 --ac:#c8e040;--ac-dim:rgba(200,224,64,.08);--ac-border:rgba(200,224,64,.2);
 /* Semantic */
 --green:#2dd4a0;--green-dim:rgba(45,212,160,.08);--green-border:rgba(45,212,160,.2);
 --red:#f04b4b;--red-dim:rgba(240,75,75,.08);--red-border:rgba(240,75,75,.2);
 --orange:#e89830;--orange-dim:rgba(232,152,48,.08);--orange-border:rgba(232,152,48,.2);
 --blue:#4a84e2;--blue-dim:rgba(74,132,226,.08);--blue-border:rgba(74,132,226,.2);
 --purple:#9048e0;--purple-dim:rgba(144,72,224,.08);--purple-border:rgba(144,72,224,.2);
 /* Shadows */
 --sh:0 1px 2px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.25);
 --sh2:0 4px 16px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.3);
 --sh3:0 8px 32px rgba(0,0,0,.6),0 2px 6px rgba(0,0,0,.4);
 /* Radius */
 --r:5px;--r2:8px;--r3:12px;--r4:20px;
 /* Legacy compat */
 --ac2:var(--green);--ac3:var(--red);--ac4:var(--orange);--ac5:var(--blue);--ac6:var(--purple);
 --ac2:var(--green);--green:var(--green);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:grid;grid-template-columns:200px 1fr}

/* ── SCROLLBAR ─────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--bd3)}

/* ── SIDEBAR ───────────────────────────────────────── */
#sb{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.logo-t{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.4px;color:var(--tx)}
.logo-t b{color:var(--ac)}
.logo-s{font-size:9px;color:var(--mu2);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.nav-sec{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--mu2);padding:10px 8px 4px;margin-top:6px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--mu);border:1px solid transparent;font-size:11px;transition:all .15s;user-select:none}
.ni:hover{background:var(--s2);color:var(--tx)}
.ni.act{background:rgba(200,224,64,.07);color:var(--ac);border-color:var(--ac-border)}
.ni-ico{font-size:12px;width:16px;text-align:center;flex-shrink:0;opacity:.7}
.ni.act .ni-ico{opacity:1}
.nbadge{margin-left:auto;font-size:9px;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center;font-weight:700}
.nb-red{background:rgba(240,75,75,.18);color:var(--red)}
.nb-yel{background:rgba(232,152,48,.18);color:var(--orange)}
.nb-grn{background:rgba(45,212,160,.15);color:var(--green)}
.nb-blu{background:rgba(74,132,226,.15);color:var(--blue)}
.nb-mu{background:var(--s3);color:var(--mu)}
.nav-footer{padding:12px 14px;border-top:1px solid var(--bd);font-size:10px;color:var(--mu2)}
.nav-footer strong{display:block;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;color:var(--green);margin-bottom:1px;letter-spacing:-.2px}
.nav-settings{padding:8px 12px 10px;font-size:10px;color:var(--mu2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;border-radius:0}
.nav-settings:hover{color:var(--mu)}

/* ── MAIN ──────────────────────────────────────────── */
#main{display:grid;grid-template-rows:48px 1fr;height:100vh;overflow:hidden;min-width:0}
.topbar{border-bottom:1px solid var(--bd);padding:0 22px;display:flex;align-items:center;gap:12px;background:var(--s1);flex-shrink:0}
.tbt{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex:1;letter-spacing:-.2px}
.tba{display:flex;gap:6px;align-items:center}
#content{overflow:auto;padding:20px 22px;background:var(--bg)}
.view{display:none}.view.active{display:block}

/* ── BUTTONS ───────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px;border:none;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;line-height:1;white-space:nowrap;font-weight:500}
/* Primary */
.bp{background:var(--ac);color:#0a0a08;font-weight:700}
.bp:hover{background:#d8ef50;transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,224,64,.25)}
.bp:active{transform:translateY(0);box-shadow:none}
/* Ghost */
.bg{background:transparent;color:var(--mu);border:1px solid var(--bd2)}
.bg:hover{color:var(--tx);background:var(--s3);border-color:var(--bd3)}
/* Danger */
.bd_{background:transparent;color:var(--red);border:1px solid var(--red-border)}
.bd_:hover{background:var(--red-dim)}
/* Info */
.bi{background:transparent;color:var(--blue);border:1px solid var(--blue-border)}
.bi:hover{background:var(--blue-dim)}
/* Success */
.bs{background:transparent;color:var(--green);border:1px solid var(--green-border)}
.bs:hover{background:var(--green-dim)}
.bsm{padding:4px 10px;font-size:10px}
.bxs{padding:2px 7px;font-size:10px}
.btn-full{width:100%}

/* Apple-style ghost large */
.btn-apple{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:var(--r4);padding:13px 28px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);font-family:'DM Mono',monospace;color:var(--tx);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-apple:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16);transform:translateY(-1px)}
.btn-apple:active{transform:translateY(0);background:rgba(255,255,255,.06)}
.btn-apple.primary{background:var(--ac);color:#0a0a08;border-color:transparent;box-shadow:0 4px 20px rgba(200,224,64,.3);font-weight:700}
.btn-apple.primary:hover{background:#d8ef50;box-shadow:0 6px 28px rgba(200,224,64,.4);transform:translateY(-2px)}
.btn-apple.danger{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.btn-apple.danger:hover{background:rgba(240,75,75,.14);transform:translateY(-1px)}
.btn-apple.ghost{color:var(--mu);background:transparent;border-color:transparent}
.btn-apple.ghost:hover{color:var(--mu2);background:transparent;transform:none}

/* ── INPUTS ────────────────────────────────────────── */
input,select,textarea{background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:7px 10px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:100%;transition:all .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac-dim)}
input::placeholder,textarea::placeholder{color:var(--mu2)}
textarea{min-height:64px;resize:vertical;line-height:1.6}
select option{background:var(--s2)}
.lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:4px;font-weight:500}
.fgrp{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.ff{grid-column:1/-1}

/* ── PANEL ─────────────────────────────────────────── */
#panel{position:fixed;top:0;right:0;width:520px;height:100vh;background:var(--s1);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:40;display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
.ph{padding:14px 18px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;gap:10px;align-items:flex-start}
.ph-l{flex:1;min-width:0}
.ph-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;line-height:1.2;letter-spacing:-.2px}
.ph-sub{font-size:11px;color:var(--mu);display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.ph-x{cursor:pointer;color:var(--mu);font-size:16px;padding:4px;flex-shrink:0;line-height:1;margin-top:1px;transition:.15s;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.ph-x:hover{color:var(--tx);background:var(--s3)}
.ptabs{display:flex;border-bottom:1px solid var(--bd);padding:0 18px;flex-shrink:0;overflow-x:auto;gap:2px}
.ptab{padding:9px 10px;font-size:10px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.ptab.act{color:var(--ac);border-bottom-color:var(--ac)}
.ptab:hover:not(.act){color:var(--tx)}
.pb{flex:1;overflow-y:auto;padding:14px 18px}
.pa{padding:10px 18px;border-top:1px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}

/* ── MODAL ─────────────────────────────────────────── */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:80;display:none;align-items:center;justify-content:center;padding:16px}
#mo.open{display:flex}
#md{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r3);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3)}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--s1);z-index:1;border-radius:var(--r3) var(--r3) 0 0}
.mh-t{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px}
.mh-x{cursor:pointer;color:var(--mu);font-size:16px;padding:4px;transition:.15s;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mh-x:hover{color:var(--tx);background:var(--s3)}
.mb{padding:16px 20px}
.mf{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--s1);border-radius:0 0 var(--r3) var(--r3)}

/* ── CONFIRM DIALOG (Apple-inspired) ─────────────────── */
.confirm-dialog{padding:28px 24px;text-align:center}
.confirm-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;font-family:'Syne',sans-serif;font-weight:800}
.confirm-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:8px;letter-spacing:-.3px}
.confirm-desc{font-size:12px;color:var(--mu);line-height:1.7;margin-bottom:24px}
.confirm-actions{display:flex;flex-direction:column;gap:8px}

/* ── KANBAN ─────────────────────────────────────────── */
.kb{display:grid;gap:8px;overflow-x:auto;padding-bottom:6px;align-items:start}
.kbc{min-width:0}
.kbh{padding:7px 10px;border-radius:var(--r);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.kbh-t{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.kbh-n{font-size:10px;opacity:.5}
.kbcards{display:flex;flex-direction:column;gap:5px;min-height:40px}

/* ── CARDS ──────────────────────────────────────────── */
.cc{background:var(--s2);border:1px solid var(--bd);border-left:2px solid var(--bd2);border-radius:var(--r);padding:10px 11px;cursor:pointer;transition:all .18s;position:relative}
.cc:hover{background:var(--s3);border-color:var(--bd3);border-left-color:var(--ac);transform:translateX(2px)}
.cc.pep{border-left-color:var(--orange)}
.cc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:2px;padding-right:16px}
.cc-role{font-size:10px;color:var(--mu);margin-bottom:4px}
.cc-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px}
.cc-nxt{width:100%;margin-top:6px;font-size:10px;padding:4px 8px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--r);color:var(--green);line-height:1.4}

.prcard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 13px;cursor:pointer;transition:all .18s}
.prcard:hover{background:var(--s3);border-color:var(--bd3);transform:translateY(-2px);box-shadow:var(--sh2)}
.prcard-n{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:4px}
.prcard-m{font-size:10px;color:var(--mu);line-height:1.6}

.nc{background:var(--s2);border:1px solid var(--bd);border-top:2px solid var(--bd);border-radius:var(--r2);padding:12px;cursor:pointer;transition:all .18s}
.nc:hover{background:var(--s3);transform:translateY(-2px);box-shadow:var(--sh)}
.nc.uh{border-top-color:var(--red)}
.nc.um{border-top-color:var(--orange)}
.nc.ul{border-top-color:var(--mu2)}
.nc-co{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.nc-t{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:5px}
.nc-m{font-size:10px;color:var(--mu);line-height:1.6}
.nc-ft{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}

/* ── TAGS ───────────────────────────────────────────── */
.tag{font-size:10px;padding:2px 7px;border-radius:99px;display:inline-block;white-space:nowrap;font-weight:500}
.tgo{background:rgba(80,180,60,.1);color:#6ecc48;border:1px solid rgba(80,180,60,.2)}
.tso{background:rgba(40,140,220,.1);color:#4aa8e0;border:1px solid rgba(40,140,220,.2)}
.tbe{background:rgba(120,60,220,.1);color:#9060e0;border:1px solid rgba(120,60,220,.2)}
.tvrd{background:rgba(200,100,40,.1);color:#e08840;border:1px solid rgba(200,100,40,.2)}
.thse{background:rgba(200,40,180,.1);color:#e040c0;border:1px solid rgba(200,40,180,.2)}
.tmgmt{background:rgba(200,160,0,.1);color:#d4a800;border:1px solid rgba(200,160,0,.2)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500;white-space:nowrap}
.pnew{background:rgba(100,100,160,.15);color:#9898c8}
.ppre{background:var(--orange-dim);color:var(--orange)}
.pdos{background:var(--blue-dim);color:var(--blue)}
.pvis{background:var(--purple-dim);color:var(--purple)}
.ppres{background:var(--green-dim);color:var(--green)}
.pplac{background:var(--ac-dim);color:var(--ac)}
.pko{background:var(--red-dim);color:var(--red)}
.ptoc{background:rgba(100,100,100,.12);color:var(--mu)}
.pcal{background:var(--orange-dim);color:var(--orange)}
.pnrp{background:rgba(100,100,100,.1);color:var(--mu2)}
.pbno{background:rgba(100,50,0,.12);color:#a06030}
.pnee{background:var(--blue-dim);color:var(--blue)}
.pcli{background:var(--purple-dim);color:var(--purple)}
.pcsnt{background:var(--ac-dim);color:var(--ac)}
.pwin{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.pent{background:rgba(100,180,255,.12);color:#60b0ff}

/* ── DETAIL ROWS ────────────────────────────────────── */
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bd);gap:8px}
.dr:last-child{border-bottom:none}
.drk{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;min-width:100px;padding-top:1px}
.drv{font-size:11px;text-align:right;word-break:break-word;line-height:1.5}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--mu2);margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}

/* ── CALLBOX ─────────────────────────────────────────── */
.callbox{background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--r2);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.callbox-ph{font-family:'DM Mono',monospace;font-size:17px;font-weight:600;color:var(--green);flex:1;letter-spacing:.05em}

/* ── CHECKLIST ──────────────────────────────────────── */
.chl{display:flex;flex-direction:column;gap:2px}
.chi{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:.12s}
.chi:hover{background:var(--s3)}
.chi input[type=checkbox]{width:12px;height:12px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.chi.done{color:var(--mu);text-decoration:line-through}

/* ── AGENDA ─────────────────────────────────────────── */
.ag-view-tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:3px;width:fit-content}
.ag-vt{padding:5px 14px;border-radius:3px;font-size:11px;cursor:pointer;color:var(--mu);transition:.15s;user-select:none}
.ag-vt.act{background:var(--s1);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.3)}

.wk-grid{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.wk-hd{background:var(--s1);text-align:center;padding:7px 2px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700}
.wk-hd.today-col{color:var(--blue)}
.wk-time{background:var(--s1);padding:4px 6px;font-size:9px;color:var(--mu2);text-align:right;border-top:1px solid var(--bd)}
.wk-cell{background:var(--s2);min-height:36px;padding:2px;border-top:1px solid var(--bd);transition:.1s}
.wk-cell.today-col{background:rgba(74,132,226,.04)}
.wk-cell:hover{background:rgba(200,224,64,.03)}
.wk-evt{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.12s;font-weight:500}
.wk-evt:hover{filter:brightness(1.15);transform:translateX(1px)}
.wk-evt.call{background:rgba(232,152,48,.18);color:var(--orange);border-left:2px solid var(--orange)}
.wk-evt.visio{background:rgba(74,132,226,.18);color:var(--blue);border-left:2px solid var(--blue)}
.wk-evt.task{background:rgba(45,212,160,.13);color:var(--green);border-left:2px solid var(--green)}
.wk-evt.relance{background:rgba(144,72,224,.13);color:var(--purple);border-left:2px solid var(--purple)}
.wk-evt.done{opacity:.4}

.mo-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mo-dh{text-align:center;font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.09em;padding:5px 0}
.mo-day{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);min-height:70px;padding:5px;transition:all .15s;cursor:pointer}
.mo-day:hover{background:var(--s3);border-color:var(--bd3)}
.mo-day.today{border-color:var(--blue);background:rgba(74,132,226,.04)}
.mo-day.other-month{opacity:.3}.mo-day.past{opacity:.5}
.mo-dn{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:3px}
.mo-dn .dn-num{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.mo-day.today .dn-num{background:var(--blue);color:#fff}
.mo-evt{font-size:9px;padding:1px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.mo-more{font-size:9px;color:var(--mu2);padding-left:3px;cursor:pointer}
.mo-more:hover{color:var(--blue)}

.day-grid{display:grid;grid-template-columns:48px 1fr}
.day-time{font-size:9px;color:var(--mu2);padding:4px 8px 0 0;text-align:right;border-top:1px solid var(--bd);min-height:44px}
.day-col{border-top:1px solid var(--bd);min-height:44px;padding:3px;transition:.12s}
.day-col.now-hour{background:rgba(74,132,226,.04)}
.day-empty{text-align:center;padding:50px 20px;color:var(--mu2);font-size:12px;line-height:2}
.day-evt{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:var(--r);margin-bottom:3px;cursor:pointer;transition:all .15s}
.day-evt:hover{filter:brightness(1.1);transform:translateX(2px)}
.day-evt.call{background:rgba(232,152,48,.12);border-left:3px solid var(--orange)}
.day-evt.visio{background:rgba(74,132,226,.12);border-left:3px solid var(--blue)}
.day-evt.task{background:rgba(45,212,160,.09);border-left:3px solid var(--green)}
.day-evt.relance{background:rgba(144,72,224,.09);border-left:3px solid var(--purple)}
.day-evt.done{opacity:.4}
.day-evt-t{font-size:11px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-evt-time{font-size:10px;color:var(--mu);flex-shrink:0}

/* ── DASHBOARD ──────────────────────────────────────── */
.dg{display:grid;grid-template-columns:1fr 300px;gap:18px}
.dkpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:18px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;transition:all .18s;cursor:default}
.kpi:hover{background:var(--s3);border-color:var(--bd3);transform:translateY(-2px);box-shadow:var(--sh)}
.kpi-v{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1;letter-spacing:-.5px}
.kpi-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.kpi-s{font-size:10px;color:var(--mu2);margin-top:3px}
.dsec{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;margin-bottom:8px;letter-spacing:-.1px}
.aitem{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:4px;cursor:pointer;transition:all .15s;font-size:11px}
.aitem:hover{border-color:var(--bd3);background:var(--s3);transform:translateX(2px)}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TOOLBAR / TABLE ────────────────────────────────── */
.tb{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:150px;max-width:240px}
.srch::before{content:'⌕';position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--mu2);font-size:13px;pointer-events:none}
.srch input{padding-left:26px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);padding:6px 10px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--bd);font-size:11px;vertical-align:middle}
.tbl tr:hover td{background:var(--s2);cursor:pointer}
.tbl .acol{display:flex;gap:4px;white-space:nowrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── MISC ───────────────────────────────────────────── */
.sep{border:none;border-top:1px solid var(--bd);margin:10px 0}
.notebox{background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:11px;color:var(--mu);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.refcard{background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:6px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.flex{display:flex}.fac{align-items:center}.fjb{justify-content:space-between}.fw{flex-wrap:wrap}.fg5{gap:5px}.fg6{gap:6px}
.mu_{color:var(--mu)}.mu2{color:var(--mu2)}.ac{color:var(--ac)}.ac2{color:var(--green)}.ac3{color:var(--red)}.ac4{color:var(--orange)}.ac5{color:var(--blue)}
.fs9{font-size:9px}.fs10{font-size:10px}.fs11{font-size:11px}
.syne{font-family:'Syne',sans-serif}.bold{font-weight:700}
.empty{text-align:center;padding:16px;color:var(--mu2);font-size:11px}

/* ── STATUS SELECTOR ────────────────────────────────── */
.st-sel{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.st-btn{padding:4px 10px;font-size:10px;background:var(--s3);border:1px solid var(--bd2);border-radius:99px;cursor:pointer;color:var(--mu);transition:.15s;font-family:'DM Mono',monospace}
.st-btn:hover{color:var(--tx);background:var(--s4);border-color:var(--bd3)}
.st-btn.cur{background:var(--ac);color:#0a0a08;border-color:var(--ac);font-weight:700}

/* ── TOASTER ────────────────────────────────────────── */
#toaster{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r2);padding:9px 14px;font-size:11px;transform:translateY(40px) scale(.95);opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);pointer-events:auto;box-shadow:var(--sh2)}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.ts{border-left:2px solid var(--green);color:var(--green)}
.tw{border-left:2px solid var(--orange);color:var(--orange)}
.te{border-left:2px solid var(--red);color:var(--red)}
.ti{border-left:2px solid var(--blue);color:var(--blue)}

/* ── CTX MENU ───────────────────────────────────────── */
.ctx{position:fixed;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r2);z-index:300;min-width:160px;overflow:hidden;box-shadow:var(--sh3)}
.cxi{padding:8px 14px;cursor:pointer;font-size:11px;transition:.12s;display:flex;align-items:center;gap:8px}
.cxi:hover{background:var(--s3)}.cxi.d{color:var(--red)}

/* ── VTABS ──────────────────────────────────────────── */
.vtabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:0}
.vt{padding:9px 16px;font-size:11px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:7px;user-select:none}
.vt.act{color:var(--ac);border-bottom-color:var(--ac)}
.vt:hover:not(.act){color:var(--tx)}
.vt-badge{font-size:9px;padding:1px 6px;border-radius:99px;background:var(--s3);color:var(--mu);font-weight:600}

/* ── PROGRESS ───────────────────────────────────────── */
.pgbar{height:3px;background:var(--bd);border-radius:99px;margin-top:4px}
.pgfill{height:100%;border-radius:99px;background:var(--green);transition:width .3s ease}

/* ── FILE UPLOAD ────────────────────────────────────── */
.file-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.file-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.file-info{flex:1;min-width:0}
.file-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:10px;color:var(--mu)}
.file-status{font-size:10px;flex-shrink:0;padding:2px 7px;border-radius:99px;white-space:nowrap}
.fs-ok{background:var(--green-dim);color:var(--green)}
.fs-miss{background:rgba(100,100,100,.1);color:var(--mu2)}
.file-upload-btn{padding:3px 9px;font-size:10px;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;color:var(--mu);transition:.15s;white-space:nowrap;flex-shrink:0}
.file-upload-btn:hover{color:var(--tx)}

/* ── INBOX ──────────────────────────────────────────── */
.inbox-item{padding:11px 15px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.15s;position:relative}
.inbox-item:hover{background:var(--s2)}
.inbox-item.unread{background:rgba(200,224,64,.03)}
.inbox-item.unread .inbox-subj{color:var(--ac);font-weight:600}
.inbox-unread-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-top:4px}
.inbox-subj{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;transition:.1s}
.inbox-snip{font-size:10px;color:var(--mu);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inbox-from{font-size:10px;color:var(--blue);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-date{font-size:10px;color:var(--mu2);flex-shrink:0;margin-left:8px}
.inbox-attach{font-size:9px;color:var(--orange);background:var(--orange-dim);padding:1px 5px;border-radius:99px;flex-shrink:0}
.inbox-cand-match{font-size:9px;color:var(--green);background:var(--green-dim);padding:1px 6px;border-radius:99px;flex-shrink:0;border:1px solid var(--green-border)}
.inbox-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:50px;color:var(--mu);font-size:12px}
.inbox-empty{padding:60px 30px;text-align:center;color:var(--mu2);font-size:12px;line-height:1.9}
.inbox-refresh-bar{padding:8px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;background:var(--s2);flex-shrink:0}
.email-detail-header{padding:14px 16px;border-bottom:1px solid var(--bd);background:var(--s2);flex-shrink:0}
.email-detail-body{padding:16px;font-size:12px;line-height:1.9;color:var(--tx);white-space:pre-wrap;overflow-y:auto;flex:1;font-family:'DM Mono',monospace}
.em-nav-item{padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:6px;transition:.12s;user-select:none}
.em-nav-item:hover{background:var(--s3);color:var(--tx)}
.em-nav-item.em-nav-act{background:var(--s3);color:var(--ac);font-weight:600}
.attach-chip{display:inline-flex;align-items:center;gap:5px;background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);padding:4px 10px;border-radius:99px;font-size:10px;margin:3px 3px 0 0}

/* ── AI ─────────────────────────────────────────────── */
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 7px;border-radius:99px;background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-border);white-space:nowrap;font-weight:500}
.ai-panel{position:fixed;right:20px;bottom:20px;width:330px;max-height:70vh;background:var(--s2);border:1px solid var(--purple-border);border-radius:var(--r3);box-shadow:var(--sh3);z-index:9999;display:flex;flex-direction:column;animation:slideUp .22s cubic-bezier(.2,.8,.3,1)}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.ai-panel-head{padding:11px 13px;border-bottom:1px solid var(--purple-border);display:flex;align-items:center;gap:8px;background:var(--purple-dim);border-radius:var(--r3) var(--r3) 0 0;flex-shrink:0}
.ai-panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;flex:1;color:var(--purple)}
.ai-panel-close{cursor:pointer;color:var(--mu);font-size:14px;line-height:1;padding:0 2px;transition:.12s}
.ai-panel-close:hover{color:var(--tx)}
.ai-panel-body{padding:12px;overflow-y:auto}
.ai-action-btn{display:flex;align-items:center;gap:7px;width:100%;padding:8px 11px;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;color:var(--tx);font-size:11px;font-family:'DM Mono',monospace;margin-bottom:5px;transition:.15s;text-align:left}
.ai-action-btn:hover{background:var(--purple-dim);border-color:var(--purple-border);color:var(--purple)}

/* ── REPORTING ──────────────────────────────────────── */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:20px}
.rep-kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;transition:all .18s}
.rep-kpi:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.rep-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--ac))}
.rep-v{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.rep-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em}
.rep-sub{font-size:10px;color:var(--mu2);margin-top:3px}
.rep-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px}
.rep-card-t{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;margin-bottom:12px}
.rep-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.rep-bar-lbl{min-width:130px;color:var(--mu);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-bar-track{flex:1;height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.rep-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.rep-funnel-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);font-size:11px;transition:.12s}
.rep-funnel-row:hover{background:var(--s3)}
.rep-funnel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rep-period-btn{padding:4px 10px;font-size:10px;background:var(--s3);border:1px solid var(--bd2);border-radius:99px;cursor:pointer;color:var(--mu);transition:.15s;font-family:'DM Mono',monospace}
.rep-period-btn.act{background:var(--ac);color:#0a0a08;border-color:var(--ac);font-weight:700}

/* ── MATCHING ───────────────────────────────────────── */
.match-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s}
.match-card:hover{background:var(--s3);border-color:var(--bd3);transform:translateX(2px)}
.match-score{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;flex-shrink:0}
.match-score.hi{background:var(--green-dim);color:var(--green);border:1.5px solid var(--green-border)}
.match-score.med{background:var(--ac-dim);color:var(--ac);border:1.5px solid var(--ac-border)}
.match-score.lo{background:var(--orange-dim);color:var(--orange);border:1.5px solid var(--orange-border)}

/* ── PRIORITY BANNER ────────────────────────────────── */
.priority-action{background:var(--red-dim);border:1px solid var(--red-border);border-left:3px solid var(--red);border-radius:var(--r2);padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.priority-action:hover{background:rgba(240,75,75,.12)}
.priority-action.warn{background:var(--orange-dim);border-color:var(--orange-border);border-left-color:var(--orange)}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
.priority-dot.red{background:var(--red)}
.priority-dot.orange{background:var(--orange)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(240,75,75,.5)}70%{box-shadow:0 0 0 6px rgba(240,75,75,0)}100%{box-shadow:0 0 0 0 rgba(240,75,75,0)}}
.priority-msg{flex:1;font-size:12px;line-height:1.4}
.priority-msg strong{display:block;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:2px;font-size:12px}
.priority-msg span{font-size:10px;color:var(--mu)}

/* ── GLOBAL SEARCH ──────────────────────────────────── */
#gs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
#gs-overlay.open{display:flex}
#gs-box{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r3);width:100%;max-width:560px;overflow:hidden;box-shadow:var(--sh3)}
#gs-input-wrap{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
#gs-q{flex:1;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:14px;color:var(--tx);outline:none}
#gs-q::placeholder{color:var(--mu2)}
.gs-key{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--s3);color:var(--mu);border:1px solid var(--bd2);font-family:'DM Mono',monospace}
#gs-results{max-height:380px;overflow-y:auto}
.gs-section{font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:var(--mu2);padding:8px 14px 4px;border-top:1px solid var(--bd)}
.gs-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:.12s;font-size:11px}
.gs-item:hover,.gs-item.sel{background:var(--s2)}
.gs-item-ico{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.gs-item-main{flex:1;min-width:0}
.gs-item-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-item-sub{font-size:10px;color:var(--mu);margin-top:1px}
.gs-empty{padding:30px;text-align:center;color:var(--mu2);font-size:11px}
#gs-footer{padding:8px 14px;border-top:1px solid var(--bd);display:flex;gap:12px;font-size:10px;color:var(--mu2)}

/* ── PRECAL ─────────────────────────────────────────── */
.precal-q{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;transition:.15s}
.precal-q.done{opacity:.45;border-color:var(--green-border)}
.precal-q-num{width:22px;height:22px;border-radius:50%;background:var(--s3);border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mu);flex-shrink:0;margin-top:1px;transition:.15s}
.precal-q.done .precal-q-num{background:var(--green);border-color:var(--green);color:#0a0a08}
.precal-q-body{flex:1}
.precal-q-label{font-size:11px;font-weight:600;margin-bottom:4px;line-height:1.4}
.precal-q-hint{font-size:10px;color:var(--mu);margin-bottom:5px;line-height:1.5}
.precal-q-input{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:5px 8px;color:var(--tx);font-family:'DM Mono',monospace;font-size:11px;outline:none;transition:.15s}
.precal-q-input:focus{border-color:var(--green)}
.precal-timer{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--green);letter-spacing:.1em}

/* ── ENTRETIEN BANNER ───────────────────────────────── */
.entretien-now{background:var(--blue-dim);border:1px solid var(--blue-border);border-left:3px solid var(--blue);border-radius:var(--r2);padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
.entretien-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--blue);min-width:60px;letter-spacing:.04em}
.entretien-info{flex:1}
.entretien-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}

/* ── INTERVIEW CARD ─────────────────────────────────── */
.interview-card{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--blue-dim);border:1px solid var(--blue-border);border-radius:var(--r2);margin-bottom:5px;cursor:pointer;transition:all .15s}
.interview-card:hover{background:rgba(74,132,226,.14);transform:translateX(2px)}
.interview-time{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--blue);flex-shrink:0;min-width:42px}
.interview-info{flex:1}
.interview-name{font-family:'Syne',sans-serif;font-weight:700;font-size:11px}
.interview-sub{font-size:10px;color:var(--mu);margin-top:1px}

/* ── AI CHECKLIST ───────────────────────────────────── */
.ai-chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bd3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .2s;user-select:none}
.ai-chk.done{background:var(--green);border-color:var(--green);color:#0a0a08;font-weight:700}
.ai-chk:hover:not(.done){border-color:var(--green);background:var(--green-dim)}

/* ── AI ITEM (agenda legacy) ────────────────────────── */
.ai{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 11px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:.15s;margin-bottom:3px}
.ai:hover{border-color:var(--bd3);background:var(--s3)}
.ai.done{opacity:.4}
.ai-body{flex:1}
.ai-t{font-size:11px;font-weight:500}
.ai-sub{font-size:10px;color:var(--mu);margin-top:1px}
.ai-time{font-size:10px;color:var(--orange);flex-shrink:0;letter-spacing:.02em}

/* ── CALENDAR MODAL ─────────────────────────────────── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;justify-content:space-between}
.cal-week-l{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-align:center;flex:1}
.cal-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:44px repeat(5,1fr);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.cal-hd-cell{background:var(--s1);padding:5px 4px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;text-align:center;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd)}
.cal-hd-cell.today{color:var(--blue)}
.cal-time{background:var(--s1);padding:4px 6px;font-size:9px;color:var(--mu2);text-align:right;border-right:1px solid var(--bd);border-top:1px solid var(--bd)}
.cal-slot{min-height:34px;padding:2px;border-top:1px solid var(--bd);border-right:1px solid var(--bd);transition:.12s}
.cal-slot.avail{cursor:pointer}.cal-slot.avail:hover{background:var(--green-dim)}
.cal-slot.taken{background:var(--red-dim);cursor:not-allowed}
.cal-slot.past{opacity:.3;cursor:default}
.cal-slot.selected{background:rgba(45,212,160,.12);outline:1px solid var(--green)}
.cal-ev{font-size:9px;padding:2px 4px;border-radius:3px;line-height:1.3;word-break:break-word}
.taken-ev{background:var(--red-dim);color:var(--red)}
.new-ev{background:var(--green-dim);color:var(--green);font-weight:600}

/* ── VISIO BOX ──────────────────────────────────────── */
.visio-box{background:var(--blue-dim);border:1px solid var(--blue-border);border-radius:var(--r2);padding:10px 13px;margin-bottom:10px;font-size:11px}
.visio-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);word-break:break-all}

/* ── STEPS ──────────────────────────────────────────── */
.steps{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.step{display:flex;align-items:center;gap:5px}
.step-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mu);flex-shrink:0;transition:.15s}
.step-dot.cur{border-color:var(--ac);color:var(--ac);background:var(--ac-dim)}
.step-dot.done{border-color:var(--green);background:var(--green);color:#0a0a08}
.step-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;transition:.15s}
.step-l.cur{color:var(--ac)}.step-l.done{color:var(--green)}
.step-arr{color:var(--mu2);font-size:11px}

/* ── INFO BOX ───────────────────────────────────────── */
.info-box{background:var(--blue-dim);border:1px solid var(--blue-border);border-radius:var(--r);padding:9px 12px;font-size:11px;color:var(--blue);line-height:1.6}

/* ── PIPE TREE ──────────────────────────────────────── */
.pipe-tree{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.pipe-node{display:flex;gap:5px;align-items:center}
.pipe-arrow{color:var(--mu2);font-size:11px}
.pipe-branch{margin-left:16px;display:flex;flex-direction:column;gap:4px;padding-left:12px;border-left:1px solid var(--bd)}

/* ── BOARD PUBLISH ──────────────────────────────────── */
.board-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:11px}
.board-name{flex:1;font-weight:500}
.board-status{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.bst-live{background:var(--green-dim);color:var(--green)}
.bst-todo{background:var(--s3);color:var(--mu)}

/* ── NRP BADGE ──────────────────────────────────────── */
.nrp-counter{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 5px;border-radius:99px;background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}

/* ── GLOBAL ANIMATIONS ──────────────────────────────── */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.view.active{animation:fadeIn .18s ease}

// ── Config helpers ───────────────────────────────────────
// Per-user settings key helper
function uKey(k){return k+'_'+(currentUserId()||'louis');}
function getSupabaseUrl(){return localStorage.getItem(uKey('btp_sb_url'))||localStorage.getItem('btp_sb_url')||'';}
function getSupabaseKey(){return localStorage.getItem(uKey('btp_sb_key'))||localStorage.getItem('btp_sb_key')||'';}

function setSupabaseKey(v){localStorage.setItem(uKey('btp_sb_key'),v);}

// ── Supabase client (created lazily) ─────────────────────
let _sbClient=null;
let _sbClientUser=null;
function getSB(){
 const url=getSupabaseUrl();
 const key=getSupabaseKey();
 if(!url||!key)return null;
 try{
 if(!_sbClient||_sbClient._url!==url){
 _sbClient=window.supabase.createClient(url,key);
 _sbClient._url=url;
 }
 return _sbClient;
 }catch(e){return null;}
}

// ── localStorage save (synchronous — always instant) ─────
function saveLocal(){
 try{localStorage.setItem('btpcrm5_'+(currentUserId()||'louis'),JSON.stringify(DB));}catch(e){}
}

// ── Supabase sync (async background — never blocks UI) ────
let _syncTimer=null;
function syncToSupabase(){
 // Debounce: wait 800ms of inactivity before syncing
 clearTimeout(_syncTimer);
 _syncTimer=setTimeout(async()=>{
 const sb=getSB();
 if(!sb)return;
 try{
 const payload=JSON.stringify(DB);
 const userId=(currentUserId()==='corentin'?2:1);
      const {error}=await sb.from('crm_data').upsert({id:userId,data:payload,updated_at:new Date().toISOString()},{onConflict:'id'});
 if(error)throw error;
 // Update sync indicator
 const ind=document.getElementById('sync-ind');
 if(ind){ind.title='Cloud OK — '+new Date().toLocaleTimeString('fr-FR');ind.textContent='· Cloud ✓';ind.style.color='var(--green)';}
 }catch(e){
 const ind=document.getElementById('sync-ind');
 if(ind){ind.textContent='· Sync ×';ind.style.color='var(--ac3)';ind.title='Erreur sync: '+e.message;}
 console.warn('Supabase sync error:',e);
 }
 },800);
}

// ── save() = localStorage immédiat + Supabase en arrière-plan
function save(){
 saveLocal();
 syncToSupabase();
}

// ── load() = Supabase si configuré, sinon localStorage ───
async function load(){
 // 1. Toujours charger localStorage d'abord (instantané)
 try{
 const local=JSON.parse(localStorage.getItem('btpcrm5_'+(currentUserId()||'louis')));
 if(local&&local.candidates)DB=local;
 else seed();
 }catch(e){seed();}

 // 2. Si Supabase configuré, tenter de charger depuis le cloud
 const sb=getSB();
 if(!sb)return; // Pas configuré — localStorage seul

 try{
 const userId=(currentUserId()==='corentin'?2:1);
    const {data,error}=await sb.from('crm_data').select('data,updated_at').eq('id',userId).maybeSingle();
 if(error)throw error;
 if(data?.data){
 let cloudDB;
 try{cloudDB=typeof data.data==='string'?JSON.parse(data.data):data.data;}
 catch(e){throw new Error('JSON cloud invalide');}
 if(cloudDB&&cloudDB.candidates){
 DB=cloudDB;
 saveLocal(); // Mettre à jour le cache local
 rDash();badges(); // Refresh UI avec données cloud
 const ind=document.getElementById('sync-ind');
 if(ind){ind.textContent='· Sync ✓';ind.style.color='var(--ac2)';ind.title='Données cloud chargées — '+new Date().toLocaleTimeString('fr-FR');}
 }
 } else {
 // Première connexion Supabase — uploader les données locales
 await sb.from('crm_data').upsert({id:(currentUserId()==='corentin'?2:1),data:JSON.stringify(DB),updated_at:new Date().toISOString()},{onConflict:'id'});
 const ind=document.getElementById('sync-ind');
 if(ind){ind.textContent='· Sync ✓';ind.style.color='var(--ac2)';ind.title='Données initiales envoyées vers le cloud';}
 }
 }catch(e){
 console.warn('Supabase load error:',e);
 const ind=document.getElementById('sync-ind');
 if(ind){ind.textContent='· Sync ×';ind.style.color='var(--ac3)';ind.title='Cloud inaccessible — données locales utilisées';}
 }
}

function toast(msg,t='s'){
 const el=document.createElement('div');
 el.className=`toast t${t}`;el.textContent=msg;
 document.getElementById('toaster').appendChild(el);
 setTimeout(()=>el.classList.add('show'),10);
 setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),200);},2200);
}

function go(v){
 UI.view=v;
 document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('act',el.dataset.v===v));
 document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
 document.getElementById('view-'+v).classList.add('active');
 const T={dash:'Dashboard',cands:'Candidats',needs:'Besoins',pros:'Prospects',clients:'Clients',agenda:'Agenda',posts:'Annonces',emails:'Emails',reporting:'Reporting',facturation:'Facturation'};
 document.getElementById('tbt').textContent=T[v]||v;
 const A={dash:'',facturation:`<button class="btn bp bsm" onclick="openInvoiceForm()">+ Facture</button>`,cands:`<button class="btn bp bsm" onclick="openCandForm()">+ Candidat</button><label class="btn bg bsm" style="cursor:pointer">↑ CSV<input type="file" accept=".csv" style="display:none" onchange="importCandCsv(event)"></label>`,needs:`<button class="btn bp bsm" onclick="openNeedForm()">+ Besoin</button>`,pros:`<button class="btn bg bsm" onclick="downloadCsvTemplate()">↓ Modèle</button><label class="btn bg bsm" style="cursor:pointer">↑ Import Excel / CSV<input type="file" accept=".csv,.xlsx,.xls,.txt" style="display:none" onchange="importProspects(event)"></label><button class="btn bp bsm" onclick="openCoForm()">+ Prospect</button>`,clients:``,agenda:`<button class="btn bp bsm" onclick="openAgForm()">+ Événement</button>`,posts:`<button class="btn bp bsm" onclick="openPostForm()">+ Annonce</button>`};
 document.getElementById('tba').innerHTML=A[v]||'';
 ({dash:rDash,cands:rCands,needs:rNeeds,pros:rPros,clients:rClients,agenda:rAgenda,posts:rPosts,emails:rEmails,reporting:rReporting,facturation:rFacturation})[v]?.();
 badges();
}

function badges(){
 const active=DB.candidates.filter(c=>!['ko','placed'].includes(c.status));
 document.getElementById('badge-cands').textContent=active.length;
 document.getElementById('badge-needs').textContent=DB.needs.filter(n=>n.status==='open').length;
 const pros=DB.companies.filter(c=>c.type==='prospect'&&c.status!=='nobiz').length;
 document.getElementById('badge-pros').textContent=pros;
 // urgency badge
 const urg=computeAlerts().length;
 const ub=document.getElementById('badge-urg');
 ub.textContent=urg;ub.style.display=urg?'':'none';
 // agenda today
 const ag=DB.agenda.filter(a=>!a.done&&isToday(a.date)).length;
 const ab=document.getElementById('badge-ag');
 ab.textContent=ag;ab.style.display=ag?'':'none';
 // revenue
 const rev=DB.candidates.filter(c=>c.status==='placed').reduce((a,c)=>a+(Number(c.salary||0)*.18),0);
 document.getElementById('nf-rev').textContent=rev?fM(Math.round(rev)):'0€';
 // Invoice badge: unpaid/overdue
 const unpaid=(DB.invoices||[]).filter(inv=>['sent','overdue'].includes(inv.status)).length;
 const ib=document.getElementById('badge-inv');
 if(ib){ib.textContent=unpaid;ib.style.display=unpaid?'':'none';}
}

// ALERTS
// ═══════════════════════════════════════════════════════
function computeAlerts(){
 const a=[];
 DB.candidates.forEach(c=>{
 if(c.status==='new') a.push({color:'var(--ac4)',msg:`Précal à faire : ${c.name}`,act:`openCandPanel('${c.id}')`});
 if(c.status==='entrant'&&daysDiff(c.created)>2) a.push({color:'var(--ac4)',msg:`Entrant sans action (${daysDiff(c.created)}j) : ${c.name}`,act:`switchCandTab('trier');go('cands');openEntrantSplit('${c.id}')`});
 if(c.status==='precal'&&daysDiff(c.updated)>5&&!c.int_date_planned) a.push({color:'var(--ac6)',msg:`Entretien non planifié (${daysDiff(c.updated)}j) : ${c.name}`,act:`openCandPanel('${c.id}')`});
 if(c.status==='dossier'&&daysDiff(c.updated)>2) a.push({color:'var(--ac3)',msg:`Dossier sans retour (${daysDiff(c.updated)}j) : ${c.name}`,act:`openCandPanel('${c.id}')`});
 if(c.status==='presented'&&daysDiff(c.updated)>3) a.push({color:'var(--ac3)',msg:`Client sans retour (${daysDiff(c.updated)}j) sur ${c.name}`,act:`openCandPanel('${c.id}')`});
 if(c.status==='interview'&&daysDiff(c.updated)>3) a.push({color:'var(--ac5)',msg:`Synthèse entretien manquante : ${c.name}`,act:`openCandPanel('${c.id}')`});
 });
 // Prospects avec rappel dû aujourd'hui
 const today=new Date();today.setHours(0,0,0,0);
 DB.companies.filter(c=>c.type==='prospect'&&c.status==='nobiz'&&c.nobiz_remind&&new Date(c.nobiz_remind)<=today).forEach(c=>
 a.push({color:'var(--ac4)',msg:`Rappel prospect : ${c.name}`,act:`go('pros')`})
);
 DB.agenda.filter(a=>!a.done&&isPast(a.date)&&!isToday(a.date)).forEach(ev=>
 a.push({color:'var(--ac6)',msg:`En retard : ${ev.title}`,act:`go('agenda')`})
);
 // Factures en retard
 const todayStr=new Date().toISOString().split('T')[0];
 (DB.invoices||[]).filter(inv=>inv.status==='sent'&&inv.due_date&&inv.due_date<todayStr).forEach(inv=>{
 const co=coById(inv.company_id);
 a.push({color:'var(--ac3)',msg:`Facture impayée en retard — ${co?co.name:'?'} (${fM(inv.amount)})`,act:`go('facturation')`});
 });
 return a;
}

function rDash(){
 const c=DB.candidates;

 const active=c.filter(x=>!['ko','placed','entrant'].includes(x.status));

 if(a.done||!isToday(a.date)||a.type!=='visio'||!a.time)return false;
 const [h,m]=(a.time||'00:00').split(':').map(Number);
 const agT=new Date();agT.setHours(h,m,0,0);

 </div>

 </div>`:'';

 const priorityBanner=topAlert?`

 <div class="kpi" style="cursor:pointer" onclick="go('needs')"><div class="kpi-v" style="color:var(--ac4)">${DB.needs.filter(n=>n.status==='open').length}</div><div class="kpi-l">Besoins ouverts</div><div class="kpi-s">${DB.needs.length} au total</div></div>
 <div class="kpi" style="cursor:pointer" onclick="go('clients')"><div class="kpi-v ac5">${DB.companies.filter(co=>co.type==='client').length}</div><div class="kpi-l">Clients</div><div class="kpi-s">${DB.companies.filter(co=>co.type==='prospect').length} prospects</div></div>
 <div class="kpi"><div class="kpi-v" style="color:var(--ac6)">${fM(Math.round(revPot))}</div><div class="kpi-l">CA potentiel</div><div class="kpi-s">si tous placés</div></div>
 <div class="kpi" style="cursor:pointer" onclick="go('cands')"><div class="kpi-v ac3">${alerts.length}</div><div class="kpi-l">Actions req.</div><div class="kpi-s">${todayAg.length} événement(s) today</div></div>
 </div>
 <div class="dg">
 <div>
 <div class="dsec">Actions requises <span style="font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;font-weight:400">(${alerts.length})</span></div>
 ${alerts.length?alerts.slice(0,8).map(a=>`<div class="aitem" onclick="${a.act}"><div class="adot" style="background:${a.color}"></div><span style="flex:1">${esc(a.msg)}</span></div>`).join('')+(alerts.length>8?`<div style="font-size:10px;color:var(--mu);padding:5px 10px">+${alerts.length-8} autres…</div>`:''):`<div class="aitem"><div class="adot" style="background:var(--ac2)"></div><span class="mu_ fs10">Aucune action urgente OK</span></div>`}
 <div class="dsec mt14">Pipeline actif</div>
 ${CAND_ST.filter(s=>!['placed','ko','entrant'].includes(s.id)).map(s=>{
 const cs=DB.candidates.filter(c=>c.status===s.id);
 if(!cs.length)return'';
 return`<div class="mb8"><div class="fs9 mu2_" style="text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">${s.l} (${cs.length})</div>${cs.slice(0,2).map(c=>`<div class="aitem" onclick="openCandPanel('${c.id}')"><span class="pill ${s.p}" style="font-size:9px">${s.l}</span><span style="flex:1">${esc(c.name)}</span><span class="fs10 mu_">${esc(c.role||'')} </span></div>`).join('')}${cs.length>2?`<div class="fs10 mu_ mt4" style="padding-left:8px">+${cs.length-2} autre(s)…</div>`:''}</div>`;

 <div class="dsec mt14">Agenda aujourd'hui</div>
 ${(()=>{const others=DB.agenda.filter(a=>!a.done&&isToday(a.date)&&a.type!=='visio').sort((a,b)=>a.time>b.time?1:-1);if(!others.length)return'<div class="aitem"><span class="mu_ fs10">Rien d\'autre aujourd\'hui</span></div>';return others.map(a=>{const t=AG_TYPES.find(t=>t.id===a.type)||AG_TYPES[2];return`<div class="aitem" onclick="openAgPanel('${a.id}')">${t.ico}<strong style="flex:1">${esc(a.title)}</strong><span class="ac4 fs10">${a.time||''}</span></div>`;}).join('');})()}
 <div class="dsec mt14">Besoins ouverts</div>
 ${DB.needs.filter(n=>n.status==='open').slice(0,5).map(n=>{const co=coById(n.company_id);return`<div class="aitem" onclick="openNeedPanel('${n.id}')"><span style="flex:1">${esc(n.title)}</span><span class="fs10 mu_">${co?esc(co.name):''}</span><span class="fs9" style="color:${{h:'var(--ac3)',m:'var(--ac4)',l:'var(--mu2)'}[n.urgency]||'var(--mu2)'}">${{h:'●',m:'○',l:'·'}[n.urgency]||''}</span></div>`;}).join('')||`<div class="mu_ fs11">Aucun besoin ouvert</div>`}

 </div>
 </div>`;
}

 document.getElementById('view-cands').innerHTML=`

function entRow(c){
 const cat=getCat(c.cat);

 return`<tr onclick="openEntrantSplit('${c.id}')" style="cursor:pointer">

 </td>

}

function koEntrant(id){
 const c=cById(id);if(!c)return;
 c.status='ko';c.updated=now_();save();rCands();badges();
 toast(`${c.name} — marqué KO`,'w');
}

// TAB 2 — EN COURS : PRÉCAL / RDV PRÉVU
// Candidats qualifiés (status: new ou precal)
// Précal faite, en attente d'entretien visio
// ═══════════════════════════════════════════════════════════
function rEnCours(){
 const cands=DB.candidates.filter(c=>['new','precal'].includes(c.status))
 .sort((a,b)=>{
 // Ceux avec RDV agenda en premier
 const aAg=DB.agenda.find(ag=>ag.cand_id===a.id&&!ag.done&&ag.date>=new Date().toISOString().split('T')[0]);
 const bAg=DB.agenda.find(ag=>ag.cand_id===b.id&&!ag.done&&ag.date>=new Date().toISOString().split('T')[0]);
 if(aAg&&!bAg)return -1;
 if(!aAg&&bAg)return 1;
 if(aAg&&bAg)return (aAg.date+aAg.time||'').localeCompare(bAg.date+bAg.time||'');
 return new Date(b.updated)-new Date(a.updated);
 });

 const today=new Date().toISOString().split('T')[0];

 const rows=cands.map(c=>{
 const cat=getCat(c.cat);
 const st=getCS(c.status);
 // Prochain RDV agenda lié à ce candidat
 const nextAg=DB.agenda.find(ag=>ag.cand_id===c.id&&!ag.done&&ag.date>=today);
 const overdueAg=DB.agenda.find(ag=>ag.cand_id===c.id&&!ag.done&&ag.date<today);
 const agDisplay=nextAg
 ? `<span style="font-size:10px;padding:2px 8px;background:rgba(61,224,154,.08);border:1px solid rgba(61,224,154,.2);border-radius:2px;color:var(--ac2)"> ${fmtDateStr(nextAg.date)}${nextAg.time?' à '+nextAg.time:''}</span>`
 : overdueAg
 ? `<span style="font-size:10px;padding:2px 8px;background:rgba(224,74,74,.1);border:1px solid rgba(224,74,74,.25);border-radius:2px;color:var(--ac3)">! RDV dépassé — ${fmtDateStr(overdueAg.date)}</span>`
 : `<span style="font-size:10px;color:var(--mu2)">Aucun RDV planifié</span>`;

 const docsOk=(c.docs||[]).filter(d=>d.file).length;
 const hasCv=!!(c.docs||[]).find(d=>d.id==='cv'&&d.file);

 return`<div class="cc encours-card" onclick="openCandPanel('${c.id}')" style="margin-bottom:6px;padding:12px 13px">
 <div style="display:flex;align-items:flex-start;gap:12px">

 <!-- Téléphone bloc gauche -->
 <div style="flex-shrink:0;width:150px" onclick="event.stopPropagation()">
 <div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu2);margin-bottom:3px">Téléphone</div>
 <div style="font-family:'DM Mono',monospace;font-size:15px;color:var(--ac2);font-weight:500;letter-spacing:.03em;display:flex;align-items:center;gap:5px">
 ${c.phone?`${fPhone(c.phone)}<span onclick="cpPhone('${esc(c.phone)}')" style="cursor:pointer;font-size:12px;color:var(--mu);transition:.1s" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--mu)'">⧉</span>`
 :`<span style="color:var(--mu);font-size:12px">Non renseigné</span>`}
 </div>
 </div>

 <!-- Infos centre -->
 <div style="flex:1;min-width:0">
 <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">
 <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px">${esc(c.name)}</span>
 ${c.pepite?'<span style="font-size:11px"></span>':''}
 <span class="pill ${st.p}" style="font-size:9px">${st.l}</span>
 <span class="tag ${cat.cls}">${esc(c.role||cat.l)}</span>
 </div>
 <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:5px">

// Helper: format date string lisiblement
function fmtDateStr(ds){
 if(!ds)return'—';
 try{
 const d=new Date(ds+'T12:00:00');
 const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
 const today=new Date();today.setHours(12,0,0,0);
 const diff=Math.round((d-today)/86400000);
 if(diff===0)return"Aujourd'hui";
 if(diff===1)return'Demain';
 if(diff===-1)return'Hier';
 if(diff>0&&diff<7)return`${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
 return`${d.getDate()}/${d.getMonth()+1}`;
 }catch(e){return ds;}
}

 .sort((a,b)=>{
 // presented d'abord, puis interview, puis dossier
 const order={presented:0,interview:1,dossier:2};
 const oa=order[a.status]??3;
 const ob=order[b.status]??3;
 if(oa!==ob)return oa-ob;
 return new Date(b.updated)-new Date(a.updated);

 const DOCS_REQUIRED=['cv','id_card','carte_vit','dossier','rgpd'];

 const docs=c.docs||[];
 const done=DOCS_REQUIRED.filter(id=>docs.find(d=>d.id===id&&d.file)).length;
 return{done,total:DOCS_REQUIRED.length,pct:Math.round(done/DOCS_REQUIRED.length*100)};

function uploadCvFromSplit(event,candId){
 const file=event.target.files[0];if(!file)return;
 if(file.size>5*1024*1024){toast('Fichier trop lourd (max 5MB)','e');return;}
 const reader=new FileReader();
 reader.onload=(e)=>{
 const c=cById(candId);if(!c)return;
 c.docs=c.docs||[];
 const idx=c.docs.findIndex(d=>d.id==='cv');
 const docData={id:'cv',name:file.name,size:formatSize(file.size),date:now_(),type:file.type,file:e.target.result};
 if(idx>=0)c.docs[idx]=docData;else c.docs.push(docData);
 c.updated=now_();save();
 // Refresh split view
 document.getElementById('ent-split-ov')?.remove();
 openEntrantSplit(candId);
 toast(`CV uploadé ✓`,'s');
 // Auto-lancer l'IA si clé configurée
 if(getApiKey()){
 setTimeout(()=>aiExtractCVSplit(candId),300);
 }
 };
 reader.readAsDataURL(file);
}

function processCvFile(file){
 if(file.size>5*1024*1024){toast('Fichier trop lourd (max 5MB)','e');return;}
 const allowed=['application/pdf','image/jpeg','image/png','image/jpg'];
 if(!allowed.includes(file.type)){toast('Format non supporté — PDF ou image uniquement','e');return;}

 document.getElementById('cv-dropzone').style.display='none';
 document.getElementById('cv-add-status').style.display='block';
 document.getElementById('cv-add-filename').textContent=file.name;
 document.getElementById('cv-add-state').textContent='Lecture du fichier…';

 const reader=new FileReader();
 reader.onload=(e)=>{
 window._cvAddFile={name:file.name,type:file.type,size:formatSize(file.size),data:e.target.result,date:now_()};

 if(getApiKey()){
 document.getElementById('cv-add-state').textContent=' Analyse IA en cours…';
 extractCVForNewCandidate(window._cvAddFile);
 } else {
 document.getElementById('cv-add-state').textContent='✓ Fichier prêt — complétez les infos manuellement';
 showCvAddForm({});
 }
 };
 reader.readAsDataURL(file);
}

async function extractCVForNewCandidate(cvFile){
 const key=getApiKey();
 const base64=cvFile.data.split(',')[1]||cvFile.data;
 try{
 const resp=await fetch('https://api.anthropic.com/v1/messages',{
 method:'POST',
 headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'},
 body:JSON.stringify({
 model:'claude-sonnet-4-6',
 max_tokens:800,
 messages:[{role:'user',content:[
 {type:cvFile.type==='application/pdf'?'document':'image',source:{type:'base64',media_type:cvFile.type,data:base64}},
 {type:'text',text:`Analyse ce CV et extrais les informations. Réponds UNIQUEMENT en JSON valide, sans markdown.
{"nom":"","prenom":"","email":"","telephone":"","poste_actuel":"","poste_cible":"","salaire_actuel":"","disponibilite":"","mobilite":"","notes_synthese":""}
- telephone: format 06XXXXXXXX, sans espaces
- salaire_actuel: nombre entier en euros annuels (ex: 42000), "" si absent
- disponibilite: texte court (ex: "Immédiate", "Sous 1 mois")
- notes_synthese: 2-3 phrases résumant le profil pour un recruteur BTP
- Mettre "" si info absente`}
 ]}]
 })
 });
 if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`);}
 const data=await resp.json();
 const raw=data.content?.[0]?.text||'{}';
 const clean=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
 const extracted=JSON.parse(clean);
 document.getElementById('cv-add-state').textContent='Extraction IA terminée — vérifiez et complétez';
 showCvAddForm(extracted);
 }catch(err){
 document.getElementById('cv-add-state').textContent='! Extraction IA échouée — remplissez manuellement';
 toast('Extraction IA: '+err.message,'w');
 showCvAddForm({});
 }
}

function getWeekDates(offset){
 const d=new Date();
 const dow=d.getDay();
 const monday=new Date(d);
 monday.setDate(d.getDate()-(dow===0?6:dow-1)+(offset*7));
 const days=[];
 for(let i=0;i<5;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);days.push(dd);}
 return days;
}
function getTakenSlots(){
 // Returns set of "YYYY-MM-DD HH" strings for taken slots
 const taken=new Set();
 DB.agenda.filter(a=>!a.done&&a.date&&a.time).forEach(a=>{
 const d=new Date(a.date);
 const dateStr=d.toISOString().split('T')[0];
 const h=parseInt(a.time.split(':')[0]);
 taken.add(`${dateStr}_${h}`);
 // Block 1h duration
 taken.add(`${dateStr}_${h}`);
 });
 return taken;
}
function renderCalMo(candId){

 const now=new Date();
 const mondayLabel=fmtDate(days[0]);
 const fridayLabel=fmtDate(days[4]);
 let gridHtml='';
 // Header
 gridHtml+=`<div class="cal-hd-cell" style="font-size:9px;color:var(--mu2)">Heure</div>`;
 days.forEach(d=>{
 const isToday_=d.toDateString()===new Date().toDateString();
 gridHtml+=`<div class="cal-hd-cell ${isToday_?'today':''}">${fmtDate(d)}</div>`;
 });
 // Slots
 WEEK_HOURS.forEach(h=>{
 gridHtml+=`<div class="cal-time">${h}h</div>`;
 days.forEach(d=>{
 const dateStr=d.toISOString().split('T')[0];
 const key=`${dateStr}_${h}`;
 const slotDt=new Date(d);slotDt.setHours(h,0,0,0);
 const isPast_=slotDt<now;
 const isTaken=taken.has(key);
 const isSel=UI.calSelected?.dateStr===dateStr&&UI.calSelected?.h===h;
 let cls='cal-slot';
 if(isPast_)cls+=' past';
 else if(isTaken)cls+=' taken';
 else cls+=' avail';
 if(isSel)cls+=' selected';
 let inner='';
 if(isTaken){
 const ev=DB.agenda.find(a=>{const dd=new Date(a.date);return dd.toISOString().split('T')[0]===dateStr&&parseInt((a.time||'').split(':')[0])===h;});
 inner=`<div class="cal-ev taken-ev">${ev?esc(ev.title.slice(0,18)):'Occupé'}</div>`;
 }
 if(isSel){inner=`<div class="cal-ev new-ev">✓ Sélectionné</div>`;}
 const clickable=!isPast_&&!isTaken;
 gridHtml+=`<div class="${cls}" ${clickable?`onclick="selectSlot('${candId}','${dateStr}',${h})"`:''}>${inner}</div>`;
 });
 });
 openMo(` Planifier entretien visio — ${c?c.name:''}`,`

function handleFileUpload(event){
 const input=event.target;
 const docId=input.dataset.docid;
 const candId=input.dataset.candid;
 const file=input.files[0];if(!file)return;
 const maxSize=3*1024*1024; // 3MB limit
 if(file.size>maxSize){toast('Fichier trop lourd (max 3MB)','e');return;}
 const reader=new FileReader();
 reader.onload=(e)=>{
 const c=cById(candId);if(!c)return;
 c.docs=c.docs||[];
 const idx=c.docs.findIndex(d=>d.id===docId);
 const docData={id:docId,name:file.name,size:formatSize(file.size),date:now_(),type:file.type,file:e.target.result};
 if(idx>=0)c.docs[idx]=docData;else c.docs.push(docData);
 c.updated=now_();save();
 renderCandPanelTab(candId);
 toast(`${file.name} uploadé ✓`,'s');
 };
 reader.readAsDataURL(file);
}
function formatSize(bytes){if(bytes<1024)return bytes+'o';if(bytes<1024*1024)return Math.round(bytes/1024)+'Ko';return(bytes/1024/1024).toFixed(1)+'Mo';}
function removeDoc(candId,docId){
 const c=cById(candId);if(!c)return;
 c.docs=(c.docs||[]).filter(d=>d.id!==docId);c.updated=now_();save();
 renderCandPanelTab(candId);toast('Fichier supprimé','w');
}

// ── ACTIVE TAB ─────────────────────────────────────────
function renderProActive(el) {
 const today = new Date(); today.setHours(0, 0, 0, 0);

 // Sort: callback today first → tocall (by marge desc) → callback future → nrp
 let pros = DB.companies.filter(c => c.type === 'prospect' && !['nobiz', 'refused'].includes(c.status));

 // Apply "NRP → next day" logic: if nrp and next_call_date is today or past, reset to tocall
 pros.forEach(c => {
 if (c.status === 'nrp' && c.next_call_date) {
 const nd = new Date(c.next_call_date); nd.setHours(0, 0, 0, 0);
 if (nd <= today) { c.status = 'tocall'; c.next_call_date = null; }
 }
 if (c.status === 'callback' && c.next_call_date) {
 const nd = new Date(c.next_call_date); nd.setHours(0, 0, 0, 0);
 // Only show on or after chosen date
 }
 });

 // Filter out future callbacks (not yet due)
 const visible = pros.filter(c => {
 if (c.status === 'callback' && c.next_call_date) {
 const nd = new Date(c.next_call_date); nd.setHours(0, 0, 0, 0);
 return nd <= today;
 }
 return true;
 });

 // Sort: (1) callback due today, (2) tocall sorted by marge desc, (3) nrp
 visible.sort((a, b) => {
 const order = { callback: 0, tocall: 1, nrp: 2 };
 const oa = order[a.status] ?? 3;
 const ob = order[b.status] ?? 3;
 if (oa !== ob) return oa - ob;
 // same status: sort by marge desc
 return (Number(b.marge) || 0) - (Number(a.marge) || 0);
 });

 // Count future callbacks (hidden)
 const futureCallbacks = pros.filter(c => {
 if (c.status === 'callback' && c.next_call_date) {
 const nd = new Date(c.next_call_date); nd.setHours(0, 0, 0, 0);
 return nd > today;
 }
 return false;
 }).length;

 const q = (document.getElementById('pro-q') || {}).value?.toLowerCase() || '';

 const filtered = visible.filter(c => {
 if (!q) return true;
 return (c.name + ' ' + (c.city || '')).toLowerCase().includes(q);
 });

 el.innerHTML = `
 <div class="tb" style="margin-top:14px">
 <div class="srch"><input id="pro-q" placeholder="Rechercher…" oninput="renderProSub()"></div>
 <button class="btn bp bsm" onclick="openCoForm()">+ Prospect</button>

 ${futureCallbacks ? `<span style="font-size:10px;color:var(--ac5);margin-left:4px"> ${futureCallbacks} rappel(s) planifié(s) à venir</span>` : ''}
 </div>
 <table class="tbl" id="pro-table">
 <thead><tr>
 <th>Raison sociale</th>
 <th>Téléphone</th>
 <th>Ville</th>
 <th>Statut</th>
 <th style="cursor:pointer" onclick="toggleMargeSort()">Marge ↕</th>
 <th style="width:32px"></th>
 </tr></thead>
 <tbody>
 ${filtered.length ? filtered.map(c => proRow(c)).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--mu);padding:24px">Aucun prospect actif</td></tr>`}
 </tbody>
 </table>`;

 if (q) { const qel = document.getElementById('pro-q'); if (qel) qel.value = q; }
}

const AG_HOURS=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
const AG_HALF_HOURS=['07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00'];


// ═══════════════════════════════════════════════════════
// AGENDA — complet, timezone-safe, UX moderne
// ═══════════════════════════════════════════════════════

// Helper timezone-safe: toujours date locale, jamais UTC
const localDateStr=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayLocal=()=>localDateStr(new Date());

// Noms jours/mois en français
const FR_DAYS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const FR_DAYS_SHORT=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FR_MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FR_MONTHS_SHORT=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// Formater une date lisiblement
function fmtDateHuman(dateStr){
 if(!dateStr)return'—';
 const d=new Date(dateStr+'T12:00:00'); // midi = sans risque TZ
 const today=todayLocal();
 const tomorrow=localDateStr(new Date(Date.now()+86400000));
 if(dateStr===today)return"Aujourd'hui";
 if(dateStr===tomorrow)return'Demain';
 const diff=Math.round((new Date(dateStr+'T12:00:00')-new Date(today+'T12:00:00'))/86400000);
 if(diff===-1)return'Hier';
 if(diff>0&&diff<7)return`${FR_DAYS[d.getDay()]} ${d.getDate()} ${FR_MONTHS_SHORT[d.getMonth()]}`;
 return`${FR_DAYS_SHORT[d.getDay()]} ${d.getDate()} ${FR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

const AG_HOURS_FULL=['07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00'];

 const d=new Date(UI.agDate+'T12:00:00');
 const today=todayLocal();

 let label='';
 if(vt==='day'){
 label=fmtDateHuman(UI.agDate);
 } else if(vt==='week'){
 const mon=getMonday(d);const sun=new Date(mon);sun.setDate(sun.getDate()+6);
 label=`${mon.getDate()} ${FR_MONTHS_SHORT[mon.getMonth()]} — ${sun.getDate()} ${FR_MONTHS_SHORT[sun.getMonth()]} ${sun.getFullYear()}`;
 } else {
 label=`${FR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
 }

 document.getElementById('view-agenda').innerHTML=`
 <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
 <div style="display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:3px;gap:2px">
 ${['day','week','month'].map(v=>`<div onclick="setAgView('${v}')" style="padding:5px 14px;border-radius:2px;font-size:11px;cursor:pointer;user-select:none;transition:.12s;${vt===v?'background:var(--s1);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.3)':'color:var(--mu)'}">${{day:'Jour',week:'Semaine',month:'Mois'}[v]}</div>`).join('')}
 </div>
 <div style="display:flex;align-items:center;gap:6px">

 <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px;min-width:200px;text-align:center">${label}</div>
 <div onclick="agNav(1)" style="cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd2);border-radius:3px;font-size:14px;color:var(--mu);background:var(--s2);transition:.1s" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='var(--s2)'">›</div>

 </div>
 <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);cursor:pointer;margin-left:auto">

 </label>

 <div id="ag-body"></div>`;

 const body=document.getElementById('ag-body');
 if(vt==='day') renderAgDay(body,UI.agDate,showDone);
 else if(vt==='week') renderAgWeek(body,UI.agDate,showDone);
 else renderAgMonth(body,UI.agDate,showDone);
}

function setAgView(v){UI.agView=v;rAgenda();}
function agNav(dir){
 const d=new Date(UI.agDate+'T12:00:00');
 if(UI.agView==='day') d.setDate(d.getDate()+dir);
 else if(UI.agView==='week') d.setDate(d.getDate()+(7*dir));
 else d.setMonth(d.getMonth()+dir);
 UI.agDate=localDateStr(d);rAgenda();
}
function agGoToday(){UI.agDate=todayLocal();rAgenda();}
function getMonday(d){
 const day=d.getDay(),diff=d.getDate()-(day===0?6:day-1);
 const m=new Date(d);m.setDate(diff);return m;
}

// ── DAY VIEW ──────────────────────────────────────────
function renderAgDay(el,dateStr,showDone){

 return a.date===dateStr||new Date(a.date+'T12:00:00').toDateString()===new Date(dateStr+'T12:00:00').toDateString();
 });

// ── MONTH VIEW ────────────────────────────────────────
function renderAgMonth(el,dateStr,showDone){
 const d=new Date(dateStr+'T12:00:00');
 const y=d.getFullYear(),m=d.getMonth();
 const first=new Date(y,m,1);const last=new Date(y,m+1,0);
 let startDow=first.getDay();if(startDow===0)startDow=7;startDow--;
 const today=todayLocal();
 const DAYNAMES=['L','M','M','J','V','S','D'];
 const EVT_COLORS={call:'var(--ac4)',visio:'var(--ac5)',task:'var(--ac2)',relance:'var(--ac6)'};

 let html=`<div class="mo-grid">`;
 DAYNAMES.forEach(dn=>html+=`<div class="mo-dh">${dn}</div>`);
 for(let i=0;i<startDow;i++){
 const pd=new Date(y,m,1-(startDow-i));
 html+=`<div class="mo-day other-month"><div class="mo-dn"><span class="dn-num">${pd.getDate()}</span></div></div>`;
 }
 for(let day=1;day<=last.getDate();day++){
 const cur=new Date(y,m,day);
 const curStr=localDateStr(cur); // ← TIMEZONE FIX
 const isToday=curStr===today;
 const isPast=cur<new Date(today+'T12:00:00');
 const evts=DB.agenda.filter(a=>{
 if(!showDone&&a.done)return false;
 return a.date===curStr;
 }).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
 const maxShow=3;
 html+=`<div class="mo-day ${isToday?'today':''} ${isPast&&!isToday?'past':''}" 
 onclick="UI.agDate='${curStr}';setAgView('day')" style="cursor:pointer">
 <div class="mo-dn">
 <span class="dn-num">${day}</span>
 ${evts.length?`<span style="font-size:8px;color:var(--mu2);margin-left:3px">${evts.length}</span>`:''}
 </div>
 ${evts.slice(0,maxShow).map(a=>{const t=AG_TYPES.find(t=>t.id===a.type)||AG_TYPES[2];return`<div class="mo-evt" style="background:var(--s3);color:${EVT_COLORS[a.type]||'var(--mu)'};${a.done?'opacity:.4;text-decoration:line-through':''}" onclick="event.stopPropagation();openAgPanel('${a.id}')">${t.ico} ${esc(a.title)}</div>`;}).join('')}
 ${evts.length>maxShow?`<div class="mo-more">+${evts.length-maxShow}</div>`:''}
 </div>`;
 }
 const endDow=last.getDay()===0?7:last.getDay();
 for(let i=1;i<=7-endDow;i++){
 html+=`<div class="mo-day other-month"><div class="mo-dn"><span class="dn-num">${i}</span></div></div>`;
 }
 html+=`</div>`;
 el.innerHTML=html;
}
