<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1EB;--surf:#FFFFFF;--surf2:#F9F7F2;--surf3:#F0EDE5;--surf4:#E8E3D8;
  --brd:#E4DFD4;--brd2:#CEC8BA;
  --tx:#18160F;--tx2:#6A6558;--tx3:#A8A296;
  --gold:#C8820A;--gold-bg:rgba(200,130,10,.08);--gold-brd:rgba(200,130,10,.18);
  --green:#1A9B74;--green-bg:rgba(26,155,116,.08);--green-brd:rgba(26,155,116,.18);
  --red:#C0392B;--red-bg:rgba(192,57,43,.08);--red-brd:rgba(192,57,43,.18);
  --orange:#D4781A;--orange-bg:rgba(212,120,26,.08);--orange-brd:rgba(212,120,26,.18);
  --blue:#2558D4;--blue-bg:rgba(37,88,212,.08);--blue-brd:rgba(37,88,212,.18);
  --purple:#6D28D9;--purple-bg:rgba(109,40,217,.08);--purple-brd:rgba(109,40,217,.18);
  --sb:#0D1B2A;--sb-brd:rgba(255,255,255,.06);--sbt:#DDD8CE;--sbm:rgba(221,216,206,.42);
  --sh-sm:0 1px 3px rgba(24,22,15,.06),0 1px 2px rgba(24,22,15,.04);
  --sh:0 2px 8px rgba(24,22,15,.08),0 1px 3px rgba(24,22,15,.05);
  --sh-lg:0 8px 24px rgba(24,22,15,.1),0 2px 8px rgba(24,22,15,.06);
  --radius:8px;--radius-sm:5px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:grid;grid-template-columns:220px 1fr}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}

/* ── SIDEBAR ── */
#sb{background:var(--sb);display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--sb-brd)}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--sb-brd)}
.sb-logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--sbt);letter-spacing:-.3px}
.sb-logo-name span{color:var(--gold)}
.sb-logo-sub{font-size:9px;color:var(--sbm);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--sbm);font-size:11px;font-weight:500;transition:.15s;user-select:none;border:1px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:var(--sbt)}
.sb-item.active{background:rgba(200,130,10,.14);color:var(--gold);border-color:rgba(200,130,10,.18)}
.sb-item-ico{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;min-width:16px;text-align:center}
.sb-badge.red{background:rgba(192,57,43,.3);color:#ff8a7a}
.sb-badge.gold{background:rgba(200,130,10,.25);color:#ffb84d}
.sb-badge.dim{background:rgba(255,255,255,.08);color:var(--sbm)}
.sb-section{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--sbm);padding:10px 10px 3px;margin-top:4px;opacity:.6}
.sb-footer{padding:10px 12px;border-top:1px solid var(--sb-brd)}
.sb-footer-rev{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#5ddabd;margin-bottom:1px}
.sb-footer-lbl{font-size:9px;color:var(--sbm)}
.sb-settings{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;color:var(--sbm);font-size:10px;transition:.15s;border-radius:var(--radius-sm)}
.sb-settings:hover{color:var(--sbt);background:rgba(255,255,255,.04)}

/* ── MAIN ── */
#main{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
.topbar{border-bottom:1px solid var(--brd);padding:0 24px;display:flex;align-items:center;gap:12px;background:var(--surf);flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex:1}
.topbar-actions{display:flex;gap:6px;align-items:center}
#content{overflow:auto;padding:22px 24px;background:var(--bg)}
.view{display:none}.view.active{display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:var(--radius-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;line-height:1;white-space:nowrap}
.btn-primary{background:var(--gold);color:#fff;box-shadow:0 1px 3px rgba(200,130,10,.25)}.btn-primary:hover{background:#b57209}
.btn-ghost{background:var(--surf);color:var(--tx2);border:1px solid var(--brd)}.btn-ghost:hover{color:var(--tx);background:var(--surf2);border-color:var(--brd2)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-brd)}.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-icon{padding:6px;width:30px;height:30px;justify-content:center}

/* ── INPUTS ── */
input,select,textarea{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius-sm);padding:7px 10px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none;width:100%;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
input::placeholder,textarea::placeholder{color:var(--tx3)}
textarea{min-height:80px;resize:vertical;line-height:1.6}
select option{background:var(--surf)}
label.lbl{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.fgrp{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{grid-template-columns:1fr 1fr 1fr}
.fcol{grid-column:1/-1}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);box-shadow:var(--sh-sm);overflow:hidden}
.card:hover{box-shadow:var(--sh);border-color:var(--brd2)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;flex:1}
.card-body{padding:14px 16px}

/* ── TAGS/PILLS ── */
.tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.tag-gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-brd)}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-brd)}
.tag-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-brd)}
.tag-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-brd)}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-brd)}
.tag-gray{background:var(--surf3);color:var(--tx2);border:1px solid var(--brd)}
.tag-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-brd)}

/* ── BTP SECTOR TAGS ── */
.sec-go{background:#FEF3E2;color:#92400E;border:1px solid #FDE68A}
.sec-so{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.sec-be{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.sec-vrd{background:#FDF4FF;color:#6B21A8;border:1px solid #E9D5FF}
.sec-hse{background:#FFF1F2;color:#9F1239;border:1px solid #FECDD3}
.sec-mgmt{background:#F0F9FF;color:#0C4A6E;border:1px solid #BAE6FD}

/* ── URGENCY DOTS ── */
.urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.urgency-dot.critical{background:var(--red);box-shadow:0 0 0 2px var(--red-bg)}
.urgency-dot.high{background:var(--orange);box-shadow:0 0 0 2px var(--orange-bg)}
.urgency-dot.normal{background:var(--green);box-shadow:0 0 0 2px var(--green-bg)}
.urgency-dot.info{background:var(--blue);box-shadow:0 0 0 2px var(--blue-bg)}

/* ── DASHBOARD ── */
.dash-greeting{margin-bottom:20px}
.dash-greeting-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:2px}
.dash-greeting-date{font-size:12px;color:var(--tx2)}
.dash-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--sh-sm)}
.kpi-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1;margin-bottom:2px}
.kpi-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em}
.dash-sections{display:grid;grid-template-columns:1fr 340px;gap:16px}
.dash-actions-col{}
.dash-section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.action-item{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;box-shadow:var(--sh-sm)}
.action-item:hover{box-shadow:var(--sh);border-color:var(--brd2)}
.action-item.critical{border-left:3px solid var(--red);background:linear-gradient(to right,var(--red-bg) 0%,var(--surf) 60%)}
.action-item.high{border-left:3px solid var(--orange);background:linear-gradient(to right,var(--orange-bg) 0%,var(--surf) 60%)}
.action-item.normal{border-left:3px solid var(--green)}
.action-info{flex:1;min-width:0}
.action-title{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.action-meta{font-size:10px;color:var(--tx2)}
.action-btn-wrap{flex-shrink:0}
.empty-actions{padding:30px;text-align:center;color:var(--tx3);font-size:12px;background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius)}

/* ── PIPELINE ── */
.pipeline-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;height:calc(100vh - 120px)}
.pipeline-col{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.pipeline-header{padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.pipeline-header-name{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.pipeline-count{font-size:10px;opacity:.6}
.pipeline-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:2px}
.p-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);padding:10px 11px;cursor:pointer;transition:.15s;box-shadow:var(--sh-sm)}
.p-card:hover{box-shadow:var(--sh);border-color:var(--brd2);transform:translateY(-1px)}
.p-card.urgent{border-left:3px solid var(--orange)}
.p-card.critical{border-left:3px solid var(--red)}
.p-card-client{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-job{font-size:10px;color:var(--tx2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-cand{font-size:10px;padding:3px 7px;background:var(--surf2);border:1px solid var(--brd);border-radius:4px;display:inline-flex;align-items:center;gap:4px;margin-bottom:5px}
.p-card-footer{display:flex;justify-content:space-between;align-items:center}
.p-card-days{font-size:10px;font-weight:600}
.p-card-days.ok{color:var(--tx3)}
.p-card-days.warn{color:var(--orange)}
.p-card-days.crit{color:var(--red)}
.add-placement-btn{background:var(--surf2);border:1px dashed var(--brd2);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;color:var(--tx3);font-size:11px;transition:.15s;flex-shrink:0}
.add-placement-btn:hover{background:var(--surf3);color:var(--tx2);border-color:var(--gold)}

/* ── CONTACTS ── */
.contacts-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:280px}
.search-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.search-wrap input{padding-left:28px}
.contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.contact-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:.15s;box-shadow:var(--sh-sm)}
.contact-card:hover{box-shadow:var(--sh);border-color:var(--brd2)}
.contact-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px}
.contact-card-meta{font-size:10px;color:var(--tx2);line-height:1.6}
.contact-card-footer{display:flex;gap:5px;align-items:center;margin-top:8px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;padding:3px;background:var(--surf3);border-radius:var(--radius-sm);width:fit-content;margin-bottom:14px}
.tab{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--tx2);transition:.12s;user-select:none}
.tab.active{background:var(--surf);color:var(--tx);box-shadow:var(--sh-sm)}

/* ── EMAILS ── */
.email-layout{display:grid;grid-template-columns:200px 1fr;height:calc(100vh - 100px);gap:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh-sm)}
.email-sidebar{border-right:1px solid var(--brd);padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.email-nav-item{padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:7px;transition:.12s;user-select:none;font-weight:500}
.email-nav-item:hover{background:var(--surf2);color:var(--tx)}
.email-nav-item.active{background:var(--gold-bg);color:var(--gold);font-weight:600}
.email-nav-badge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:8px;background:var(--surf3);color:var(--tx3);font-weight:600}
.email-main{display:flex;flex-direction:column;overflow:hidden}
.email-toolbar{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surf2)}
.inbox-item{padding:11px 14px;border-bottom:1px solid var(--brd);cursor:pointer;transition:.12s;display:flex;gap:10px;align-items:flex-start}
.inbox-item:hover{background:var(--surf2)}
.inbox-item.unread{background:rgba(200,130,10,.03)}
.inbox-item.unread .inbox-subject{font-weight:700;color:var(--gold)}
.inbox-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px}
.inbox-dot.read{background:transparent}
.inbox-body{flex:1;min-width:0}
.inbox-from{font-size:11px;font-weight:600;margin-bottom:1px}
.inbox-subject{font-size:11px;color:var(--tx);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-snip{font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-date{font-size:10px;color:var(--tx3);flex-shrink:0}
.inbox-scroll{overflow-y:auto;flex:1}
.compose-area{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto}
.compose-field{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--brd);padding-bottom:8px}
.compose-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding-top:8px;min-width:40px;font-weight:600}
.compose-input{background:none;border:none;box-shadow:none;font-size:12px;padding:6px 4px}
.compose-input:focus{box-shadow:none;border-color:transparent}
.compose-body{border:none;background:none;box-shadow:none;flex:1;min-height:200px;font-size:12px;line-height:1.8;resize:none}
.compose-body:focus{box-shadow:none}
.compose-footer{padding:12px 14px;border-top:1px solid var(--brd);display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ── SIDE PANEL ── */
#panel{position:fixed;top:0;right:0;width:480px;height:100vh;background:var(--surf);border-left:1px solid var(--brd);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(24,22,15,.08)}
#panel.open{transform:translateX(0)}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;gap:8px;align-items:flex-start}
.panel-head-info{flex:1;min-width:0}
.panel-head-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;line-height:1.2}
.panel-head-sub{font-size:11px;color:var(--tx2);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.panel-close{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;flex-shrink:0;transition:.12s;line-height:1;margin-top:2px}.panel-close:hover{color:var(--tx)}
.panel-tabs{display:flex;border-bottom:1px solid var(--brd);padding:0 16px;flex-shrink:0;overflow-x:auto}
.panel-tab{padding:9px 10px;font-size:10px;font-weight:600;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;transition:.12s;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-bottom:-1px}
.panel-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}
.panel-footer{padding:10px 16px;border-top:1px solid var(--brd);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}

/* ── MODAL ── */
#modal{position:fixed;inset:0;background:rgba(13,27,42,.45);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
#modal.open{display:flex}
#modal-box{background:var(--surf);border:1px solid var(--brd);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.modal-head{padding:16px 18px 12px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.modal-close{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;transition:.12s}.modal-close:hover{color:var(--tx)}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--brd);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surf)}

/* ── TOASTER ── */
#toaster{position:fixed;bottom:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--sb);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:9px 14px;font-size:11px;font-weight:500;transform:translateY(40px);opacity:0;transition:all .2s cubic-bezier(.4,0,.2,1);pointer-events:auto;border-left:3px solid;color:#DDD8CE;box-shadow:0 4px 16px rgba(13,27,42,.3);max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.s{border-left-color:#5ddabd;color:#5ddabd}
.toast.e{border-left-color:#ff8a7a;color:#ff8a7a}
.toast.w{border-left-color:#ffb347;color:#ffb347}
.toast.i{border-left-color:#7aaeff;color:#7aaeff}

/* ── DETAIL ROWS ── */
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--brd);gap:8px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;min-width:100px}
.detail-val{font-size:11px;text-align:right;word-break:break-word;line-height:1.5}

<script>
'use strict';

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const SECTORS = [
  {id:'go',  l:'Gros Oeuvre',    cls:'sec-go'},
  {id:'so',  l:'Second Oeuvre',  cls:'sec-so'},
  {id:'be',  l:"Bureau d'Etudes",cls:'sec-be'},
  {id:'vrd', l:'VRD / TP',       cls:'sec-vrd'},
  {id:'hse', l:'HSE / QSE',      cls:'sec-hse'},
  {id:'mgmt',l:'Management',     cls:'sec-mgmt'},
];

const STAGES = [
  {id:'sourcing',  l:'Sourcing',     color:'var(--blue)',  bg:'rgba(37,88,212,.06)'},
  {id:'ready',     l:'Dossier pret', color:'var(--purple)',bg:'rgba(109,40,217,.06)'},
  {id:'presented', l:'Presente',     color:'var(--gold)',  bg:'rgba(200,130,10,.06)'},
  {id:'interview', l:'Entretien',    color:'var(--orange)',bg:'rgba(212,120,26,.06)'},
  {id:'decision',  l:'Decision',     color:'var(--red)',   bg:'rgba(192,57,43,.06)'},
  {id:'placed',    l:'Place',        color:'var(--green)', bg:'rgba(26,155,116,.06)'},
];

const CO_STATUS = [
  {id:'prospect', l:'Prospect',      cls:'tag-gray'},
  {id:'active',   l:'Client actif',  cls:'tag-green'},
  {id:'inactive', l:'Inactif',       cls:'tag-gray'},
];

const CAND_STATUS = [
  {id:'available',   l:'Disponible',       cls:'tag-green'},
  {id:'in_process',  l:'En cours',         cls:'tag-gold'},
  {id:'placed',      l:'Place',            cls:'tag-blue'},
  {id:'unavailable', l:'Non disponible',   cls:'tag-gray'},
];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let DB = {
  companies:  [],  // {id,name,type:'client'|'prospect',status,contact,email,phone,city,sector,notes,createdAt,updatedAt}
  candidates: [],  // {id,name,role,phone,email,status,sector,notes,cv,salary,city,createdAt,updatedAt}
  placements: [],  // {id,clientId,jobTitle,sector,salary,candidateId,stage,stageEnteredAt,notes,createdAt,updatedAt,outcome}
  reminders:  [],  // {id,placementId,type,dueDate,done,createdAt}
  emails:     [],  // sent emails history {id,to,subject,body,placementId,candId,coId,date,sent}
  inbox:      [],  // received emails {uid,from,fromEmail,subject,body,date,seen}
  todos:      [],  // {id,text,priority,done,placementId,dueDate,createdAt}
  trash:      [],
};

let UI = {
  view: 'dashboard',
  panel: null,  // {type:'placement'|'company'|'candidate', id, tab}
  emailView: 'inbox',
  contactTab: 'clients',
  inboxCache: null,
  inboxLoading: false,
};

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const now = () => new Date().toISOString();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fDate = iso => { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); };
const fDateTime = iso => { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); };
const fDateShort = iso => { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); };
const daysDiff = iso => { if(!iso) return 0; return Math.floor((Date.now()-new Date(iso).getTime())/86400000); };
const hoursAgo = iso => { if(!iso) return ''; const h=Math.floor((Date.now()-new Date(iso).getTime())/3600000); if(h<1) return 'il y a moins d\'1h'; if(h<24) return `il y a ${h}h`; return `il y a ${daysDiff(iso)}j`; };
const getSector = id => SECTORS.find(s=>s.id===id)||{id:'',l:'—',cls:'tag-gray'};
const getStage = id => STAGES.find(s=>s.id===id)||STAGES[0];
const getCoById = id => DB.companies.find(c=>c.id===id);
const getCandById = id => DB.candidates.find(c=>c.id===id);
const getPlacById = id => DB.placements.find(p=>p.id===id);

// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
function save() {
  try { localStorage.setItem('novalem_crm_v1', JSON.stringify(DB)); } catch(e) {}
  updateBadges();
}
function load() {
  try {
    const raw = localStorage.getItem('novalem_crm_v1');
    if (raw) {
      const d = JSON.parse(raw);
      DB.companies  = d.companies  || [];
      DB.candidates = d.candidates || [];
      DB.placements = d.placements || [];
      DB.reminders  = d.reminders  || [];
      DB.emails     = d.emails     || [];
      DB.inbox      = d.inbox      || [];
      DB.todos      = d.todos      || [];
      DB.trash      = d.trash      || [];
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
function toast(msg, type='i') {
  const t = document.getElementById('toaster');
  if (!t) return;
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  t.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 250); }, 3500);
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
function openModal(title, body, footer='', wide=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  const box = document.getElementById('modal-box');
  box.style.maxWidth = wide ? '680px' : '560px';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ══════════════════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════════════════
function openPanel(type, id, tab=0) {
  UI.panel = {type, id, tab};
  renderPanel();
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  UI.panel = null;
}
function renderPanel() {
  if (!UI.panel) return;
  const {type, id, tab} = UI.panel;
  if (type === 'placement') renderPlacementPanel(id, tab);
  else if (type === 'company') renderCompanyPanel(id, tab);
  else if (type === 'candidate') renderCandidatePanel(id, tab);
}
function setPanelTab(tab) {
  if (!UI.panel) return;
  UI.panel.tab = tab;
  renderPanel();
}

// ══════════════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════════════
function go(v) {
  UI.view = v;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('view-'+v);
  if (el) el.classList.add('active');
  const titles = {dashboard:'Dashboard',pipeline:'Pipeline',contacts:'Contacts',emails:'Emails'};
  document.getElementById('topbar-title').textContent = titles[v]||v;
  const actions = {
    dashboard: '',
    pipeline: '<button class="btn btn-primary btn-sm" onclick="openAddPlacement()">+ Placement</button>',
    contacts: '<button class="btn btn-primary btn-sm" onclick="openAddCompany()">+ Entreprise</button><button class="btn btn-ghost btn-sm" onclick="openAddCandidate()">+ Candidat</button>',
    emails: '<button class="btn btn-primary btn-sm" onclick="emShowView(\'compose\')">+ Nouveau mail</button>',
  };
  document.getElementById('topbar-actions').innerHTML = actions[v]||'';
  const renderers = {dashboard:renderDashboard,pipeline:renderPipeline,contacts:renderContacts,emails:renderEmails};
  renderers[v]?.();
}

function updateBadges() {
  const actions = computeActions();
  const urgent = actions.filter(a=>a.urgency==='critical').length;
  const badgeUrgent = document.getElementById('badge-urgent');
  if (badgeUrgent) { badgeUrgent.textContent='!'; badgeUrgent.style.display=urgent>0?'inline-flex':'none'; }

  const activePlacements = DB.placements.filter(p=>p.stage!=='placed'&&p.outcome!=='lost').length;
  const bp = document.getElementById('badge-pipeline');
  if (bp) bp.textContent = activePlacements;

  const totalContacts = DB.companies.length + DB.candidates.length;
  const bc = document.getElementById('badge-contacts');
  if (bc) bc.textContent = totalContacts;

  const unread = (DB.inbox||[]).filter(e=>!e.seen).length;
  const bu = document.getElementById('badge-unread');
  if (bu) { bu.textContent=unread; bu.style.display=unread>0?'inline-flex':'none'; }

  // Revenue
  const placed = DB.placements.filter(p=>p.stage==='placed');
  const rev = placed.reduce((s,p)=>s+(p.salary?Math.round(p.salary*0.18):0),0);
  const sbrev = document.getElementById('sb-rev');
  if (sbrev) sbrev.textContent = rev>0 ? rev.toLocaleString('fr-FR')+'€' : '—';
}

// ══════════════════════════════════════════════════════
// SMART REMINDERS — auto-generated from placements
// ══════════════════════════════════════════════════════
function autoRemindersForPlacement(p) {
  const reminders = [];
  const d = daysDiff(p.stageEnteredAt);
  const co = getCoById(p.clientId);
  const cand = getCandById(p.candidateId);
  const clientName = co?.name || 'le client';
  const candName = cand?.name || 'le candidat';

  if (p.stage === 'presented') {
    if (d >= 3) reminders.push({urgency:'critical', text:`Relancer ${clientName} — ${candName} présenté il y a ${d}j sans retour`, action:'call_client', placementId:p.id});
    else if (d >= 1) reminders.push({urgency:'high', text:`Confirmer réception du dossier avec ${clientName}`, action:'call_client', placementId:p.id});
  }
  if (p.stage === 'interview') {
    if (d >= 2) reminders.push({urgency:'critical', text:`Relancer ${clientName} suite entretien — ${d}j sans décision`, action:'call_client', placementId:p.id});
    else reminders.push({urgency:'high', text:`Appeler ${candName} — retour entretien avec ${clientName}`, action:'call_cand', placementId:p.id});
  }
  if (p.stage === 'decision') {
    if (d >= 2) reminders.push({urgency:'critical', text:`URGENT — ${clientName} n'a pas rendu sa décision (${d}j)`, action:'call_client', placementId:p.id});
  }
  if (p.stage === 'sourcing' && d >= 3) {
    reminders.push({urgency:'high', text:`Besoin "${p.jobTitle}" chez ${clientName} — aucun candidat depuis ${d}j`, action:'open_placement', placementId:p.id});
  }
  return reminders;
}

function computeActions() {
  const actions = [];
  // From active placements
  DB.placements.filter(p=>p.stage!=='placed'&&p.outcome!=='lost').forEach(p => {
    autoRemindersForPlacement(p).forEach(r => actions.push(r));
  });
  // From manual todos
  const overdue = DB.todos.filter(t=>!t.done&&t.dueDate&&new Date(t.dueDate)<new Date());
  overdue.forEach(t => actions.push({urgency:'high',text:t.text,action:'todo',todoId:t.id}));
  // Sort: critical first
  const order = {critical:0,high:1,normal:2};
  return actions.sort((a,b)=>(order[a.urgency]||2)-(order[b.urgency]||2));
}

// ══════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════
function renderDashboard() {
  const el = document.getElementById('view-dashboard');
  if (!el) return;

  const actions = computeActions();
  const active = DB.placements.filter(p=>p.stage!=='placed'&&p.outcome!=='lost');
  const placed = DB.placements.filter(p=>p.stage==='placed');
  const clients = DB.companies.filter(c=>c.status==='active');
  const rev = placed.reduce((s,p)=>s+(p.salary?Math.round(p.salary*0.18):0),0);

  const d = new Date();
  const dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const monthNames = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const dateStr = `${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
  const userName = localStorage.getItem('novalem_user_name') || 'Louis';

  const critical = actions.filter(a=>a.urgency==='critical');
  const high = actions.filter(a=>a.urgency==='high');

  const renderAction = a => `
    <div class="action-item ${a.urgency}" onclick="handleAction('${a.action}','${a.placementId||''}','${a.todoId||''}')">
      <div class="urgency-dot ${a.urgency}"></div>
      <div class="action-info">
        <div class="action-title">${esc(a.text)}</div>
        <div class="action-meta">${a.action==='call_client'?'📞 Appel client':(a.action==='call_cand'?'📞 Appel candidat':'⚡ Action requise')}</div>
      </div>
      <div class="action-btn-wrap">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();handleAction('${a.action}','${a.placementId||''}','${a.todoId||''}')">
          ${a.action.startsWith('call')?'Appeler':'Voir'}
        </button>
      </div>
    </div>`;

  const recentPlacements = DB.placements.slice(-3).reverse();

  el.innerHTML = `
    <div class="dash-greeting">
      <div class="dash-greeting-name">Bonjour, ${esc(userName)} 👋</div>
      <div class="dash-greeting-date">${esc(dateStr)}</div>
    </div>
    <div class="dash-kpis">
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--gold)">${active.length}</div>
        <div class="kpi-lbl">Placements actifs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--green)">${placed.length}</div>
        <div class="kpi-lbl">Placés ce mois</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--blue)">${clients.length}</div>
        <div class="kpi-lbl">Clients actifs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--purple)">${rev>0?rev.toLocaleString('fr-FR')+'€':'—'}</div>
        <div class="kpi-lbl">CA estimé</div>
      </div>
    </div>
    <div class="dash-sections">
      <div class="dash-actions-col">
        ${critical.length ? `
          <div class="dash-section-title"><div class="urgency-dot critical"></div> Urgent — action immédiate</div>
          ${critical.map(renderAction).join('')}
        ` : ''}
        ${high.length ? `
          <div class="dash-section-title" style="margin-top:${critical.length?'16px':'0'}"><div class="urgency-dot high"></div> Aujourd'hui</div>
          ${high.map(renderAction).join('')}
        ` : ''}
        ${!actions.length ? `
          <div class="empty-actions">
            <div style="font-size:28px;margin-bottom:8px">✓</div>
            <div style="font-weight:600;color:var(--tx2)">Tout est à jour</div>
            <div>Aucune action urgente en ce moment</div>
          </div>
        ` : ''}
      </div>
      <div>
        <div class="dash-section-title">Pipeline en cours</div>
        ${active.length ? active.slice(0,6).map(p=>{
          const co = getCoById(p.clientId);
          const cand = getCandById(p.candidateId);
          const st = getStage(p.stage);
          const d2 = daysDiff(p.stageEnteredAt);
          const daysCls = d2>=3?'crit':d2>=2?'warn':'ok';
          return `<div class="action-item normal" style="margin-bottom:5px;cursor:pointer" onclick="openPanel('placement','${p.id}')">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(co?.name||'—')} — ${esc(p.jobTitle||'—')}</div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <span class="tag" style="background:${st.bg};color:${st.color};border:1px solid ${st.color}20;font-size:9px">${st.l}</span>
                ${cand?`<span style="font-size:10px;color:var(--tx2)">${esc(cand.name)}</span>`:'<span style="font-size:10px;color:var(--tx3)">Pas de candidat</span>'}
                <span class="p-card-days ${daysCls}" style="margin-left:auto">${d2}j</span>
              </div>
            </div>
          </div>`;
        }).join('') : `<div class="empty-actions">Aucun placement actif.<br><button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="go('pipeline');setTimeout(openAddPlacement,100)">+ Créer un placement</button></div>`}
      </div>
    </div>`;
}

function handleAction(action, placementId, todoId) {
  if (action === 'open_placement' || action === 'call_client' || action === 'call_cand') {
    if (placementId) openPanel('placement', placementId);
  } else if (action === 'todo') {
    if (todoId) {
      const t = DB.todos.find(x=>x.id===todoId);
      if (t) { t.done=true; t.updatedAt=now(); save(); renderDashboard(); toast('Tâche terminée ✓','s'); }
    }
  }
}

// PIPELINE
// ══════════════════════════════════════════════════════
function renderPipeline() {
  const el = document.getElementById('view-pipeline');
  if (!el) return;

  const activePlacements = DB.placements.filter(p=>p.outcome!=='lost');
  let html = '<div class="pipeline-wrap">';

  STAGES.forEach(stage => {
    const cards = activePlacements.filter(p=>p.stage===stage.id);
    const cols = cards.map(p=>{
      const co = getCoById(p.clientId);
      const cand = getCandById(p.candidateId);
      const d = daysDiff(p.stageEnteredAt);
      const urgClass = d>=3?'critical':d>=2?'urgent':'';
      const daysCls = d>=3?'crit':d>=2?'warn':'ok';
      const sec = getSector(p.sector);
      return `<div class="p-card ${urgClass}" onclick="openPanel('placement','${p.id}')">
        <div class="p-card-client">${esc(co?.name||'Client inconnu')}</div>
        <div class="p-card-job">${esc(p.jobTitle||'Poste non défini')}</div>
        ${cand?`<div class="p-card-cand">👤 ${esc(cand.name)}</div>`:'<div class="p-card-cand" style="color:var(--tx3)">Pas de candidat</div>'}
        <div class="p-card-footer">
          <span class="tag ${sec.cls}">${sec.l}</span>
          <span class="p-card-days ${daysCls}">${d === 0 ? 'Aujourd\'hui' : d+'j'}</span>
        </div>
      </div>`;
    }).join('');

    html += `<div class="pipeline-col">
      <div class="pipeline-header" style="background:${stage.bg}">
        <span class="pipeline-header-name" style="color:${stage.color}">${stage.l}</span>
        <span class="pipeline-count" style="color:${stage.color}">${cards.length}</span>
      </div>
      <div class="pipeline-cards">${cols}</div>
      <div class="add-placement-btn" onclick="openAddPlacement('${stage.id}')">+ Placement</div>
    </div>`;
  });

  // Lost column
  const lost = DB.placements.filter(p=>p.outcome==='lost');
  if (lost.length) {
    const lostCards = lost.slice(-5).reverse().map(p=>{
      const co = getCoById(p.clientId);
      return `<div class="p-card" style="opacity:.5" onclick="openPanel('placement','${p.id}')">
        <div class="p-card-client">${esc(co?.name||'—')}</div>
        <div class="p-card-job">${esc(p.jobTitle||'—')}</div>
        <div class="p-card-footer"><span class="tag tag-red">Perdu</span></div>
      </div>`;
    }).join('');
    html += `<div class="pipeline-col">
      <div class="pipeline-header" style="background:var(--red-bg)">
        <span class="pipeline-header-name" style="color:var(--red)">Perdus</span>
        <span class="pipeline-count" style="color:var(--red)">${lost.length}</span>
      </div>
      <div class="pipeline-cards">${lostCards}</div>
    </div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

// CONTACTS
// ══════════════════════════════════════════════════════
function renderContacts() {
  const el = document.getElementById('view-contacts');
  if (!el) return;

  const q = (document.getElementById('contacts-search')||{}).value?.toLowerCase()||'';
  const tab = UI.contactTab;

  const filtered = tab==='clients'
    ? DB.companies.filter(c=>c.type==='client'||c.status==='active').filter(c=>!q||(c.name+' '+(c.contact||'')).toLowerCase().includes(q))
    : tab==='prospects'
    ? DB.companies.filter(c=>c.type==='prospect'&&c.status!=='active').filter(c=>!q||(c.name+' '+(c.contact||'')).toLowerCase().includes(q))
    : DB.candidates.filter(c=>!q||(c.name+' '+(c.role||'')).toLowerCase().includes(q));

  const tabsHtml = `<div class="tabs">
    <div class="tab ${tab==='clients'?'active':''}" onclick="setContactTab('clients')">Clients <span style="color:var(--tx3);font-weight:400">${DB.companies.filter(c=>c.status==='active').length}</span></div>
    <div class="tab ${tab==='prospects'?'active':''}" onclick="setContactTab('prospects')">Prospects <span style="color:var(--tx3);font-weight:400">${DB.companies.filter(c=>c.type==='prospect'&&c.status!=='active').length}</span></div>
    <div class="tab ${tab==='candidates'?'active':''}" onclick="setContactTab('candidates')">Candidats <span style="color:var(--tx3);font-weight:400">${DB.candidates.length}</span></div>
  </div>`;

  let cardsHtml = '';
  if (!filtered.length) {
    cardsHtml = `<div class="empty"><div class="empty-ico">${tab==='candidates'?'👤':'🏢'}</div>Aucun résultat</div>`;
  } else if (tab === 'candidates') {
    cardsHtml = `<div class="contacts-grid">${filtered.map(c=>{
      const st = CAND_STATUS.find(s=>s.id===c.status)||CAND_STATUS[0];
      const sec = getSector(c.sector);
      const placements = DB.placements.filter(p=>p.candidateId===c.id);
      return `<div class="contact-card" onclick="openPanel('candidate','${c.id}')">
        <div class="contact-card-name">${esc(c.name)}</div>
        <div class="contact-card-meta">${esc(c.role||'—')}<br>${esc(c.city||'—')}</div>
        <div class="contact-card-footer">
          <span class="tag ${st.cls}">${st.l}</span>
          <span class="tag ${sec.cls}">${sec.l}</span>
          ${placements.length?`<span class="tag tag-gray">${placements.length} placement(s)</span>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;
  } else {
    cardsHtml = `<div class="contacts-grid">${filtered.map(c=>{
      const st = CO_STATUS.find(s=>s.id===c.status)||CO_STATUS[0];
      const sec = getSector(c.sector);
      const activePl = DB.placements.filter(p=>p.clientId===c.id&&p.stage!=='placed'&&p.outcome!=='lost').length;
      return `<div class="contact-card" onclick="openPanel('company','${c.id}')">
        <div class="contact-card-name">${esc(c.name)}</div>
        <div class="contact-card-meta">${esc(c.contact||'—')}<br>${esc(c.city||'—')}</div>
        <div class="contact-card-footer">
          <span class="tag ${st.cls}">${st.l}</span>
          <span class="tag ${sec.cls}">${sec.l}</span>
          ${activePl?`<span class="tag tag-gold">${activePl} actif</span>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  el.innerHTML = `
    <div class="contacts-toolbar">
      <div class="search-wrap"><input id="contacts-search" placeholder="Rechercher…" oninput="renderContacts()"></div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="${tab==='candidates'?'openAddCandidate()':'openAddCompany(\''+tab+'\')'}">${tab==='candidates'?'+ Candidat':'+ Entreprise'}</button>
      </div>
    </div>
    ${tabsHtml}
    ${cardsHtml}`;

  // Restore search value
  const s = document.getElementById('contacts-search');
  if (s) s.value = q;
}

function setContactTab(tab) {
  UI.contactTab = tab;
  renderContacts();
}

// EMAILS
// ══════════════════════════════════════════════════════
let EM = {to:'',subject:'',body:'',candId:null,coId:null,placementId:null};

function renderEmails() {
  const el = document.getElementById('view-emails');
  if (!el) return;

  const sentCount = DB.emails.length;
  const inboxCount = (DB.inbox||[]).length;
  const trashCount = DB.trash.length;
  const unread = (DB.inbox||[]).filter(e=>!e.seen).length;

  const navItems = [
    {id:'inbox', ico:'📥', l:`Réception${unread?` (${unread})`:''}`, active:UI.emailView==='inbox'},
    {id:'compose', ico:'✉', l:'Composer', active:UI.emailView==='compose'},
    {id:'sent', ico:'📤', l:`Envoyés (${sentCount})`, active:UI.emailView==='sent'},
    {id:'trash', ico:'🗑', l:`Corbeille (${trashCount})`, active:UI.emailView==='trash'},
  ];

  const nav = navItems.map(n=>
    `<div class="email-nav-item ${n.active?'active':''}" onclick="emShowView('${n.id}')">${n.ico} ${n.l}</div>`
  ).join('');

  let mainHtml = '';
  if (UI.emailView === 'inbox') mainHtml = renderInbox();
  else if (UI.emailView === 'compose') mainHtml = renderCompose();
  else if (UI.emailView === 'sent') mainHtml = renderSent();
  else if (UI.emailView === 'trash') mainHtml = renderTrash();

  el.innerHTML = `<div class="email-layout">
    <div class="email-sidebar">${nav}</div>
    <div class="email-main">${mainHtml}</div>
  </div>`;

  // Bind compose events
  if (UI.emailView === 'compose') bindComposeEvents();
  // Bind inbox fetch
  if (UI.emailView === 'inbox' && !UI.inboxCache) emFetchInbox();
}

function emShowView(v) {
  UI.emailView = v;
  if (v === 'compose') { EM={to:'',subject:'',body:'',candId:null,coId:null,placementId:null}; }
  renderEmails();
}

function renderInbox() {
  if (UI.inboxLoading) return '<div style="padding:40px;text-align:center;color:var(--tx2)"><span style="animation:spin .8s linear infinite;display:inline-block">⟳</span> Chargement…</div>';
  const emails = UI.inboxCache || DB.inbox;
  const unlinked = emails.filter(e=>!e.seen).length;

  const refreshBtn = `<div class="email-toolbar">
    <span style="font-size:11px;color:var(--tx2)">${emails.length} email(s)${unlinked?` · <span style="color:var(--gold)">${unlinked} non lu(s)</span>`:''}</span>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto" id="refresh-btn" onclick="emFetchInbox(true)">↻ Actualiser</button>
  </div>`;

  if (!emails.length) return refreshBtn + '<div class="empty"><div class="empty-ico">📭</div>Boîte vide</div>';

  const rows = emails.map((e,i)=>`
    <div class="inbox-item ${e.seen?'':'unread'}" onclick="emOpenInbox(${i})">
      <div class="inbox-dot ${e.seen?'read':''}"></div>
      <div class="inbox-body">
        <div class="inbox-from">${esc(e.from||e.fromEmail||'—')}</div>
        <div class="inbox-subject">${esc(e.subject||'(sans objet)')}</div>
        <div class="inbox-snip">${esc(e.snippet||e.body?.slice(0,80)||'')}</div>
      </div>
      <div class="inbox-date">${hoursAgo(e.date)}</div>
    </div>`).join('');

  return refreshBtn + `<div class="inbox-scroll">${rows}</div>`;
}

function renderCompose() {
  const candOpts = DB.candidates.map(c=>`<option value="cand:${c.id}">${esc(c.name)}</option>`).join('');
  const coOpts = DB.companies.map(c=>`<option value="co:${c.id}">${esc(c.name)}</option>`).join('');
  return `
    <div class="compose-area">
      <div class="compose-field">
        <span class="compose-label">À</span>
        <input id="em-to" class="compose-input" placeholder="destinataire@email.com" value="${esc(EM.to||'')}">
      </div>
      <div class="compose-field">
        <span class="compose-label">Contact</span>
        <select id="em-contact" class="compose-input" style="background:transparent;border:none;box-shadow:none">
          <option value="">Lier à un contact…</option>
          <optgroup label="Candidats">${candOpts}</optgroup>
          <optgroup label="Entreprises">${coOpts}</optgroup>
        </select>
      </div>
      <div class="compose-field">
        <span class="compose-label">Objet</span>
        <input id="em-subject" class="compose-input" placeholder="Objet de l'email" value="${esc(EM.subject||'')}">
      </div>
      <textarea id="em-body" class="compose-body" placeholder="Votre message…">${esc(EM.body||'')}</textarea>
    </div>
    <div class="compose-footer">
      <button class="btn btn-primary" id="em-send-btn">Envoyer</button>
      <button class="btn btn-ghost btn-sm" onclick="emSaveDraft()">Brouillon</button>
      <select id="em-tpl" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="emApplyTpl()">
        <option value="">Templates…</option>
        <option value="precal">Confirmation précal + dossier</option>
        <option value="relance">Relance candidat</option>
        <option value="cvco">Envoi CV au client</option>
        <option value="retour_entretien">Retour entretien</option>
      </select>
    </div>`;
}

function bindComposeEvents() {
  const sendBtn = document.getElementById('em-send-btn');
  if (sendBtn) sendBtn.addEventListener('click', emSend);
  const toEl = document.getElementById('em-to');
  if (toEl) toEl.addEventListener('input', e => EM.to=e.target.value);
  const subEl = document.getElementById('em-subject');
  if (subEl) subEl.addEventListener('input', e => EM.subject=e.target.value);
  const bodyEl = document.getElementById('em-body');
  if (bodyEl) bodyEl.addEventListener('input', e => EM.body=e.target.value);
}

function emApplyTpl() {
  const key = document.getElementById('em-tpl')?.value;
  if (!key) return;
  const userName = localStorage.getItem('novalem_user_name')||'';
  const userTel = localStorage.getItem('novalem_user_tel')||'';
  const sig = `\n\nCordialement,\n${userName}${userTel?'\n'+userTel:''}\nNovalem — Cabinet de recrutement BTP`;
  const tpls = {
    precal: {sub:'Novalem — Suite à notre échange',body:`Bonjour,\n\nSuite à notre échange téléphonique, je vous confirme notre entretien visio.\n\nN'hésitez pas à me contacter si vous avez des questions.${sig}`},
    relance: {sub:'Relance — Dossier de candidature',body:`Bonjour,\n\nJe me permets de vous relancer concernant votre dossier de candidature.\n\nSans les documents complets, je ne pourrai pas transmettre votre profil à nos clients.${sig}`},
    cvco: {sub:'Novalem — Profil candidat',body:`Bonjour,\n\nJe me permets de vous faire parvenir le profil d'un candidat correspondant à votre recherche.\n\nJe reste disponible pour en discuter.${sig}`},
    retour_entretien: {sub:'Novalem — Retour entretien',body:`Bonjour,\n\nSuite à l'entretien qui a eu lieu, je reviens vers vous pour avoir votre retour.\n\nDans l'attente de vous lire.${sig}`},
  };
  const tpl = tpls[key];
  if (!tpl) return;
  const subEl = document.getElementById('em-subject');
  const bodyEl = document.getElementById('em-body');
  if (subEl) { subEl.value=tpl.sub; EM.subject=tpl.sub; }
  if (bodyEl) { bodyEl.value=tpl.body; EM.body=tpl.body; }
}

async function emSend() {
  const to = document.getElementById('em-to')?.value?.trim();
  const subject = document.getElementById('em-subject')?.value?.trim();
  const body = document.getElementById('em-body')?.value?.trim();
  if (!to || !subject || !body) { toast('Remplissez tous les champs','w'); return; }

  const contactVal = document.getElementById('em-contact')?.value||'';
  let candId=null, coId=null;
  if (contactVal.startsWith('cand:')) candId=contactVal.slice(5);
  if (contactVal.startsWith('co:')) coId=contactVal.slice(3);

  const apiBase = getApiBase();
  if (apiBase) {
    try {
      const btn = document.getElementById('em-send-btn');
      if (btn) { btn.disabled=true; btn.textContent='Envoi…'; }
      const r = await fetch(`${apiBase}/api/send-email`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,subject,body:body.replace(/\n/g,'<br>')})});
      const d = await r.json();
      if (!r.ok) throw new Error(d.error||'Erreur serveur');
      toast('Email envoyé ✓','s');
    } catch(err) {
      toast('Erreur envoi: '+err.message,'e');
    }
  } else {
    toast('Email enregistré (envoi via Vercel uniquement)','i');
  }

  DB.emails.push({id:uid(),to,subject,body,candId,coId,date:now(),sent:!!apiBase});
  save();
  EM={to:'',subject:'',body:'',candId:null,coId:null};
  emShowView('sent');
}

function emSaveDraft() {
  toast('Brouillon disponible dans votre client mail','i');
}

function renderSent() {
  if (!DB.emails.length) return '<div class="empty"><div class="empty-ico">📤</div>Aucun email envoyé</div>';
  const unlinked = DB.emails.filter(e=>!e.candId&&!e.coId).length;
  const warn = unlinked ? `<div style="padding:8px 14px;background:var(--orange-bg);border-bottom:2px solid var(--orange);font-size:11px;color:var(--orange);display:flex;align-items:center;gap:6px;flex-shrink:0">⚠ ${unlinked} email(s) non liés à un contact</div>` : '';
  const rows = [...DB.emails].reverse().map((e,i)=>{
    const contact = e.candId?getCandById(e.candId):e.coId?getCoById(e.coId):null;
    return `<div class="inbox-item" style="justify-content:space-between">
      <div class="inbox-body" style="cursor:pointer" onclick="emReopenSent(${DB.emails.length-1-i})">
        <div class="inbox-from">${esc(e.to||'—')}${contact?` (${esc(contact.name)})`:''}</div>
        <div class="inbox-subject">${esc(e.subject||'—')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="inbox-date">${fDateShort(e.date)}</span>
        <span class="tag ${e.sent?'tag-green':'tag-gray'}">${e.sent?'Envoyé':'Local'}</span>
        <button onclick="emDeleteSent(${DB.emails.length-1-i})" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1" title="Supprimer">×</button>
      </div>
    </div>`;
  }).join('');
  return warn + `<div class="inbox-scroll">${rows}</div>`;
}

function emReopenSent(i) {
  const m = DB.emails[i];
  if (!m) return;
  EM = {to:m.to,subject:'Re: '+m.subject,body:'\n\n---\n'+m.body,candId:m.candId,coId:m.coId};
  emShowView('compose');
}

function emDeleteSent(i) {
  const m = DB.emails[i];
  if (!m) return;
  DB.trash.push({...m,deletedAt:now(),origin:'sent'});
  DB.emails.splice(i,1);
  save(); renderEmails(); toast('Mis en corbeille','s');
}

function renderTrash() {
  if (!DB.trash.length) return '<div class="empty"><div class="empty-ico">🗑</div>Corbeille vide</div>';
  const header = `<div class="email-toolbar"><span class="fs11 tx2">${DB.trash.length} élément(s)</span><button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="emEmptyTrash()">Vider</button></div>`;
  const rows = DB.trash.map((m,i)=>`
    <div class="inbox-item" style="justify-content:space-between">
      <div class="inbox-body">
        <div class="inbox-from">${esc(m.to||m.from||'—')}</div>
        <div class="inbox-subject">${esc(m.subject||'—')}</div>
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <button class="btn btn-ghost btn-xs" onclick="emRestore(${i})">↩</button>
        <button onclick="emPermDelete(${i})" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 2px">×</button>
      </div>
    </div>`).join('');
  return header + `<div class="inbox-scroll">${rows}</div>`;
}

function emRestore(i) { const m=DB.trash[i];if(!m)return;const r={...m};delete r.deletedAt;delete r.origin;DB.emails.push(r);DB.trash.splice(i,1);save();renderEmails();toast('Restauré','s'); }
function emPermDelete(i) { DB.trash.splice(i,1);save();renderEmails();toast('Supprimé','w'); }
function emEmptyTrash() { DB.trash=[];save();renderEmails();toast('Corbeille vidée','w'); }
function emOpenInbox(i) {
  const emails = UI.inboxCache||DB.inbox;
  const e = emails[i]; if(!e)return;
  e.seen=true;
  openModal('Email — '+esc(e.subject||'sans objet'),`
    <div class="detail-row"><span class="detail-key">De</span><span class="detail-val">${esc(e.from||'—')}</span></div>
    <div class="detail-row"><span class="detail-key">Date</span><span class="detail-val">${fDateTime(e.date)}</span></div>
    <div class="detail-row mb8"><span class="detail-key">Objet</span><span class="detail-val">${esc(e.subject||'—')}</span></div>
    <div style="background:var(--surf2);border:1px solid var(--brd);border-radius:var(--radius-sm);padding:12px 14px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word">${esc(e.text||e.body||'(vide)')}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-primary btn-sm" onclick="closeModal();emShowView('compose')">Répondre</button>`);
  updateBadges();
}

async function emFetchInbox(force=false) {
  const apiBase = getApiBase();
  if (!apiBase) return;
  if (UI.inboxLoading&&!force) return;
  UI.inboxLoading = true;
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span style="animation:spin .7s linear infinite;display:inline-block">⟳</span>'; }
  try {
    const r = await fetch(`${apiBase}/api/imap`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error||'Erreur');
    UI.inboxCache = d.emails||[];
    updateBadges();
  } catch(err) {
    toast('IMAP: '+err.message,'e');
  }
  UI.inboxLoading = false;
  if (UI.view==='emails'&&UI.emailView==='inbox') renderEmails();
}

function getApiBase() {
  const h = window.location.hostname;
  if (h==='localhost'||h===''||h.endsWith('.html')) return null;
  return window.location.origin;
}

function setPlacementStage(id, stage) {
  const p = getPlacById(id); if(!p)return;
  p.stage = stage; p.stageEnteredAt = now(); p.updatedAt = now();
  delete p.outcome;
  save();
  toast('Étape mise à jour → '+getStage(stage).l, 's');
  renderPanel();
  if (UI.view==='pipeline') renderPipeline();
  if (UI.view==='dashboard') renderDashboard();
}

function markPlaced(id) {
  const p = getPlacById(id); if(!p)return;
  p.stage = 'placed'; p.outcome = 'placed'; p.stageEnteredAt = now(); p.updatedAt = now();
  save(); closePanel();
  toast('Placement confirmé ! 🎉', 's');
  if (UI.view==='pipeline') renderPipeline();
  if (UI.view==='dashboard') renderDashboard();
}

function markLost(id) {
  const p = getPlacById(id); if(!p)return;
  p.outcome = 'lost'; p.updatedAt = now();
  save(); closePanel();
  toast('Placement marqué comme perdu', 'w');
  if (UI.view==='pipeline') renderPipeline();
  if (UI.view==='dashboard') renderDashboard();
}

function addTodoForPlacement(placementId, inp) {
  const txt = inp?.value?.trim();
  if (!txt) { if(inp){inp.style.borderColor='var(--red)';setTimeout(()=>{inp.style.borderColor='';},800);} return; }
  DB.todos.push({id:uid(),text:txt,priority:'m',done:false,placementId,createdAt:now()});
  save(); inp.value='';
  renderPanel(); toast('Tâche ajoutée','s');
}
function toggleTodo(id) { const t=DB.todos.find(x=>x.id===id);if(!t)return;t.done=!t.done;t.updatedAt=now();save();renderPanel(); }
function deleteTodo(id) { DB.todos=DB.todos.filter(x=>x.id!==id);save();renderPanel(); }

function sectorOpts(sel='') {
  return SECTORS.map(s=>`<option value="${s.id}" ${sel===s.id?'selected':''}>${s.l}</option>`).join('');
}

function openAddPlacement(defaultStage='sourcing', defaultCoId='', defaultCandId='') {
  const coOpts = DB.companies.map(c=>`<option value="${c.id}" ${c.id===defaultCoId?'selected':''}>${esc(c.name)}</option>`).join('');
  const candOpts = DB.candidates.map(c=>`<option value="${c.id}" ${c.id===defaultCandId?'selected':''}>${esc(c.name)}</option>`).join('');
  const stageOpts = STAGES.map(s=>`<option value="${s.id}" ${s.id===defaultStage?'selected':''}>${s.l}</option>`).join('');

  openModal('Nouveau placement', `
    <div class="fgrp"><label class="lbl">Client *</label><select id="f-co"><option value="">Choisir un client…</option>${coOpts}</select></div>
    <div class="fgrp"><label class="lbl">Poste recherché *</label><input id="f-job" placeholder="Ex: Conducteur de travaux GO"></div>
    <div class="frow">
      <div class="fgrp"><label class="lbl">Secteur BTP</label><select id="f-sec">${sectorOpts()}</select></div>
      <div class="fgrp"><label class="lbl">Salaire cible (€/an)</label><input id="f-sal" type="number" placeholder="45000"></div>
    </div>
    <div class="fgrp"><label class="lbl">Candidat (optionnel)</label><select id="f-cand"><option value="">Aucun pour l'instant</option>${candOpts}</select></div>
    <div class="fgrp"><label class="lbl">Étape initiale</label><select id="f-stage">${stageOpts}</select></div>
    <div class="fgrp"><label class="lbl">Notes</label><textarea id="f-notes" placeholder="Contexte, exigences spécifiques…"></textarea></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" id="save-placement-btn">Créer le placement</button>`
  );
  document.getElementById('save-placement-btn')?.addEventListener('click', savePlacement);
}

function savePlacement() {
  const coId = document.getElementById('f-co')?.value;
  const jobTitle = document.getElementById('f-job')?.value?.trim();
  if (!coId || !jobTitle) { toast('Client et poste requis','w'); return; }
  const p = {
    id:uid(), clientId:coId, jobTitle,
    sector:document.getElementById('f-sec')?.value||'go',
    salary:parseInt(document.getElementById('f-sal')?.value)||0,
    candidateId:document.getElementById('f-cand')?.value||null,
    stage:document.getElementById('f-stage')?.value||'sourcing',
    stageEnteredAt:now(), notes:document.getElementById('f-notes')?.value||'',
    createdAt:now(), updatedAt:now(),
  };
  DB.placements.push(p); save(); closeModal();
  toast('Placement créé ✓','s');
  if(UI.view==='pipeline') renderPipeline();
  if(UI.view==='dashboard') renderDashboard();
}

function openEditPlacement(id) {
  const p = getPlacById(id); if(!p)return;

// ══════════════════════════════════════════════════════
// JARVIS — push-to-talk + IA
// ══════════════════════════════════════════════════════
var JV = {state:'idle',sr:null,tr:'',hist:[],pending:[]};

function jvToggle() {
  document.getElementById('jv-panel').classList.add('open');
  if (JV.state==='idle'||JV.state==='ready') jvStart();
  else if (JV.state==='listening') jvStop();
}
function jvClose() { jvStop(); document.getElementById('jv-panel').classList.remove('open'); JV.state='idle'; jvMode('idle'); }

function jvMode(m) {
  JV.state = m;
  const btn = document.getElementById('jv-btn');
  const mel = document.getElementById('jv-mode');
  if (!btn) return;
  btn.className = '';
  const M = {idle:{i:'🎙',c:'',t:'En attente'},listening:{i:'🔴',c:'listening',t:'Écoute — re-cliquez pour envoyer'},thinking:{i:'⚙',c:'thinking',t:'Analyse…'},ready:{i:'✅',c:'',t:'Confirmez'}};
  const x = M[m]||M.idle;
  btn.textContent = x.i;
  if (x.c) btn.classList.add(x.c);
  if (mel) mel.textContent = x.t;
}
function jvTr(t) { const el=document.getElementById('jv-tr');if(!el)return;el.textContent=t||'';el.style.color=t?'rgba(221,216,206,.8)':'rgba(221,216,206,.3)';el.style.fontStyle=t?'normal':'italic'; }
function jvStat(t) { const el=document.getElementById('jv-stat2');if(el)el.textContent=t; }
function jvMsg(role, txt) {
  const el=document.getElementById('jv-msgs');if(!el)return;
  const d=document.createElement('div');d.className=role==='user'?'jv-user':'jv-ai';d.textContent=txt;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function jvStart() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { toast('Reconnaissance vocale non disponible sur ce navigateur','w'); return; }
  jvTr('');JV.tr='';jvMode('listening');jvStat('Parlez… re-cliquez pour terminer');
  JV.sr = new SR();JV.sr.lang='fr-FR';JV.sr.continuous=true;JV.sr.interimResults=true;
  JV.sr.onresult = e => { let i='',f='';for(let x=e.resultIndex;x<e.results.length;x++){const t=e.results[x][0].transcript;if(e.results[x].isFinal)f+=t;else i+=t;}if(f)JV.tr+=f;jvTr((JV.tr+i).trim()||'…'); };
  JV.sr.onerror = e => { if(e.error==='no-speech'||e.error==='aborted')return;toast('Micro: '+e.error,'w');jvMode('idle'); };
  JV.sr.onend = () => { if(JV.state==='listening'){try{JV.sr.start();}catch(e){}} };
  try { JV.sr.start(); } catch(e) { toast('Impossible de démarrer le micro','e');jvMode('idle'); }
}
function jvStop() {
  if (JV.sr) { JV.sr.onend=null;try{JV.sr.stop();}catch(e){}JV.sr=null; }
  const t = JV.tr.trim();
  if (t&&JV.state==='listening') jvAnalyze(t);
  else if(JV.state==='listening') { jvMode('idle');jvStat('Rien entendu'); }
}
function jvSend() { const inp=document.getElementById('jv-input');const t=inp?inp.value.trim():'';if(!t)return;if(inp)inp.value='';jvAnalyze(t); }

async function jvAnalyze(text) {
  jvMode('thinking');jvStat('Analyse…');jvTr('');jvMsg('user',text);
  const actEl=document.getElementById('jv-acts2');if(actEl)actEl.style.display='none';
  const key=getApiKey();
  if (!key) { jvMsg('assistant','Clé API Anthropic manquante — configurez dans Paramètres.');jvMode('idle');return; }
  const ctx = {
    date: new Date().toLocaleDateString('fr-FR'),
    placements_actifs: DB.placements.filter(p=>p.stage!=='placed'&&p.outcome!=='lost').slice(0,10).map(p=>{const co=getCoById(p.clientId);const cand=getCandById(p.candidateId);return{id:p.id,client:co?.name,poste:p.jobTitle,candidat:cand?.name,etape:getStage(p.stage).l,depuis:daysDiff(p.stageEnteredAt)+'j'};}),
    entreprises: DB.companies.slice(0,15).map(c=>({id:c.id,name:c.name,status:c.status})),
    candidats: DB.candidates.slice(0,15).map(c=>({id:c.id,name:c.name,role:c.role,status:c.status})),
  };
  const sys = 'Tu es Jarvis, assistant CRM NOVALEM recrutement BTP CDI. Contexte: '+JSON.stringify(ctx)+'. Reponds UNIQUEMENT en JSON: {"message":"reponse courte","actions":[{"type":"TYPE","label":"texte bouton","data":{}}]}. Types disponibles: set_stage(data:placementId,stage sourcing|ready|presented|interview|decision|placed), mark_placed(data:placementId), mark_lost(data:placementId), open_placement(data:placementId), open_company(data:companyId), open_candidate(data:candidateId), navigate(data:view dashboard|pipeline|contacts|emails), add_todo(data:text,priority h|m|l,placementId optionnel), add_company(data:name,type prospect|client), add_candidate(data:name,role). JSON uniquement sans markdown.';
  const msgs = JV.hist.slice(-6).concat([{role:'user',content:text}]);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:sys,messages:msgs})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error?.message||'Erreur API');
    const raw = (d.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim().replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
    const p = JSON.parse(raw);
    JV.hist.push({role:'user',content:text});JV.hist.push({role:'assistant',content:p.message||''});
    jvMsg('assistant',p.message||'…');
    JV.pending=p.actions||[];jvActions(JV.pending);
  } catch(err) { jvMsg('assistant','Erreur: '+err.message);jvMode('idle');jvStat(''); }
}

function jvActions(acts) {
  const el=document.getElementById('jv-acts2');if(!el)return;
  if(!acts||!acts.length){el.style.display='none';jvMode('idle');jvStat('');return;}
  el.style.display='flex';
  el.innerHTML=acts.map((a,i)=>`<button class="jv-act" onclick="jvExec(${i})">${esc(a.label||'Action '+(i+1))}</button>`).join('')+'<button class="jv-act" onclick="jvClearActs()" style="opacity:.5;margin-left:auto">Ignorer</button>';
  jvMode('ready');jvStat(acts.length+' action(s)');
}

function jvExec(i) {
  const a=JV.pending[i];if(!a)return;const d=a.data||{};
  if(a.type==='set_stage'){setPlacementStage(d.placementId,d.stage);}
  else if(a.type==='mark_placed'){markPlaced(d.placementId);}
  else if(a.type==='mark_lost'){markLost(d.placementId);}
  else if(a.type==='open_placement'){openPanel('placement',d.placementId);}
  else if(a.type==='open_company'){openPanel('company',d.companyId);}
  else if(a.type==='open_candidate'){openPanel('candidate',d.candidateId);}
  else if(a.type==='navigate'){go(d.view);}
  else if(a.type==='add_todo'){DB.todos.push({id:uid(),text:d.text||'Tâche',priority:d.priority||'m',done:false,placementId:d.placementId||null,createdAt:now()});save();toast('Tâche ajoutée ✓','s');}
  else if(a.type==='add_company'){openAddCompany(d.type||'prospect');setTimeout(()=>{const el=document.getElementById('f-name');if(el)el.value=d.name||'';},100);}
  else if(a.type==='add_candidate'){openAddCandidate();setTimeout(()=>{const n=document.getElementById('f-name');if(n)n.value=d.name||'';const r=document.getElementById('f-role');if(r)r.value=d.role||'';},100);}
  JV.pending.splice(i,1);jvActions(JV.pending);
}
function jvClearActs(){JV.pending=[];const el=document.getElementById('jv-acts2');if(el)el.style.display='none';jvMode('idle');jvStat('');}

// AGENDA NOTIFICATIONS
// ══════════════════════════════════════════════════════
function showNotif(msg, onclick) {
  const bar=document.getElementById('notif-bar');if(!bar)return;
  const div=document.createElement('div');div.className='notif';
  div.innerHTML=`<span>${esc(msg)}</span><span onclick="this.closest('.notif').remove()" style="margin-left:auto;font-size:14px;opacity:.6;padding:0 4px;cursor:pointer">×</span>`;
  if(onclick)div.style.cursor='pointer',div.addEventListener('click',onclick);
  bar.appendChild(div);
  setTimeout(()=>{if(div.parentNode)div.remove();},15000);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  load();

  // Nav click handler
  document.querySelectorAll('.sb-item[data-view]').forEach(el => {
    el.addEventListener('click', () => go(el.dataset.view));
  });

  // Keyboard: Escape closes panel/modal
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') {
      if (document.getElementById('modal').classList.contains('open')) closeModal();
      else closePanel();
    }
  });

  // Jarvis input
  const jvInp = document.getElementById('jv-input');
  if (jvInp) jvInp.addEventListener('keydown', e => { if(e.key==='Enter')jvSend(); });

  // Auto-check urgent actions every 5 min
  setInterval(() => {
    updateBadges();
    const actions = computeActions();
    const critical = actions.filter(a=>a.urgency==='critical');
    if (critical.length && UI.view!=='dashboard') {
      showNotif(critical[0].text, () => go('dashboard'));
    }
  }, 5*60*1000);

  // Load sample data if empty
  if (!DB.companies.length && !DB.placements.length) loadSampleData();

  go('dashboard');
  updateBadges();
});
