<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#F4F0E8;--surf:#FFFFFF;--surf2:#FAF7F2;--surf3:#F2EDE4;
  --brd:#E2DBD0;--brd2:#CEC6B8;
  --tx:#17150E;--tx2:#6B6355;--tx3:#A8A090;
  --gold:#C8820A;--gbg:rgba(200,130,10,.08);--gbrd:rgba(200,130,10,.18);
  --green:#1A9B74;--gbg2:rgba(26,155,116,.08);--gbrd2:rgba(26,155,116,.18);
  --red:#C0392B;--rbg:rgba(192,57,43,.08);--rbrd:rgba(192,57,43,.18);
  --orange:#D4781A;--obg:rgba(212,120,26,.08);--obrd:rgba(212,120,26,.18);
  --blue:#2558D4;--bbg:rgba(37,88,212,.08);--bbrd:rgba(37,88,212,.18);
  --purple:#6D28D9;--pbg:rgba(109,40,217,.08);--pbrd:rgba(109,40,217,.18);
  --sb:#0D1B2A;--sb-brd:rgba(255,255,255,.07);--sbt:#DDD8CE;--sbm:rgba(221,216,206,.42);
  --sh:0 1px 3px rgba(23,21,14,.05),0 2px 8px rgba(23,21,14,.04);
  --sh2:0 2px 12px rgba(23,21,14,.1),0 1px 4px rgba(23,21,14,.06);
  --r:6px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:grid;grid-template-columns:216px 1fr}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
#sb{background:var(--sb);display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--sb-brd);flex-shrink:0}
.sb-logo{padding:20px 16px 15px;border-bottom:1px solid var(--sb-brd)}
.sb-logo-mark{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--sbt);letter-spacing:-.3px}.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:9px;color:var(--sbm);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--sbm);font-size:11px;font-weight:500;transition:.15s;user-select:none;border:1px solid transparent}
.ni:hover{background:rgba(255,255,255,.06);color:var(--sbt)}.ni.act{background:rgba(200,130,10,.13);color:var(--gold);border-color:rgba(200,130,10,.18)}
.ni-ico{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;min-width:16px;text-align:center}
.nb-r{background:rgba(192,57,43,.3);color:#ff8a7a}.nb-g{background:rgba(200,130,10,.25);color:#ffb84d}.nb-d{background:rgba(255,255,255,.08);color:var(--sbm)}
.sb-foot{padding:10px 12px;border-top:1px solid var(--sb-brd)}
.sb-rev{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#5ddabd;margin-bottom:1px}.sb-rev-lbl{font-size:9px;color:var(--sbm)}
.sb-settings{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;color:var(--sbm);font-size:10px;transition:.15s;border-radius:var(--r)}.sb-settings:hover{color:var(--sbt);background:rgba(255,255,255,.04)}
#main{display:grid;grid-template-rows:50px 1fr;height:100vh;overflow:hidden;min-width:0}
.topbar{border-bottom:1px solid var(--brd);padding:0 22px;display:flex;align-items:center;gap:10px;background:var(--surf);flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex:1}
.topbar-acts{display:flex;gap:6px;align-items:center}
#content{overflow:auto;padding:20px 22px;background:var(--bg)}
.view{display:none}.view.active{display:block}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;line-height:1;white-space:nowrap}
.btn-p{background:var(--gold);color:#fff;box-shadow:0 1px 4px rgba(200,130,10,.2)}.btn-p:hover{background:#b57209}
.btn-g{background:var(--surf);color:var(--tx2);border:1px solid var(--brd)}.btn-g:hover{color:var(--tx);background:var(--surf2);border-color:var(--brd2)}
.btn-d{background:transparent;color:var(--red);border:1px solid var(--rbrd)}.btn-d:hover{background:var(--rbg)}
.btn-s{background:transparent;color:var(--green);border:1px solid var(--gbrd2)}.btn-s:hover{background:var(--gbg2)}
.btn-sm{padding:4px 10px;font-size:10px}.btn-xs{padding:2px 7px;font-size:10px}
input,select,textarea{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:7px 10px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none;width:100%;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gbg)}
input::placeholder,textarea::placeholder{color:var(--tx3)}
textarea{min-height:80px;resize:vertical;line-height:1.6}
.lbl{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.fgrp{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.tg{background:var(--gbg);color:var(--gold);border:1px solid var(--gbrd)}
.tgr{background:var(--gbg2);color:var(--green);border:1px solid var(--gbrd2)}
.tr{background:var(--rbg);color:var(--red);border:1px solid var(--rbrd)}
.to{background:var(--obg);color:var(--orange);border:1px solid var(--obrd)}
.tb{background:var(--bbg);color:var(--blue);border:1px solid var(--bbrd)}
.tp{background:var(--pbg);color:var(--purple);border:1px solid var(--pbrd)}
.td{background:var(--surf3);color:var(--tx2);border:1px solid var(--brd)}
.sgo{background:#FEF3E2;color:#92400E;border:1px solid #FDE68A}
.sso{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.sbe{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.svrd{background:#FDF4FF;color:#6B21A8;border:1px solid #E9D5FF}
.shse{background:#FFF1F2;color:#9F1239;border:1px solid #FECDD3}
.smgmt{background:#F0F9FF;color:#0C4A6E;border:1px solid #BAE6FD}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh)}
.kpi-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1;margin-bottom:2px}
.kpi-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em}
.dash-grid{display:grid;grid-template-columns:1fr 310px;gap:16px}
.dash-sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.action-item{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.action-item:hover{box-shadow:var(--sh2);border-color:var(--brd2)}
.action-item.critical{border-left:3px solid var(--red);background:linear-gradient(90deg,var(--rbg) 0%,var(--surf) 75%)}
.action-item.high{border-left:3px solid var(--orange);background:linear-gradient(90deg,var(--obg) 0%,var(--surf) 75%)}
.action-item.normal{border-left:3px solid var(--green)}
.action-title{font-size:12px;font-weight:600;margin-bottom:2px}
.action-meta{font-size:10px;color:var(--tx2)}
.udot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.udot.critical{background:var(--red)}.udot.high{background:var(--orange)}.udot.normal{background:var(--green)}.udot.info{background:var(--blue)}
.empty-state{padding:40px 20px;text-align:center;color:var(--tx3);font-size:12px;line-height:2;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2)}
.pipeline-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;height:calc(100vh - 110px)}
.pcol{width:210px;flex-shrink:0;display:flex;flex-direction:column}
.pcol-head{padding:8px 10px;border-radius:var(--r);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.pcol-head-name{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.pcol-cnt{font-size:10px;opacity:.6}
.pcol-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:2px}
.p-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:10px 11px;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.p-card:hover{box-shadow:var(--sh2);border-color:var(--brd2);transform:translateY(-1px)}
.p-card.warn{border-left:3px solid var(--orange)}.p-card.crit{border-left:3px solid var(--red)}.p-card.nodocs{border-left:3px solid var(--purple)}
.p-card-client{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-job{font-size:10px;color:var(--tx2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-cand{font-size:10px;padding:3px 7px;background:var(--surf2);border:1px solid var(--brd);border-radius:4px;display:inline-block;margin-bottom:6px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-footer{display:flex;justify-content:space-between;align-items:center}
.p-days{font-size:10px;font-weight:700}.p-days.ok{color:var(--tx3)}.p-days.warn{color:var(--orange)}.p-days.crit{color:var(--red)}
.add-card-btn{background:var(--surf2);border:1px dashed var(--brd2);border-radius:var(--r);padding:8px;text-align:center;cursor:pointer;color:var(--tx3);font-size:11px;transition:.15s;flex-shrink:0}
.add-card-btn:hover{background:var(--surf3);color:var(--tx2);border-color:var(--gold)}
.tabs-bar{display:flex;gap:2px;padding:3px;background:var(--surf3);border-radius:var(--r);width:fit-content;margin-bottom:14px}
.tab-btn{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--tx2);transition:.12s;user-select:none}
.tab-btn.act{background:var(--surf);color:var(--tx);box-shadow:var(--sh)}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
.contact-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:13px 14px;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.contact-card:hover{box-shadow:var(--sh2);border-color:var(--brd2)}
.contact-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px}
.contact-meta{font-size:10px;color:var(--tx2);line-height:1.6}
.contact-footer{display:flex;gap:5px;align-items:center;margin-top:8px;flex-wrap:wrap}
.docs-bar{height:4px;border-radius:2px;background:var(--brd);margin-top:6px;overflow:hidden}
.docs-fill{height:100%;border-radius:2px;transition:width .3s}
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.srch-wrap{position:relative;flex:1;min-width:180px;max-width:260px}
.srch-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.srch-wrap input{padding-left:28px}
.em-layout{display:grid;grid-template-columns:188px 1fr;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.em-nav{border-right:1px solid var(--brd);padding:10px 6px;display:flex;flex-direction:column;gap:2px}
.em-nav-btn{padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:7px;transition:.12s;user-select:none;font-weight:500}
.em-nav-btn:hover{background:var(--surf2);color:var(--tx)}.em-nav-btn.act{background:var(--gbg);color:var(--gold);font-weight:600}
.em-nav-cnt{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:8px;background:var(--surf3);color:var(--tx3);font-weight:600}
.em-main{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.em-toolbar{padding:9px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surf2)}
.inbox-scroll{overflow-y:auto;flex:1;min-height:0}
.inbox-row{padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer;transition:.12s;display:flex;gap:10px;align-items:flex-start}
.inbox-row:hover{background:var(--surf2)}.inbox-row.unread{background:rgba(200,130,10,.03)}
.inbox-row.unread .inbox-subj{font-weight:700;color:var(--gold)}
.inbox-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px}.inbox-dot.read{background:transparent}
.inbox-body2{flex:1;min-width:0}
.inbox-from{font-size:11px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-subj{font-size:11px;color:var(--tx);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-snip{font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-date2{font-size:10px;color:var(--tx3);flex-shrink:0}
.compose-area{padding:14px;display:flex;flex-direction:column;flex:1;overflow-y:auto;min-height:0}
.compose-field{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--brd);padding-bottom:8px;margin-bottom:8px}
.compose-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding-top:8px;min-width:40px;font-weight:600}
.compose-inp{background:none;border:none;box-shadow:none;font-size:12px;padding:6px 0;flex:1}
.compose-inp:focus{box-shadow:none;border-color:transparent}
.compose-body{border:none;background:none;box-shadow:none;flex:1;min-height:180px;font-size:12px;line-height:1.8;resize:none;padding:0}
.compose-body:focus{box-shadow:none}
.compose-foot{padding:10px 13px;border-top:1px solid var(--brd);display:flex;gap:6px;align-items:center;flex-shrink:0}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.rep-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.rep-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--gold))}
.rep-v{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1;margin-bottom:2px}
.rep-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em}
.rep-block{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;box-shadow:var(--sh)}
.rep-block-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:12px}
.funnel-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--brd);font-size:11px}
.funnel-row:last-child{border-bottom:none}
.funnel-bar-wrap{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.funnel-bar{height:100%;border-radius:3px;background:var(--gold)}
#panel{position:fixed;top:0;right:0;width:476px;height:100vh;background:var(--surf);border-left:1px solid var(--brd);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(23,21,14,.08)}
#panel.open{transform:translateX(0)}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;gap:10px;align-items:flex-start}
.panel-head-info{flex:1;min-width:0}
.panel-head-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;line-height:1.2}
.panel-head-sub{font-size:11px;color:var(--tx2);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.panel-x{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;transition:.12s;line-height:1;flex-shrink:0;margin-top:2px}.panel-x:hover{color:var(--tx)}
.panel-tabs{display:flex;border-bottom:1px solid var(--brd);padding:0 16px;flex-shrink:0;overflow-x:auto}
.panel-tab{padding:9px 10px;font-size:10px;font-weight:600;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;transition:.12s;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-bottom:-1px}
.panel-tab.act{color:var(--gold);border-bottom-color:var(--gold)}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}
.panel-foot{padding:10px 16px;border-top:1px solid var(--brd);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
#modal{position:fixed;inset:0;background:rgba(13,27,42,.45);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
#modal.open{display:flex}
#modal-box{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r2);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(13,27,42,.2)}
.modal-head{padding:16px 18px 12px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:var(--r2) var(--r2) 0 0}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.modal-x{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;transition:.12s}.modal-x:hover{color:var(--tx)}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--brd);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surf)}
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--brd);gap:8px}
.dr:last-child{border-bottom:none}
.drk{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;min-width:110px;padding-top:1px}
.drv{font-size:11px;text-align:right;word-break:break-word;line-height:1.5}
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--brd2);flex-shrink:0;margin-top:3px}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:11px;font-weight:600;margin-bottom:1px}.tl-meta{font-size:10px;color:var(--tx2)}
.doc-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd)}.doc-item:last-child{border-bottom:none}
.doc-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.15s}
.doc-check.ok{background:var(--green);border-color:var(--green);color:#fff}
.doc-label{flex:1;font-size:11px}.doc-stat{font-size:10px;padding:1px 6px;border-radius:8px}
.doc-stat.ok{background:var(--gbg2);color:var(--green)}.doc-stat.miss{background:var(--surf3);color:var(--tx3)}
.legal-alert{padding:8px 12px;background:var(--rbg);border:1px solid var(--rbrd);border-radius:var(--r);font-size:11px;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.legal-ok{padding:8px 12px;background:var(--gbg2);border:1px solid var(--gbrd2);border-radius:var(--r);font-size:11px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.match-section{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.match-title{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.match-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd);cursor:pointer;transition:.12s}
.match-item:last-child{border-bottom:none}.match-item:hover{opacity:.8}
.match-name{flex:1;font-size:11px;font-weight:600}
.match-score{font-size:10px;padding:1px 6px;border-radius:8px}
.match-score.high{background:var(--gbg2);color:var(--green)}.match-score.med{background:var(--gbg);color:var(--gold)}
.notebox{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
#toaster{position:fixed;bottom:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--sb);border:1px solid rgba(255,255,255,.1);border-radius:var(--r2);padding:9px 14px;font-size:11px;font-weight:500;transform:translateY(40px);opacity:0;transition:all .2s cubic-bezier(.4,0,.2,1);pointer-events:auto;border-left:3px solid;color:var(--sbt);box-shadow:0 4px 16px rgba(13,27,42,.3);max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.ts{border-left-color:#5ddabd;color:#5ddabd}.te{border-left-color:#ff8a7a;color:#ff8a7a}.tw{border-left-color:#ffb347;color:#ffb347}.ti{border-left-color:#7aaeff;color:#7aaeff}
#notif-bar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;flex-direction:column;pointer-events:none}
.notif{background:var(--gold);color:#fff;padding:9px 16px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:10px;pointer-events:all;cursor:pointer;animation:notif-in .3s ease}
@keyframes notif-in{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sep{border:none;border-top:1px solid var(--brd);margin:10px 0}
.flex{display:flex}.fac{align-items:center}.fjb{justify-content:space-between}.fg{gap:6px}.fw{flex-wrap:wrap}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}
.tx2{color:var(--tx2)}.tx3{color:var(--tx3)}.syne{font-family:'Syne',sans-serif}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
#jv-btn{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--sb);border:2px solid rgba(200,130,10,.4);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:150;transition:.2s;box-shadow:0 4px 20px rgba(13,27,42,.35);user-select:none}
#jv-btn:hover{border-color:var(--gold);box-shadow:0 6px 28px rgba(13,27,42,.45),0 0 0 4px rgba(200,130,10,.1)}
#jv-btn.listening{border-color:var(--green);animation:jv-pulse 1.2s infinite}
@keyframes jv-pulse{0%,100%{box-shadow:0 4px 20px rgba(13,27,42,.35),0 0 0 0 rgba(26,155,116,.5)}50%{box-shadow:0 4px 20px rgba(13,27,42,.35),0 0 0 12px rgba(26,155,116,0)}}
#jv-btn.thinking{border-color:var(--orange);animation:jv-think .9s infinite alternate}
@keyframes jv-think{from{opacity:.5;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
#jv-panel{position:fixed;bottom:78px;right:20px;width:340px;background:var(--sb);border:1px solid rgba(255,255,255,.08);border-radius:var(--r2);box-shadow:0 16px 60px rgba(13,27,42,.55);z-index:149;display:none;flex-direction:column;overflow:hidden}
#jv-panel.open{display:flex;animation:fade-up .2s ease}
#jv-head{padding:12px 14px;background:rgba(200,130,10,.1);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;flex-shrink:0}
#jv-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--gold);flex:1}
#jv-mode{font-size:10px;color:rgba(221,216,206,.45)}
#jv-close{background:none;border:none;color:rgba(221,216,206,.35);cursor:pointer;font-size:15px;padding:0 2px;line-height:1}
#jv-tr{padding:10px 14px;min-height:44px;max-height:80px;overflow-y:auto;font-size:12px;color:rgba(221,216,206,.75);font-style:italic;line-height:1.7;border-bottom:1px solid rgba(255,255,255,.06)}
#jv-msgs{max-height:180px;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.jv-ai{background:rgba(255,255,255,.07);border-radius:10px 10px 10px 2px;padding:8px 12px;font-size:11px;color:rgba(221,216,206,.9);line-height:1.6}
.jv-user{background:rgba(200,130,10,.14);border-radius:10px 10px 2px 10px;padding:8px 12px;font-size:11px;color:rgba(221,216,206,.9);line-height:1.6;align-self:flex-end;max-width:85%}
#jv-acts{padding:8px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:5px;flex-wrap:wrap}
.jv-act{padding:5px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);color:rgba(221,216,206,.9);font-size:10px;cursor:pointer;transition:.15s;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500}
.jv-act:hover{background:rgba(200,130,10,.2);border-color:rgba(200,130,10,.4);color:var(--gold)}
#jv-foot{padding:8px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:6px;align-items:center}
#jv-input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:6px 10px;color:rgba(221,216,206,.9);font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;outline:none}
#jv-input::placeholder{color:rgba(221,216,206,.3)}
#jv-input:focus{border-color:rgba(200,130,10,.45);box-shadow:none}
#jv-send{background:rgba(200,130,10,.18);border:1px solid rgba(200,130,10,.35);border-radius:var(--r);color:var(--gold);cursor:pointer;padding:6px 9px;font-size:12px;flex-shrink:0;transition:.15s}
#jv-send:hover{background:rgba(200,130,10,.3)}
#jv-mic{background:rgba(26,155,116,.12);border:1px solid rgba(26,155,116,.25);border-radius:var(--r);color:var(--green);cursor:pointer;padding:6px 8px;font-size:12px;flex-shrink:0;transition:.15s}
#jv-mic:hover{background:rgba(26,155,116,.22)}
#jv-stat{padding:4px 14px 8px;font-size:10px;color:rgba(221,216,206,.3);text-align:center;font-style:italic}

</style>
</head>
<body>
<nav id="sb">
  <div class="sb-logo">
    <div class="sb-logo-mark">Nova<span>lem</span></div>
    <div class="sb-logo-sub">Cabinet de recrutement BTP</div>
  </div>
  <div class="sb-nav">
    <div class="ni act" data-v="dash"><span class="ni-ico">&#9889;</span>Dashboard<span class="nbadge nb-r" id="b-urg" style="display:none">!</span></div>
    <div class="ni" data-v="pipeline"><span class="ni-ico">&#11041;</span>Pipeline<span class="nbadge nb-g" id="b-pipe">0</span></div>
    <div class="ni" data-v="contacts"><span class="ni-ico">&#9677;</span>Contacts<span class="nbadge nb-d" id="b-contacts">0</span></div>
    <div class="ni" data-v="emails"><span class="ni-ico">&#9993;</span>Emails<span class="nbadge nb-r" id="b-emails" style="display:none">0</span></div>
    <div class="ni" data-v="reporting"><span class="ni-ico">&#9672;</span>Reporting</div>
  </div>
  <div class="sb-foot">
    <div class="sb-rev" id="sb-rev">&#8212;</div>
    <div class="sb-rev-lbl">Revenue estim&#233;</div>
  </div>
  <div class="sb-settings" onclick="openSettings()">&#9881; Param&#232;tres</div>
</nav>
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-acts" id="topbar-acts"></div>
    <div id="sync-status" style="font-size:10px;color:var(--tx3);margin-left:8px">&#9729; Local</div>
  </div>
  <div id="content">
    <div class="view active" id="view-dash"></div>
    <div class="view" id="view-pipeline"></div>
    <div class="view" id="view-contacts"></div>
    <div class="view" id="view-emails"></div>
    <div class="view" id="view-reporting"></div>
  </div>
</div>
<aside id="panel">
  <div class="panel-head">
    <div class="panel-head-info">
      <div class="panel-head-name" id="panel-name"></div>
      <div class="panel-head-sub" id="panel-sub"></div>
    </div>
    <span class="panel-x" onclick="closePanel()">&#10005;</span>
  </div>
  <div class="panel-tabs" id="panel-tabs"></div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-foot" id="panel-foot"></div>
</aside>
<div id="modal" onclick="if(event.target===this)closeMo()">
  <div id="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <span class="modal-x" onclick="closeMo()">&#10005;</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>
<div id="toaster"></div>
<div id="notif-bar"></div>
<div id="jv-btn" onclick="jvToggle()" title="Jarvis (clic = parler)">&#127897;</div>
<div id="jv-panel">
  <div id="jv-head">
    <span id="jv-title">&#10022; JARVIS</span>
    <span id="jv-mode">En attente</span>
    <button id="jv-close" onclick="jvClose()">&#215;</button>
  </div>
  <div id="jv-tr" style="color:rgba(221,216,206,.3)">Cliquez le micro pour parler&#8230;</div>
  <div id="jv-msgs"></div>
  <div id="jv-acts" style="display:none"></div>
  <div id="jv-foot">
    <input id="jv-input" placeholder="Ou tapez une commande&#8230;" onkeydown="if(event.key==='Enter')jvSend()">
    <button id="jv-send" onclick="jvSend()">&#8629;</button>
    <button id="jv-mic" onclick="jvToggle()">&#127897;</button>
  </div>
  <div id="jv-stat"></div>
</div>
<script>
'use strict';
const SECTORS=[{id:'go',l:'Gros Oeuvre',cls:'sgo'},{id:'so',l:'Second Oeuvre',cls:'sso'},{id:'be',l:"Bureau d'Etudes",cls:'sbe'},{id:'vrd',l:'VRD / TP',cls:'svrd'},{id:'hse',l:'HSE / QSE',cls:'shse'},{id:'mgmt',l:'Management',cls:'smgmt'}];
const STAGES=[{id:'sourcing',l:'Sourcing',color:'var(--blue)',bg:'rgba(37,88,212,.06)'},{id:'precal',l:'Precal',color:'var(--purple)',bg:'rgba(109,40,217,.06)'},{id:'entretien',l:'Entretien',color:'var(--gold)',bg:'rgba(200,130,10,.06)'},{id:'presented',l:'Present\xe9 client',color:'var(--orange)',bg:'rgba(212,120,26,.06)'},{id:'interview',l:'Entretien client',color:'var(--red)',bg:'rgba(192,57,43,.06)'},{id:'decision',l:'D\xe9cision',color:'var(--green)',bg:'rgba(26,155,116,.06)'}];
const REQUIRED_DOCS=[{id:'cv',l:'CV \xe0 jour'},{id:'rgpd',l:'RGPD sign\xe9 (envoi + conservation)'},{id:'id_card',l:"Pi\xe8ce d'identit\xe9 recto/verso"},{id:'permis',l:'Attestation permis (ou absence)'},{id:'med',l:'Derni\xe8re visite m\xe9dicale'}];
const CO_STATUS=[{id:'prospect',l:'Prospect',cls:'td'},{id:'active',l:'Client actif',cls:'tgr'},{id:'no_need',l:'Pas de besoin',cls:'td'},{id:'no_call',l:'Ne pas appeler',cls:'tr'},{id:'nrp',l:'NRP',cls:'td'},{id:'inactive',l:'Inactif',cls:'td'}];
const CAND_STATUS=[{id:'available',l:'Disponible',cls:'tgr'},{id:'in_process',l:'En cours',cls:'tg'},{id:'unavailable',l:'Indisponible',cls:'td'},{id:'placed',l:'Plac\xe9',cls:'tb'}];
const TPLS={
  precal:{sub:'Novalem \u2014 Confirmation de notre \xe9change',body:'Bonjour,\n\nSuite \xe0 notre \xe9change t\xe9l\xe9phonique, je vous confirme notre entretien visio.\n\nJe vous ferai parvenir le lien de connexion sous peu.\n\nCordialement,'},
  dossier:{sub:'Novalem \u2014 Dossier de candidature',body:"Bonjour,\n\nComme convenu, veuillez trouver ci-joint le lien vers votre dossier de candidature \xe0 compl\xe9ter avant notre entretien.\n\nSans ce dossier complet, je ne pourrai pas transmettre votre profil.\n\nMerci.\n\nCordialement,"},
  relance_dossier:{sub:'Relance \u2014 Dossier de candidature',body:'Bonjour,\n\nJe me permets de vous relancer concernant votre dossier de candidature non re\xe7u.\n\nSans les documents complets, il m\'est impossible de transmettre votre profil \xe0 nos clients.\n\nCordialement,'},
  cv_client:{sub:'Novalem \u2014 Profil candidat',body:'Bonjour,\n\nJe me permets de vous faire parvenir le profil d\'un candidat susceptible de correspondre \xe0 votre recherche.\n\n\u2022 [POINTS CL\xc9S]\n\nJe reste disponible pour en discuter.\n\nCordialement,'},
  relance_client:{sub:'Novalem \u2014 Relance profil',body:'Bonjour,\n\nJe reviens vers vous suite au profil que je vous ai fait parvenir.\n\nAvez-vous eu l\'occasion d\'en prendre connaissance ?\n\nCordialement,'},
  contrat:{sub:'Novalem \u2014 Contrat de service',body:'Bonjour,\n\nVeuillez trouver ci-joint notre contrat de service pour la mission de recrutement.\n\nNos honoraires sont de [X]% du salaire brut annuel du candidat recrut\xe9.\n\nCordialement,'},
  retour_entretien:{sub:'Novalem \u2014 Retour entretien',body:'Bonjour,\n\nSuite \xe0 l\'entretien, je reviens vers vous pour avoir votre retour.\n\nLe candidat s\'est montr\xe9 tr\xe8s int\xe9ress\xe9 par votre offre.\n\nCordialement,'},
};

var DB={candidates:[],companies:[],placements:[],emails:[],inbox:[],todos:[],trash:[]};
var UI={view:'dash',panel:null,contactTab:'clients',emailView:'inbox',inboxCache:null,inboxLoading:false};

var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);};
var now=function(){return new Date().toISOString();};
var esc=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};
var fDate=function(iso){if(!iso)return '\u2014';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});};
var fDateS=function(iso){if(!iso)return '\u2014';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});};
var fDT=function(iso){if(!iso)return '\u2014';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});};
var daysDiff=function(iso){if(!iso)return 0;return Math.floor((Date.now()-new Date(iso).getTime())/86400000);};
var hoursAgo=function(iso){if(!iso)return '';var h=Math.floor((Date.now()-new Date(iso).getTime())/3600000);if(h<1)return 'il y a <1h';if(h<24)return 'il y a '+h+'h';return 'il y a '+daysDiff(iso)+'j';};
var getSec=function(id){return SECTORS.find(function(s){return s.id===id;})||{id:'',l:'\u2014',cls:'td'};};
var getStage=function(id){return STAGES.find(function(s){return s.id===id;})||STAGES[0];};
var getCoS=function(id){return CO_STATUS.find(function(s){return s.id===id;})||CO_STATUS[0];};
var getCandS=function(id){return CAND_STATUS.find(function(s){return s.id===id;})||CAND_STATUS[0];};
var getCoById=function(id){return DB.companies.find(function(c){return c.id===id;});};
var getCandById=function(id){return DB.candidates.find(function(c){return c.id===id;});};
var getPlacById=function(id){return DB.placements.find(function(p){return p.id===id;});};
var docsComplete=function(cand){return REQUIRED_DOCS.every(function(d){return cand.docs&&cand.docs[d.id];});};
var docsScore=function(cand){return REQUIRED_DOCS.filter(function(d){return cand.docs&&cand.docs[d.id];}).length;};
var getApiKey=function(){return localStorage.getItem('novalem_api_key')||'';};
var getApiBase=function(){var h=window.location.hostname;if(!h||h===''||h.endsWith('.html'))return null;return window.location.origin;};

function save(){try{localStorage.setItem('novalem_v1',JSON.stringify(DB));}catch(e){}updateBadges();}
function load(){
  try{
    var raw=localStorage.getItem('novalem_v1');
    if(raw){var d=JSON.parse(raw);DB.candidates=d.candidates||[];DB.companies=d.companies||[];DB.placements=d.placements||[];DB.emails=d.emails||[];DB.inbox=d.inbox||[];DB.todos=d.todos||[];DB.trash=d.trash||[];}
  }catch(e){}
}

function toast(msg,type){
  type=type||'i';var t=document.getElementById('toaster');if(!t)return;
  var el=document.createElement('div');el.className='toast '+type;el.textContent=msg;t.appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},250);},3500);
}
function openMo(title,body,foot,wide){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-foot').innerHTML=foot||'';
  document.getElementById('modal-box').style.maxWidth=wide?'680px':'560px';
  document.getElementById('modal').classList.add('open');
}
function closeMo(){document.getElementById('modal').classList.remove('open');}
function openPanel(type,id,tab){UI.panel={type:type,id:id,tab:tab||0};renderPanel();document.getElementById('panel').classList.add('open');}
function closePanel(){document.getElementById('panel').classList.remove('open');UI.panel=null;}
function setPanelTab(t){if(!UI.panel)return;UI.panel.tab=t;renderPanel();}
function renderPanel(){if(!UI.panel)return;if(UI.panel.type==='placement')renderPlacPanel(UI.panel.id,UI.panel.tab);else if(UI.panel.type==='candidate')renderCandPanel(UI.panel.id,UI.panel.tab);else if(UI.panel.type==='company')renderCoPanel(UI.panel.id,UI.panel.tab);}

function go(v){
  UI.view=v;
  document.querySelectorAll('.ni[data-v]').forEach(function(el){el.classList.toggle('act',el.dataset.v===v);});
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('view-'+v);if(el)el.classList.add('active');
  var titles={dash:'Dashboard',pipeline:'Pipeline',contacts:'Contacts',emails:'Emails',reporting:'Reporting'};
  document.getElementById('topbar-title').textContent=titles[v]||v;
  var acts={dash:'',pipeline:'<button class="btn btn-p btn-sm" onclick="openAddPlacement()">+ Placement</button>',contacts:'<button class="btn btn-p btn-sm" onclick="openAddCompany()">+ Entreprise</button><button class="btn btn-g btn-sm" onclick="openAddCandidate()">+ Candidat</button>',emails:'<button class="btn btn-p btn-sm" onclick="emShowView(\'compose\')">+ Email</button>',reporting:''};
  document.getElementById('topbar-acts').innerHTML=acts[v]||'';
  var renderers={dash:renderDash,pipeline:renderPipeline,contacts:renderContacts,emails:renderEmails,reporting:renderReporting};
  if(renderers[v])renderers[v]();
}

function updateBadges(){
  var actions=computeActions();var urgent=actions.filter(function(a){return a.urgency==='critical';}).length;
  var bu=document.getElementById('b-urg');if(bu){bu.textContent='!';bu.style.display=urgent?'inline-flex':'none';}
  var active=DB.placements.filter(function(p){return p.stage!=='placed'&&p.outcome!=='lost';}).length;
  var bp=document.getElementById('b-pipe');if(bp)bp.textContent=active;
  var contacts=DB.companies.length+DB.candidates.length;var bc=document.getElementById('b-contacts');if(bc)bc.textContent=contacts;
  var unread=(UI.inboxCache||DB.inbox).filter(function(e){return !e.seen;}).length;
  var be=document.getElementById('b-emails');if(be){be.textContent=unread;be.style.display=unread?'inline-flex':'none';}
  var placed=DB.placements.filter(function(p){return p.stage==='placed';});
  var rev=placed.reduce(function(s,p){return s+(p.salary?Math.round(p.salary*(p.honorRate||0.18)):0);},0);
  var sr=document.getElementById('sb-rev');if(sr)sr.textContent=rev>0?rev.toLocaleString('fr-FR')+'\u20ac':'\u2014';
}

function matchCompaniesForCand(cand){
  return DB.companies.filter(function(co){return co.status!=='no_call'&&co.status!=='inactive';}).map(function(co){
    var score=0;var hist=co.needsHistory||[];
    if(hist.some(function(n){return n.sector===cand.sector;}))score+=3;
    if(co.status==='active')score+=2;
    var rk=cand.role?cand.role.toLowerCase().split(' ')[0]:'';
    if(rk&&hist.some(function(n){return n.role&&n.role.toLowerCase().indexOf(rk)>=0;}))score+=2;
    if(co.callbackDate&&new Date(co.callbackDate)<=new Date())score+=1;
    return {co:co,score:score};
  }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,5);
}
function matchCandsForNeed(sector,role){
  return DB.candidates.filter(function(c){return c.status!=='placed';}).map(function(c){
    var score=0;
    if(c.sector===sector)score+=3;
    if(c.status==='available')score+=2;
    if(docsComplete(c))score+=2;
    var rk=role?role.toLowerCase().split(' ')[0]:'';
    if(rk&&c.role&&c.role.toLowerCase().indexOf(rk)>=0)score+=2;
    return {cand:c,score:score};
  }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,5);
}

function computeActions(){
  var actions=[];
  DB.placements.filter(function(p){return p.stage!=='placed'&&p.outcome!=='lost';}).forEach(function(p){
    var d=daysDiff(p.stageEnteredAt);var co=getCoById(p.clientId);var cand=getCandById(p.candidateId);
    var cn=co?co.name:'Client';var ca=cand?cand.name:'Candidat';
    if(p.stage==='presented'){
      if(d>=3)actions.push({urgency:'critical',text:'Relancer '+cn+' \u2014 CV de '+ca+' envoy\xe9 il y a '+d+'j sans retour',action:'open_placement',id:p.id,btn:'Relancer'});
      else if(d>=1)actions.push({urgency:'high',text:'Confirmer r\xe9ception CV par '+cn+' ('+ca+')',action:'open_placement',id:p.id,btn:'Appeler'});
    }
    if(p.stage==='interview'){
      if(d>=2)actions.push({urgency:'critical',text:'URGENT \u2014 '+cn+' n\'a pas rendu sa d\xe9cision apr\xe8s entretien ('+d+'j)',action:'open_placement',id:p.id,btn:'Relancer'});
      else if(d>=1)actions.push({urgency:'high',text:'Retour entretien '+cn+' \xd7 '+ca,action:'open_placement',id:p.id,btn:'Appeler'});
    }
    if(p.stage==='decision'&&d>=2)actions.push({urgency:'critical',text:'D\xe9cision finale '+cn+' attendue depuis '+d+'j',action:'open_placement',id:p.id,btn:'Forcer retour'});
    if(p.stage==='sourcing'&&d>=3&&!p.candidateId)actions.push({urgency:'high',text:'Besoin "'+p.jobTitle+'" chez '+cn+' sans candidat depuis '+d+'j',action:'open_placement',id:p.id,btn:'Chercher'});
    if(p.candidateId&&cand&&!docsComplete(cand)&&['presented','interview','decision'].indexOf(p.stage)>=0)actions.push({urgency:'high',text:'Dossier incomplet \u2014 '+ca+' ne peut pas \xeatre pr\xe9sent\xe9 sans dossier l\xe9gal',action:'open_candidate',id:cand.id,btn:'Compl\xe9ter'});
  });
  DB.todos.filter(function(t){return !t.done&&t.dueDate&&new Date(t.dueDate)<new Date();}).forEach(function(t){actions.push({urgency:'high',text:t.text,action:'done_todo',id:t.id,btn:'Fait'});});
  DB.companies.filter(function(c){return c.callbackDate&&new Date(c.callbackDate)<=new Date()&&c.status==='prospect';}).slice(0,3).forEach(function(c){actions.push({urgency:'normal',text:'Rappeler '+c.name,action:'open_company',id:c.id,btn:'Voir fiche'});});
  var order={critical:0,high:1,normal:2};
  return actions.sort(function(a,b){return (order[a.urgency]||2)-(order[b.urgency]||2);});
}
function handleAction(action,id){
  if(action==='open_placement')openPanel('placement',id);
  else if(action==='open_company')openPanel('company',id);
  else if(action==='open_candidate')openPanel('candidate',id);
  else if(action==='done_todo'){var t=DB.todos.find(function(x){return x.id===id;});if(t){t.done=true;t.updatedAt=now();save();if(UI.view==='dash')renderDash();toast('T\xe2che faite','s');}}
}

async function emSend(){
  var to=document.getElementById('em-to')?document.getElementById('em-to').value.trim():'';
  var sub=document.getElementById('em-sub')?document.getElementById('em-sub').value.trim():'';
  var bod=document.getElementById('em-body')?document.getElementById('em-body').value.trim():'';
  if(!to||!sub){toast('Destinataire et objet requis','w');return;}
  var apiBase=getApiBase();var btn=document.getElementById('em-send-btn');
  if(btn){btn.disabled=true;btn.textContent='Envoi...';}
  if(apiBase){
    try{var r=await fetch(apiBase+'/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:to,subject:sub,body:bod.replace(/\n/g,'<br>')})});var d=await r.json();if(!r.ok)throw new Error(d.error||'Erreur');toast('Email envoy\xe9 \u2713','s');}
    catch(err){toast('Erreur: '+err.message,'e');if(btn){btn.disabled=false;btn.textContent='Envoyer';}return;}
  }else toast('Email enregistr\xe9 (envoi via Vercel uniquement)','i');
  DB.emails.push({id:uid(),to:to,subject:sub,body:bod,candId:EM.candId,coId:EM.coId,placementId:EM.placementId,date:now(),sent:!!apiBase});
  save();emShowView('sent');
}
function renderSent(){
  if(!DB.emails.length)return '<div style="padding:50px;text-align:center;color:var(--tx3);font-size:12px">&#128228;<br>Aucun email envoy\xe9</div>';
  var ul=DB.emails.filter(function(e){return !e.candId&&!e.coId;}).length;
  var w=ul?'<div style="padding:8px 13px;background:var(--obg);border-bottom:2px solid var(--orange);font-size:11px;color:var(--orange)">&#9888; '+ul+' email(s) non li\xe9s \xe0 un contact</div>':'';
  var rows=[].concat(DB.emails).reverse().map(function(e,i){var c=e.candId?getCandById(e.candId):e.coId?getCoById(e.coId):null;var ri=DB.emails.length-1-i;return '<div class="inbox-row" style="justify-content:space-between"><div class="inbox-body2" style="cursor:pointer" onclick="emReopenSent('+ri+')"><div class="inbox-from">'+esc(e.to||'\u2014')+(c?' ('+esc(c.name)+')':'')+'</div><div class="inbox-subj">'+esc(e.subject||'\u2014')+'</div></div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><span class="inbox-date2">'+fDateS(e.date)+'</span><span class="tag '+(e.sent?'tgr':'td')+'">'+(e.sent?'Envoy\xe9':'Local')+'</span><button onclick="emDelSent('+ri+')" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 2px">&#215;</button></div></div>';}).join('');
  return w+'<div class="inbox-scroll">'+rows+'</div>';
}
function emReopenSent(i){var m=DB.emails[i];if(!m)return;EM={to:m.to,subject:'Re: '+m.subject,body:'\n\n---\n'+m.body,candId:m.candId,coId:m.coId,placementId:m.placementId||null};emShowView('compose');}
function emDelSent(i){var m=DB.emails[i];if(!m)return;DB.trash.push(Object.assign({},m,{deletedAt:now(),origin:'sent'}));DB.emails.splice(i,1);save();renderEmails();toast('Mis en corbeille','s');}
function renderTrash(){
  if(!DB.trash.length)return '<div style="padding:50px;text-align:center;color:var(--tx3);font-size:12px">&#128465;<br>Corbeille vide</div>';
  var hdr='<div class="em-toolbar"><span style="font-size:11px;color:var(--tx2)">'+DB.trash.length+' \xe9l\xe9ment(s)</span><button class="btn btn-d btn-sm" style="margin-left:auto" onclick="emEmptyTrash()">Vider</button></div>';
  var rows=DB.trash.map(function(m,i){return '<div class="inbox-row" style="justify-content:space-between"><div class="inbox-body2"><div class="inbox-from">'+esc(m.to||m.from||'\u2014')+'</div><div class="inbox-subj">'+esc(m.subject||'\u2014')+'</div></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0"><button class="btn btn-g btn-xs" onclick="emRestore('+i+')">&#8629;</button><button onclick="emPermDel('+i+')" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 2px">&#215;</button></div></div>';}).join('');
  return hdr+'<div class="inbox-scroll">'+rows+'</div>';
}
function emRestore(i){var m=DB.trash[i];if(!m)return;var r=Object.assign({},m);delete r.deletedAt;delete r.origin;DB.emails.push(r);DB.trash.splice(i,1);save();renderEmails();toast('Restaur\xe9','s');}
function emPermDel(i){DB.trash.splice(i,1);save();renderEmails();}
function emEmptyTrash(){DB.trash=[];save();renderEmails();toast('Corbeille vid\xe9e','w');}
function emOpenInbox(i){

  openMo(esc(e.subject||'Email'),'<div class="dr"><span class="drk">De</span><span class="drv">'+esc(e.from||'\u2014')+'</span></div><div class="dr"><span class="drk">Date</span><span class="drv">'+fDT(e.date)+'</span></div><div class="sep"></div><div style="background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto">'+esc(e.text||e.body||'(vide)')+'</div>','<button class="btn btn-g" onclick="closeMo()">Fermer</button><button class="btn btn-p btn-sm" onclick="closeMo();emShowView(\'compose\')">R\xe9pondre</button>');

async function emFetchInbox(force){
  var apiBase=getApiBase();if(!apiBase)return;
  if(UI.inboxLoading&&!force)return;UI.inboxLoading=true;
  var btn=document.getElementById('rfr-btn');if(btn){btn.disabled=true;btn.innerHTML='<span style="animation:spin .7s linear infinite;display:inline-block">&#8635;</span>';}
  try{var r=await fetch(apiBase+'/api/imap');var d=await r.json();if(!r.ok)throw new Error(d.error||'Erreur');UI.inboxCache=d.emails||[];updateBadges();}
  catch(err){toast('IMAP: '+err.message,'e');}
  UI.inboxLoading=false;if(UI.view==='emails'&&UI.emailView==='inbox')renderEmails();
}

function renderReporting(){
  var el=document.getElementById('view-reporting');if(!el)return;
  var placed=DB.placements.filter(function(p){return p.stage==='placed';});
  var lost=DB.placements.filter(function(p){return p.outcome==='lost';});
  var active=DB.placements.filter(function(p){return p.stage!=='placed'&&p.outcome!=='lost';});
  var rev=placed.reduce(function(s,p){return s+(p.salary?Math.round(p.salary*(p.honorRate||0.18)):0);},0);
  var conv=DB.placements.length?Math.round(placed.length/DB.placements.length*100):0;
  var cands=DB.candidates.length;
  el.innerHTML='<div class="rep-grid"><div class="rep-card" style="--kc:var(--gold)"><div class="rep-v" style="color:var(--gold)">'+placed.length+'</div><div class="rep-l">Plac\xe9s</div></div><div class="rep-card" style="--kc:var(--blue)"><div class="rep-v" style="color:var(--blue)">'+active.length+'</div><div class="rep-l">En cours</div></div><div class="rep-card" style="--kc:var(--green)"><div class="rep-v" style="color:var(--green)">'+(rev>0?rev.toLocaleString('fr-FR')+'\u20ac':'\u2014')+'</div><div class="rep-l">CA estim\xe9</div></div><div class="rep-card" style="--kc:var(--purple)"><div class="rep-v" style="color:var(--purple)">'+conv+'%</div><div class="rep-l">Tx conversion</div></div><div class="rep-card" style="--kc:var(--orange)"><div class="rep-v" style="color:var(--orange)">'+DB.companies.filter(function(c){return c.status==='active';}).length+'</div><div class="rep-l">Clients actifs</div></div><div class="rep-card" style="--kc:var(--red)"><div class="rep-v" style="color:var(--red)">'+lost.length+'</div><div class="rep-l">Perdus</div></div></div>'
    +'<div class="rep-block"><div class="rep-block-title">Pipeline par \xe9tape</div>'+STAGES.map(function(st){var cnt=DB.placements.filter(function(p){return p.stage===st.id&&p.outcome!=='lost';}).length;var pct=active.length?Math.round(cnt/Math.max(active.length,1)*100):0;return '<div class="funnel-row"><span style="min-width:130px;font-size:11px;color:var(--tx2)">'+st.l+'</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:'+pct+'%;background:'+st.color+'"></div></div><span style="min-width:30px;text-align:right;font-size:11px;color:var(--tx2)">'+cnt+'</span></div>';}).join('')+'</div>'
    +'<div class="rep-block"><div class="rep-block-title">Candidats par statut</div>'+CAND_STATUS.map(function(st){var cnt=DB.candidates.filter(function(c){return c.status===st.id;}).length;var pct=cands?Math.round(cnt/cands*100):0;return '<div class="funnel-row"><span style="min-width:130px;font-size:11px;color:var(--tx2)">'+st.l+'</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:'+pct+'%"></div></div><span style="min-width:30px;text-align:right;font-size:11px;color:var(--tx2)">'+cnt+'</span></div>';}).join('')+'</div>';
}

var JV={state:'idle',sr:null,tr:'',hist:[],pending:[]};
function jvToggle(){document.getElementById('jv-panel').classList.add('open');if(JV.state==='idle'||JV.state==='ready')jvStart();else if(JV.state==='listening')jvStop();}
function jvClose(){jvStop();document.getElementById('jv-panel').classList.remove('open');JV.state='idle';jvMode('idle');}
function jvMode(m){
  JV.state=m;var btn=document.getElementById('jv-btn');var mel=document.getElementById('jv-mode');if(!btn)return;btn.className='';
  var M={idle:{i:'&#127897;',c:'',t:'En attente'},listening:{i:'&#128308;',c:'listening',t:'Ecoute...'},thinking:{i:'&#9881;',c:'thinking',t:'Analyse...'},ready:{i:'&#9989;',c:'',t:'Actions disponibles'}};
  var x=M[m]||M.idle;btn.innerHTML=x.i;if(x.c)btn.classList.add(x.c);if(mel)mel.textContent=x.t;
}
function jvTr(t){var el=document.getElementById('jv-tr');if(!el)return;el.textContent=t||'';el.style.color=t?'rgba(221,216,206,.8)':'rgba(221,216,206,.3)';el.style.fontStyle=t?'normal':'italic';}
function jvStat(t){var el=document.getElementById('jv-stat');if(el)el.textContent=t;}
function jvMsg(role,txt){var el=document.getElementById('jv-msgs');if(!el)return;var d=document.createElement('div');d.className=role==='user'?'jv-user':'jv-ai';d.textContent=txt;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function jvStart(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Reconnaissance vocale non disponible','w');return;}
  jvTr('');JV.tr='';jvMode('listening');jvStat('Parlez... re-cliquez pour envoyer');
  JV.sr=new SR();JV.sr.lang='fr-FR';JV.sr.continuous=true;JV.sr.interimResults=true;
  JV.sr.onresult=function(e){var i2='',f='';for(var x=e.resultIndex;x<e.results.length;x++){var t=e.results[x][0].transcript;if(e.results[x].isFinal)f+=t;else i2+=t;}if(f)JV.tr+=f;jvTr((JV.tr+i2).trim()||'...');};
  JV.sr.onerror=function(e){if(e.error==='no-speech'||e.error==='aborted')return;toast('Micro: '+e.error,'w');jvMode('idle');};
  JV.sr.onend=function(){if(JV.state==='listening'){try{JV.sr.start();}catch(e){}}};
  try{JV.sr.start();}catch(e){toast('Impossible de d\xe9marrer le micro','e');jvMode('idle');}
}
function jvStop(){
  if(JV.sr){JV.sr.onend=null;try{JV.sr.stop();}catch(e){}JV.sr=null;}
  var t=JV.tr.trim();
  if(t&&JV.state==='listening')jvAnalyze(t);
  else if(JV.state==='listening'){jvMode('idle');jvStat('Rien entendu');}
}
function jvSend(){var inp=document.getElementById('jv-input');var t=inp?inp.value.trim():'';if(!t)return;if(inp)inp.value='';jvAnalyze(t);}
async function jvAnalyze(text){
  jvMode('thinking');jvStat('Analyse...');jvTr('');jvMsg('user',text);
  var actEl=document.getElementById('jv-acts');if(actEl)actEl.style.display='none';
  var key=getApiKey();if(!key){jvMsg('assistant','Cl\xe9 API manquante \u2014 configurez dans Param\xe8tres.');jvMode('idle');return;}
  var ctx={
    date:new Date().toLocaleDateString('fr-FR'),
    actifs:DB.placements.filter(function(p){return p.stage!=='placed'&&p.outcome!=='lost';}).slice(0,10).map(function(p){var c=getCoById(p.clientId);var ca=getCandById(p.candidateId);return{id:p.id,client:c?c.name:'?',poste:p.jobTitle,candidat:ca?ca.name:null,etape:getStage(p.stage).l,jours:daysDiff(p.stageEnteredAt)};})
  };
  var sys='Tu es Jarvis assistant CRM NOVALEM recrutement BTP CDI. Contexte:'+JSON.stringify(ctx)+'. Reponds UNIQUEMENT en JSON: {"message":"texte court","actions":[{"type":"TYPE","label":"bouton","data":{}}]}. Types: set_stage(data:{placementId,stage:sourcing|precal|entretien|presented|interview|decision}), mark_placed(data:{placementId}), mark_lost(data:{placementId}), open_placement(data:{placementId}), open_company(data:{companyId}), open_candidate(data:{candidateId}), navigate(data:{view:dash|pipeline|contacts|emails|reporting}), add_todo(data:{text,placementId}), set_co_status(data:{companyId,status:prospect|active|no_need|no_call|nrp}). JSON pur sans markdown.';
  var msgs=JV.hist.slice(-6).concat([{role:'user',content:text}]);
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:sys,messages:msgs})});
    var d=await r.json();if(!r.ok)throw new Error(d.error?d.error.message:'Erreur API');
    var raw=(d.content||[]).map(function(b){return b.type==='text'?b.text:'';}).join('').trim().replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
    var parsed=JSON.parse(raw);
    JV.hist.push({role:'user',content:text});JV.hist.push({role:'assistant',content:parsed.message||''});
    jvMsg('assistant',parsed.message||'...');JV.pending=parsed.actions||[];jvShowActs(JV.pending);
  }catch(err){jvMsg('assistant','Erreur: '+err.message);jvMode('idle');jvStat('');}
}
function jvShowActs(acts){
  var el=document.getElementById('jv-acts');if(!el)return;
  if(!acts||!acts.length){el.style.display='none';jvMode('idle');jvStat('');return;}
  el.style.display='flex';
  el.innerHTML=acts.map(function(a,i){return '<button class="jv-act" onclick="jvExec('+i+')">'+esc(a.label||'Action '+(i+1))+'</button>';}).join('')+'<button class="jv-act" onclick="jvClear()" style="opacity:.5;margin-left:auto">Ignorer</button>';
  jvMode('ready');jvStat(acts.length+' action(s) propos\xe9e(s)');
}
function jvExec(i){
  var a=JV.pending[i];if(!a)return;var d=a.data||{};
  if(a.type==='set_stage')setStage(d.placementId,d.stage);
  else if(a.type==='mark_placed')markPlaced(d.placementId);
  else if(a.type==='mark_lost')markLost(d.placementId);
  else if(a.type==='open_placement')openPanel('placement',d.placementId);
  else if(a.type==='open_company')openPanel('company',d.companyId);
  else if(a.type==='open_candidate')openPanel('candidate',d.candidateId);
  else if(a.type==='navigate')go(d.view);
  else if(a.type==='add_todo'){DB.todos.push({id:uid(),text:d.text||'T\xe2che',priority:'m',done:false,placementId:d.placementId||null,createdAt:now()});save();toast('T\xe2che ajout\xe9e','s');}
  else if(a.type==='set_co_status')setCoStatus(d.companyId,d.status);
  JV.pending.splice(i,1);jvShowActs(JV.pending);
}
function jvClear(){JV.pending=[];var el=document.getElementById('jv-acts');if(el)el.style.display='none';jvMode('idle');jvStat('');}
function showNotif(msg,onclick){
  var bar=document.getElementById('notif-bar');if(!bar)return;
  var div=document.createElement('div');div.className='notif';div.style.pointerEvents='all';
  div.innerHTML='<span style="flex:1">'+esc(msg)+'</span><span onclick="this.closest(\'.notif\').remove()" style="font-size:14px;opacity:.6;padding:0 6px;cursor:pointer">&#215;</span>';
  if(onclick)div.addEventListener('click',onclick);bar.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.remove();},15000);
}
