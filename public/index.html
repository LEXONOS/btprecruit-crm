<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#09090a;--s1:#111112;--s2:#18181a;--s3:#202022;
  --bd:#2a2a2e;--bd2:#38383d;
  --tx:#f0f0ec;--mu:#8c8c84;--mu2:#4a4a44;
  --ac:#c8e040;--green:#2dd4a0;--red:#f04b4b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(200,224,64,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,224,64,.025) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
.bg-glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(45,212,160,.05) 0%, transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.card{
  position:relative;z-index:1;
  width:100%;max-width:360px;
  padding:0 20px;
  animation:fadeUp .4s cubic-bezier(.2,.8,.3,1);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{text-align:center;margin-bottom:36px}
.logo-mark{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:30px;letter-spacing:-.5px;color:var(--tx);
}
.logo-mark span{color:var(--ac)}
.logo-sub{
  font-size:10px;color:var(--mu2);
  letter-spacing:.22em;text-transform:uppercase;margin-top:5px;
}

.box{
  background:var(--s1);
  border:1px solid var(--bd2);
  border-radius:12px;
  padding:28px 24px 24px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
}
.box-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:16px;
  margin-bottom:4px;
}
.box-sub{
  font-size:10px;color:var(--mu);margin-bottom:22px;
}

.field{margin-bottom:14px}
.field-label{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--mu);margin-bottom:7px;
}
.field-input{
  width:100%;background:var(--s2);border:1px solid var(--bd2);
  border-radius:8px;padding:11px 14px;color:var(--tx);
  font-family:'DM Mono',monospace;font-size:13px;
  outline:none;transition:border-color .15s;
}
.field-input::placeholder{color:var(--mu2)}
.field-input:focus{border-color:rgba(200,224,64,.4)}

.btn-submit{
  width:100%;padding:13px;margin-top:6px;
  background:var(--ac);color:#1a2000;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  border:none;border-radius:8px;cursor:pointer;
  transition:all .15s;letter-spacing:.02em;
}
.btn-submit:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}

.msg{
  text-align:center;font-size:11px;
  margin:10px 0 0;height:16px;
  transition:all .2s;color:transparent;
}
.msg.err{color:var(--red)}
.msg.ok_{color:var(--green)}

.loader{display:none;text-align:center;padding:16px 0}
.loader-ring{
  width:28px;height:28px;
  border:2px solid var(--bd2);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:11px;color:var(--green)}

.link-join{
  display:block;text-align:center;margin-top:16px;
  font-size:11px;color:var(--mu);text-decoration:none;
  transition:color .15s;
}
.link-join:hover{color:var(--ac)}

.footer{
  text-align:center;margin-top:20px;
  font-size:9px;color:var(--mu2);
  letter-spacing:.1em;text-transform:uppercase;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">Nova<span>lem</span></div>
    <div class="logo-sub">Cabinet de recrutement · BTP</div>
  </div>

  <div class="box">
    <div class="box-title">Connexion</div>
    <div class="box-sub">Espace privé — accès sur invitation</div>

    <div id="form-wrap">
      <form id="login-form" onsubmit="login(event)" autocomplete="on">
        <div class="field">
          <label class="field-label" for="prenom">Prénom</label>
          <input class="field-input" id="prenom" type="text" placeholder="Louis"
            autocomplete="given-name" required>
        </div>
        <div class="field">
          <label class="field-label" for="nom">Nom</label>
          <input class="field-input" id="nom" type="text" placeholder="Renault"
            autocomplete="family-name" required>
        </div>
        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input class="field-input" id="password" type="password" placeholder="••••••••"
            autocomplete="current-password" required>
        </div>
        <div class="msg" id="msg"></div>
        <button type="submit" class="btn-submit" id="btn-submit">Se connecter</button>
      </form>
    </div>

    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <div class="loader-txt" id="loader-txt">Connexion en cours...</div>
    </div>
  </div>

  <a href="/rejoindre" class="link-join">Pas encore de compte ? Demander l'accès →</a>
  <div class="footer">Novalem &copy; 2026 &middot; Accès privé</div>
</div>

<script>
const SUPABASE_URL = 'https://hfdkkdyyhpymrwiqmitn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmZGtrZHl5aHB5bXJ3aXFtaXRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU3OTgsImV4cCI6MjA4OTIzMTc5OH0.UWli4BIDWHwGOKuFCom8wQFYHnNYPtODAI5Cl7tCRJ8';
const HUB_URL = '/hub';

let sb;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e) {}

// Normalize prénom/nom → email
function toEmail(prenom, nom) {
  function clean(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
  }
  return clean(prenom) + '.' + clean(nom) + '@novalem.internal';
}

function setMsg(txt, cls) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + (cls || '');
}

function setLoading(on, name) {
  document.getElementById('form-wrap').style.display = on ? 'none' : 'block';
  const loader = document.getElementById('loader');
  loader.style.display = on ? 'block' : 'none';
  if (on && name) document.getElementById('loader-txt').textContent = 'Bonjour ' + name + '...';
}

async function login(e) {
  e.preventDefault();
  if (!sb) { setMsg('Client Supabase non disponible', 'err'); return; }

  const prenom   = document.getElementById('prenom').value.trim();
  const nom      = document.getElementById('nom').value.trim();
  const password = document.getElementById('password').value;
  if (!prenom || !nom || !password) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  setMsg('', '');

  const email = toEmail(prenom, nom);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    btn.disabled = false;
    setMsg('Identifiants incorrects', 'err');
    return;
  }

  setLoading(true, prenom);

  // Récupère le profil depuis public.users
  let profile = null;
  try {
    const { data: p } = await sb.from('users')
      .select('role, nom, prenom, avatar_initials, avatar_color')
      .eq('id', data.user.id)
      .single();
    profile = p;
  } catch(e) {}

  const displayName = (profile?.prenom || prenom) + ' ' + (profile?.nom || nom);
  const initials = (profile?.avatar_initials) ||
    ((prenom[0] || '') + (nom[0] || '')).toUpperCase();

  sessionStorage.setItem('novalem_user', JSON.stringify({
    id:       data.user.id,
    name:     displayName.trim(),
    role:     profile?.role || 'scout',
    initials: initials,
    color:    profile?.avatar_color || '#c8e040',
    ts:       Date.now(),
  }));

  window.location.href = HUB_URL;
}

// Session existante → redirect
(async function checkSession() {
  const stored = sessionStorage.getItem('novalem_user');
  if (stored) {
    try {
      const u = JSON.parse(stored);
      if (u?.ts && (Date.now() - u.ts) < 8 * 3600000) {
        window.location.href = HUB_URL;
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('novalem_user');
  }
  // Vérifie aussi la session Supabase
  if (sb) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('users')
          .select('role, nom, prenom, avatar_initials, avatar_color')
          .eq('id', session.user.id)
          .single();
        const parts = session.user.email.split('@')[0].split('.');
        const prenom = profile?.prenom || parts[0] || '';
        const nom    = profile?.nom    || parts[1] || '';
        sessionStorage.setItem('novalem_user', JSON.stringify({
          id:       session.user.id,
          name:     (prenom + ' ' + nom).trim(),
          role:     profile?.role || 'scout',
          initials: profile?.avatar_initials || (prenom[0] + nom[0]).toUpperCase(),
          color:    profile?.avatar_color || '#c8e040',
          ts:       Date.now(),
        }));
        window.location.href = HUB_URL;
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
