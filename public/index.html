<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#09090a;--s1:#111112;--s2:#18181a;--s3:#202022;
  --bd:#2a2a2e;--bd2:#38383d;
  --tx:#f0f0ec;--mu:#8c8c84;--mu2:#4a4a44;
  --ac:#c8e040;--green:#2dd4a0;--red:#f04b4b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(200,224,64,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,224,64,.025) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
.bg-glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(45,212,160,.05) 0%, transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.card{
  position:relative;z-index:1;
  width:100%;max-width:360px;
  padding:0 20px;
  animation:fadeUp .4s cubic-bezier(.2,.8,.3,1);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{text-align:center;margin-bottom:36px}
.logo-mark{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:30px;letter-spacing:-.5px;color:var(--tx);
}
.logo-mark span{color:var(--ac)}
.logo-sub{
  font-size:10px;color:var(--mu2);
  letter-spacing:.22em;text-transform:uppercase;margin-top:5px;
}

.box{
  background:var(--s1);
  border:1px solid var(--bd2);
  border-radius:12px;
  padding:28px 24px 24px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
}
.box-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:16px;
  margin-bottom:4px;
}
.box-sub{
  font-size:10px;color:var(--mu);margin-bottom:22px;
}

.field{margin-bottom:14px}
.field-label{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--mu);margin-bottom:7px;
}
.field-input{
  width:100%;background:var(--s2);border:1px solid var(--bd2);
  border-radius:8px;padding:11px 14px;color:var(--tx);
  font-family:'DM Mono',monospace;font-size:13px;
  outline:none;transition:border-color .15s;
}
.field-input::placeholder{color:var(--mu2)}
.field-input:focus{border-color:rgba(200,224,64,.4)}

.btn-submit{
  width:100%;padding:13px;margin-top:6px;
  background:var(--ac);color:#1a2000;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  border:none;border-radius:8px;cursor:pointer;
  transition:all .15s;letter-spacing:.02em;
}
.btn-submit:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}

.msg{
  text-align:center;font-size:11px;
  margin:10px 0 0;height:16px;
  transition:all .2s;color:transparent;
}
.msg.err{color:var(--red)}
.msg.ok_{color:var(--green)}

.loader{display:none;text-align:center;padding:16px 0}
.loader-ring{
  width:28px;height:28px;
  border:2px solid var(--bd2);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:11px;color:var(--green)}

.link-join{
  display:block;text-align:center;margin-top:16px;
  font-size:11px;color:var(--mu);text-decoration:none;
  transition:color .15s;
}
.link-join:hover{color:var(--ac)}

.footer{
  text-align:center;margin-top:20px;
  font-size:9px;color:var(--mu2);
  letter-spacing:.1em;text-transform:uppercase;
}

/* ═══ NOVALEM LOGIN — PREMIUM ANIMATIONS ═══ */

/* Floating ambient orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;will-change:transform}
.orb-1{width:700px;height:700px;background:radial-gradient(circle,rgba(200,224,64,.07) 0%,transparent 65%);filter:blur(90px);top:-220px;left:-180px;animation:orbFloat1 22s ease-in-out infinite}
.orb-2{width:600px;height:600px;background:radial-gradient(circle,rgba(45,212,160,.06) 0%,transparent 65%);filter:blur(110px);bottom:-180px;right:-120px;animation:orbFloat2 28s ease-in-out infinite}
.orb-3{width:420px;height:420px;background:radial-gradient(circle,rgba(91,141,239,.045) 0%,transparent 65%);filter:blur(75px);top:38%;left:52%;animation:orbFloat3 19s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0)}33%{transform:translate(80px,-50px)}66%{transform:translate(-40px,65px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}40%{transform:translate(-70px,40px)}80%{transform:translate(55px,-65px)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(-90px,55px)}}

/* Grid slow drift */
.bg-grid{animation:gridDrift 55s linear infinite}
@keyframes gridDrift{from{background-position:0 0,0 0}to{background-position:48px 48px,48px 48px}}

/* Central glow pulse */
.bg-glow{animation:glowPulse 6s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}

/* Cursor spotlight */
.cursor-spotlight{position:fixed;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(200,224,64,.032) 0%,transparent 60%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .18s linear,top .18s linear;will-change:left,top}

/* Card entrance — 3D from top */
.card{animation:cardEntrance .7s cubic-bezier(.16,1,.3,1) .05s both}
@keyframes cardEntrance{from{opacity:0;transform:translateY(30px) scale(.965)}to{opacity:1;transform:none}}
.logo{animation:fadeSlide .55s cubic-bezier(.16,1,.3,1) both}
.box{animation:fadeSlide .55s cubic-bezier(.16,1,.3,1) .08s both}
.link-join{animation:fadeSlide .45s cubic-bezier(.16,1,.3,1) .18s both}
.footer{animation:fadeSlide .45s cubic-bezier(.16,1,.3,1) .24s both}
@keyframes fadeSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Logo mark pulsing glow */
.logo-mark{animation:logoGlow 5s ease-in-out infinite}
@keyframes logoGlow{0%,100%{text-shadow:none}50%{text-shadow:0 0 40px rgba(200,224,64,.14)}}

/* Input enhanced focus */
.field-input{transition:border-color .2s,box-shadow .25s,background .15s}
.field-input:focus{border-color:rgba(200,224,64,.6);box-shadow:0 0 0 3px rgba(200,224,64,.07),0 2px 16px rgba(0,0,0,.25);background:var(--s3)}
.field{transition:transform .15s}
.field:has(.field-input:focus){transform:translateX(2px)}
.field:has(.field-input:focus) .field-label{color:rgba(200,224,64,.85);transition:color .2s}

/* Button premium */
.btn-submit{position:relative;overflow:hidden;transition:all .25s cubic-bezier(.16,1,.3,1)}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,224,64,.38),0 4px 14px rgba(200,224,64,.18)}
.btn-submit::before{content:'';position:absolute;top:0;left:-115%;width:80%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);transform:skewX(-25deg)}
.btn-submit:hover::before{left:130%;transition:left .55s ease}

/* Ripple */
.ripple-el{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);transform:scale(0);animation:rippleAnim .7s ease-out forwards;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* Error shake */
@keyframes shakeErr{0%,100%{transform:translateX(0)}14%{transform:translateX(-10px)}28%{transform:translateX(10px)}42%{transform:translateX(-8px)}56%{transform:translateX(8px)}70%{transform:translateX(-4px)}84%{transform:translateX(4px)}}
.shake{animation:shakeErr .52s cubic-bezier(.36,.07,.19,.97)}

/* Loader ring glow */
.loader-ring{border-color:rgba(45,212,160,.14);border-top-color:var(--green);box-shadow:0 0 14px rgba(45,212,160,.2)}

/* Box shine edge */
.box{position:relative;overflow:hidden}
.box::after{content:'';position:absolute;top:0;left:-200%;width:100%;height:100%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.025) 50%,transparent 60%);pointer-events:none;animation:boxShine 8s ease-in-out infinite 2s}
@keyframes boxShine{0%{left:-200%}40%,100%{left:200%}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="cursor-spotlight" id="cursor-spotlight"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">Nova<span>lem</span></div>
    <div class="logo-sub">Cabinet de recrutement · BTP</div>
  </div>

  <div class="box">
    <div class="box-title">Connexion</div>
    <div class="box-sub">Espace privé — accès sur invitation</div>

    <div id="form-wrap">
      <form id="login-form" onsubmit="login(event)" autocomplete="on">
        <div class="field">
          <label class="field-label" for="prenom">Prénom</label>
          <input class="field-input" id="prenom" type="text" placeholder="Louis"
            autocomplete="given-name" required>
        </div>
        <div class="field">
          <label class="field-label" for="nom">Nom</label>
          <input class="field-input" id="nom" type="text" placeholder="Renault"
            autocomplete="family-name" required>
        </div>
        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input class="field-input" id="password" type="password" placeholder="••••••••"
            autocomplete="current-password" required>
        </div>
        <div class="msg" id="msg"></div>
        <button type="submit" class="btn-submit" id="btn-submit">Se connecter</button>
      </form>
    </div>

    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <div class="loader-txt" id="loader-txt">Connexion en cours...</div>
    </div>
  </div>

  <a href="/rejoindre" class="link-join">Pas encore de compte ? Demander l'accès →</a>
  <div class="footer">Novalem &copy; 2026 &middot; Accès privé</div>
</div>

<script>
const SUPABASE_URL  = 'https://ygphaqvwbtjhcypaixim.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncGhhcXZ3YnRqaGN5cGFpeGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyNDM3MTcsImV4cCI6MjA3NDgxOTcxN30.Xu8QXcJOStVsFT4rEgUYhEPtXW2IVKijR9SZb-cTgyc';
const HUB_URL = '/hub';

let sb;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e) {}

// Normalize prénom/nom → email
function toEmail(prenom, nom) {
  function clean(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
  }
  return clean(prenom) + '.' + clean(nom) + '@novalem.internal';
}

function setMsg(txt, cls) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + (cls || '');
}

function setLoading(on, name) {
  document.getElementById('form-wrap').style.display = on ? 'none' : 'block';
  const loader = document.getElementById('loader');
  loader.style.display = on ? 'block' : 'none';
  if (on && name) document.getElementById('loader-txt').textContent = 'Bonjour ' + name + '...';
}

async function login(e) {
  e.preventDefault();
  if (!sb) { setMsg('Client Supabase non disponible', 'err'); return; }

  const prenom   = document.getElementById('prenom').value.trim();
  const nom      = document.getElementById('nom').value.trim();
  const password = document.getElementById('password').value;
  if (!prenom || !nom || !password) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  setMsg('', '');

  const email = toEmail(prenom, nom);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    btn.disabled = false;
    setMsg('Identifiants incorrects', 'err');
    return;
  }

  setLoading(true, prenom);

  // Récupère le profil depuis public.users
  let profile = null;
  try {
    const { data: p } = await sb.from('users')
      .select('role, nom, prenom, avatar_initials, avatar_color')
      .eq('id', data.user.id)
      .single();
    profile = p;
  } catch(e) {}

  const displayName = (profile?.prenom || prenom) + ' ' + (profile?.nom || nom);
  const initials = (profile?.avatar_initials) ||
    ((prenom[0] || '') + (nom[0] || '')).toUpperCase();

  sessionStorage.setItem('novalem_user', JSON.stringify({
    id:       data.user.id,
    name:     displayName.trim(),
    role:     profile?.role || 'scout',
    initials: initials,
    color:    profile?.avatar_color || '#c8e040',
    ts:       Date.now(),
  }));

  window.location.href = HUB_URL;
}

/* === NOVALEM LOGIN — PREMIUM ANIMATIONS JS === */
(function(){
  // Cursor spotlight
  const spotlight = document.getElementById('cursor-spotlight');
  document.addEventListener('mousemove', e => {
    spotlight.style.left = e.clientX + 'px';
    spotlight.style.top = e.clientY + 'px';
  });

  // Ripple + magnetic on submit button
  const btn = document.getElementById('btn-submit');
  btn.addEventListener('pointerdown', function(e) {
    const rect = this.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple-el';
    const size = Math.max(rect.width, rect.height);
    Object.assign(ripple.style, {
      width: size + 'px', height: size + 'px',
      left: (e.clientX - rect.left - size / 2) + 'px',
      top: (e.clientY - rect.top - size / 2) + 'px',
    });
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 750);
  });

  btn.addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const x = (e.clientX - rect.left - rect.width / 2) * .09;
    const y = (e.clientY - rect.top - rect.height / 2) * .09;
    this.style.transform = `translateY(-2px) translate(${x}px,${y}px)`;
  });
  btn.addEventListener('mouseleave', function() { this.style.transform = ''; });

  // Shake inputs on error
  const msgEl = document.getElementById('msg');
  new MutationObserver(() => {
    if (msgEl.classList.contains('err') && msgEl.textContent.trim()) {
      document.querySelectorAll('.field-input').forEach(inp => {
        inp.classList.remove('shake');
        void inp.offsetWidth;
        inp.classList.add('shake');
      });
    }
  }).observe(msgEl, { attributes: true, characterData: true, childList: true });

  // Magnetic link-join
  const linkJoin = document.querySelector('.link-join');
  if (linkJoin) {
    linkJoin.addEventListener('mousemove', function(e) {
      const rect = this.getBoundingClientRect();
      const x = (e.clientX - rect.left - rect.width / 2) * .12;
      const y = (e.clientY - rect.top - rect.height / 2) * .12;
      this.style.transform = `translate(${x}px,${y}px)`;
    });
    linkJoin.addEventListener('mouseleave', function() { this.style.transform = ''; });
  }
})();

// Session existante → redirect
(async function checkSession() {
  const stored = sessionStorage.getItem('novalem_user');
  if (stored) {
    try {
      const u = JSON.parse(stored);
      if (u?.ts && (Date.now() - u.ts) < 8 * 3600000) {
        window.location.href = HUB_URL;
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('novalem_user');
  }
  // Vérifie aussi la session Supabase
  if (sb) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('users')
          .select('role, nom, prenom, avatar_initials, avatar_color')
          .eq('id', session.user.id)
          .single();
        const parts = session.user.email.split('@')[0].split('.');
        const prenom = profile?.prenom || parts[0] || '';
        const nom    = profile?.nom    || parts[1] || '';
        sessionStorage.setItem('novalem_user', JSON.stringify({
          id:       session.user.id,
          name:     (prenom + ' ' + nom).trim(),
          role:     profile?.role || 'scout',
          initials: profile?.avatar_initials || (prenom[0] + nom[0]).toUpperCase(),
          color:    profile?.avatar_color || '#c8e040',
          ts:       Date.now(),
        }));
        window.location.href = HUB_URL;
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
