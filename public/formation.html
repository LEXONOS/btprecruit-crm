<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Académie Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   NOVALEM ACADÉMIE — Formation scout v3
   Dark precision · Ranked learning · Zero emoji · SVG native
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#08080a;--s1:#0f0f11;--s2:#151517;--s3:#1b1b1e;--s4:#222225;--s5:#2a2a2e;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.09);--bd3:rgba(255,255,255,.14);--bd4:rgba(255,255,255,.22);
  --tx:#ededeb;--tx2:#c4c4be;--mu:#7a7a72;--mu2:#4a4a44;--mu3:#2a2a26;
  --ac:#c8e040;--ac2:rgba(200,224,64,.08);--ac3:rgba(200,224,64,.18);--ac4:rgba(200,224,64,.32);
  --gn:#2dd4a0;--gn2:rgba(45,212,160,.08);--gn3:rgba(45,212,160,.18);--gn4:rgba(45,212,160,.32);
  --bl:#5b8def;--bl2:rgba(91,141,239,.08);--bl3:rgba(91,141,239,.18);--bl4:rgba(91,141,239,.32);
  --or:#e8983c;--or2:rgba(232,152,60,.08);--or3:rgba(232,152,60,.18);--or4:rgba(232,152,60,.32);
  --rd:#e05252;--rd2:rgba(224,82,82,.08);--rd3:rgba(224,82,82,.18);
  --pr:#a36bea;--pr2:rgba(163,107,234,.08);--pr3:rgba(163,107,234,.18);--pr4:rgba(163,107,234,.32);
  --gd:#e8c547;--gd2:rgba(232,197,71,.08);--gd3:rgba(232,197,71,.22);
  --glass:rgba(15,15,17,.78);
  --sh1:0 1px 3px rgba(0,0,0,.4);
  --sh2:0 4px 24px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.3);
  --sh3:0 12px 48px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.3);
  --sh-glow-ac:0 0 40px rgba(200,224,64,.25);
  --sh-glow-gn:0 0 40px rgba(45,212,160,.25);
  --sh-glow-gd:0 0 40px rgba(232,197,71,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Instrument Sans','DM Mono',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;position:relative}
::selection{background:rgba(200,224,64,.25);color:#fff}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* ── CANVAS BG ─────────────────────────────────────── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grad-1{position:fixed;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(200,224,64,.03) 0%,transparent 55%);top:-300px;right:-200px;pointer-events:none;z-index:0;filter:blur(60px)}
.bg-grad-2{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(91,141,239,.025) 0%,transparent 55%);bottom:-200px;left:-100px;pointer-events:none;z-index:0;filter:blur(60px)}

/* ── TOPBAR ─────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--bd);
  padding:0 24px;height:58px;
  display:flex;align-items:center;gap:14px;
}
.tb-back{display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:11px;background:var(--s2);border:1px solid var(--bd);color:var(--mu);border-radius:8px;cursor:pointer;transition:.15s;text-decoration:none;font-weight:500}
.tb-back:hover{border-color:var(--bd2);color:var(--tx);background:var(--s3)}
.tb-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx)}
.tb-logo-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--ac),#a8c030);display:flex;align-items:center;justify-content:center}
.tb-logo-icon svg{width:15px;height:15px}
.tb-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.4px}
.tb-logo-text span{color:var(--ac)}
.tb-sep{width:1px;height:20px;background:var(--bd2)}
.tb-page{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.16em;font-weight:500}
.tb-spacer{flex:1}

/* Rank/XP pills */
.tb-rank{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;background:var(--s2);border:1px solid var(--bd);border-radius:999px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.tb-rank:hover{border-color:var(--bd2);background:var(--s3)}
.tb-rank-sigil{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.tb-rank-sigil svg{width:16px;height:16px;stroke-width:2;fill:none}
.tb-rank-name{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.3px}
.tb-rank-lvl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-top:1px;letter-spacing:.1em}

.tb-xp{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:999px;min-width:180px}
.tb-xp-bar{flex:1;height:6px;background:var(--s4);border-radius:99px;overflow:hidden;position:relative}
.tb-xp-fill{height:100%;background:linear-gradient(90deg,var(--ac),#a8c030);border-radius:99px;transition:width .8s cubic-bezier(.22,.68,0,1.2);box-shadow:0 0 10px var(--ac4)}
.tb-xp-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx2);white-space:nowrap;font-weight:500}
.tb-xp-text b{color:var(--ac);font-weight:700}

.tb-streak{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:999px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--or)}
.tb-streak svg{width:14px;height:14px;stroke:var(--or);fill:var(--or2);stroke-width:1.8}
.tb-streak b{font-family:'Syne',sans-serif;font-size:12px;font-weight:800}

/* ── MAIN LAYOUT ─────────────────────────────────── */
.main{position:relative;z-index:1;min-height:calc(100vh - 58px)}
.view{display:none;animation:viewIn .45s cubic-bezier(.22,.68,0,1.2)}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Common containers */
.wrap{max-width:1280px;margin:0 auto;padding:28px 32px 80px}
.wrap-wide{max-width:1400px;margin:0 auto;padding:28px 32px 80px}
.wrap-narrow{max-width:820px;margin:0 auto;padding:28px 32px 80px}

/* Section label */
.sec{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:8px}
.sec-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--mu2);white-space:nowrap;font-weight:500}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bd2),transparent)}
.sec-action{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);cursor:pointer;padding:4px 10px;border-radius:999px;border:1px solid var(--bd);transition:.15s}
.sec-action:hover{color:var(--tx);border-color:var(--bd2);background:var(--s2)}

/* ══ HOME VIEW — la vitrine d'arrivée ══ */
.home-hero{padding:32px 0 20px;position:relative}
.home-hero-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.home-hero-date::before{content:'';width:18px;height:1px;background:var(--mu2)}
.home-hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:-1.6px;line-height:1.05;margin-bottom:14px}
.home-hero-title .accent{color:var(--ac)}
.home-hero-sub{font-size:14px;color:var(--tx2);line-height:1.65;max-width:620px;font-weight:400}

/* Manifesto banner */
.manifesto{
  margin:28px 0 40px;
  padding:32px 36px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--s1) 0%,#141418 100%);
  border:1px solid var(--bd);
  position:relative;overflow:hidden;
}
.manifesto::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--ac),var(--gn));
}
.manifesto::after{
  content:'"';position:absolute;top:-30px;right:20px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:220px;
  color:var(--ac);opacity:.04;line-height:1;pointer-events:none;
}
.manifesto-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--ac);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.manifesto-tag::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
.manifesto-text{font-family:'Syne',sans-serif;font-weight:600;font-size:22px;line-height:1.5;letter-spacing:-.4px;max-width:800px;color:var(--tx)}
.manifesto-text em{color:var(--ac);font-style:normal}
.manifesto-author{margin-top:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:.04em}
.manifesto-author b{color:var(--tx2);font-weight:600}

/* Rank card */
.rank-card{
  background:linear-gradient(135deg,var(--s1),#15151a);
  border:1px solid var(--bd);border-radius:18px;
  padding:32px;margin-bottom:32px;
  display:grid;grid-template-columns:160px 1fr auto;gap:32px;align-items:center;
  position:relative;overflow:hidden;
}
.rank-card::before{content:'';position:absolute;top:0;right:0;width:360px;height:100%;background:radial-gradient(circle at 80% 50%,var(--ac2),transparent 60%);pointer-events:none}
.rank-visual{position:relative;width:140px;height:160px;margin:0 auto}
.rank-visual svg{width:100%;height:100%;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4))}
.rank-info{position:relative;z-index:1}
.rank-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--mu);margin-bottom:8px}
.rank-title{font-family:'Syne',sans-serif;font-weight:800;font-size:38px;letter-spacing:-1.2px;line-height:1;margin-bottom:10px;color:var(--tx)}
.rank-desc{font-size:13px;color:var(--tx2);line-height:1.6;max-width:420px;margin-bottom:18px}
.rank-progress-wrap{display:flex;align-items:center;gap:14px}
.rank-progress{flex:1;max-width:380px;height:8px;background:var(--s3);border-radius:99px;overflow:hidden;border:1px solid var(--bd)}
.rank-progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),#a8c030);border-radius:99px;transition:width .8s cubic-bezier(.22,.68,0,1.2);box-shadow:0 0 12px var(--ac4)}
.rank-progress-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);white-space:nowrap}
.rank-progress-text b{color:var(--ac);font-weight:700}
.rank-stats{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;min-width:140px}
.rank-stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.rank-stat-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu2);margin-bottom:4px}
.rank-stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.3px;line-height:1}
.rank-stat-val.ac{color:var(--ac)}
.rank-stat-val.gn{color:var(--gn)}
.rank-stat-val.or{color:var(--or)}
.rank-stat-val.pr{color:var(--pr)}

/* ══ JOURNEY MAP — 5 niveaux visualisés ══ */
.journey{position:relative;padding:28px 0;margin-bottom:36px}
.journey-path{position:absolute;top:50%;left:5%;right:5%;height:2px;background:linear-gradient(90deg,var(--bd),var(--bd2),var(--bd));transform:translateY(-50%);z-index:0}
.journey-nodes{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;position:relative;z-index:1}
.jn{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:20px 18px;text-align:center;position:relative;
  transition:.25s cubic-bezier(.22,.68,0,1.2);cursor:pointer;
}
.jn:hover{border-color:var(--bd3);transform:translateY(-4px);box-shadow:var(--sh2)}
.jn.locked{opacity:.45}
.jn.locked:hover{transform:none;cursor:not-allowed}
.jn.unlocked{border-color:var(--bd2)}
.jn.completed{background:linear-gradient(135deg,var(--s1),var(--s2))}
.jn-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu2);letter-spacing:.2em;margin-bottom:10px}
.jn-icon{width:52px;height:52px;margin:0 auto 12px;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;transition:.25s}
.jn-icon svg{width:26px;height:26px;stroke-width:1.8;fill:none}
.jn[data-c="ac"] .jn-icon{background:var(--ac2);border:1px solid var(--ac3)}
.jn[data-c="ac"] .jn-icon svg{stroke:var(--ac)}
.jn[data-c="bl"] .jn-icon{background:var(--bl2);border:1px solid var(--bl3)}
.jn[data-c="bl"] .jn-icon svg{stroke:var(--bl)}
.jn[data-c="or"] .jn-icon{background:var(--or2);border:1px solid var(--or3)}
.jn[data-c="or"] .jn-icon svg{stroke:var(--or)}
.jn[data-c="pr"] .jn-icon{background:var(--pr2);border:1px solid var(--pr3)}
.jn[data-c="pr"] .jn-icon svg{stroke:var(--pr)}
.jn[data-c="gn"] .jn-icon{background:var(--gn2);border:1px solid var(--gn3)}
.jn[data-c="gn"] .jn-icon svg{stroke:var(--gn)}
.jn.completed .jn-icon::after{content:'';position:absolute;inset:-3px;border-radius:16px;border:1px solid currentColor;opacity:.4}
.jn.completed[data-c="ac"] .jn-icon::after{color:var(--ac)}
.jn.completed[data-c="bl"] .jn-icon::after{color:var(--bl)}
.jn.completed[data-c="or"] .jn-icon::after{color:var(--or)}
.jn.completed[data-c="pr"] .jn-icon::after{color:var(--pr)}
.jn.completed[data-c="gn"] .jn-icon::after{color:var(--gn)}
.jn-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:-.2px;color:var(--tx);margin-bottom:4px;line-height:1.2}
.jn-sub{font-size:10px;color:var(--mu);line-height:1.3;min-height:26px;margin-bottom:10px}
.jn-prog{height:4px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:6px}
.jn-prog-fill{height:100%;background:currentColor;border-radius:99px;transition:width .6s ease}
.jn[data-c="ac"] .jn-prog-fill{background:var(--ac)}
.jn[data-c="bl"] .jn-prog-fill{background:var(--bl)}
.jn[data-c="or"] .jn-prog-fill{background:var(--or)}
.jn[data-c="pr"] .jn-prog-fill{background:var(--pr)}
.jn[data-c="gn"] .jn-prog-fill{background:var(--gn)}
.jn-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu2);letter-spacing:.05em}
.jn-lock{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;display:none}
.jn.locked .jn-lock{display:flex}
.jn-lock svg{width:11px;height:11px;stroke:var(--mu2);fill:none;stroke-width:2}

/* ══ HOME GRID — daily, badges, continue ══ */
.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:36px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px;transition:.2s}
.card:hover{border-color:var(--bd2)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.card-title svg{width:16px;height:16px;stroke-width:1.8;fill:none}
.card-tag{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;padding:3px 9px;border-radius:99px;background:var(--s3);color:var(--mu);border:1px solid var(--bd);font-weight:600}
.card-tag.live{background:var(--gn2);color:var(--gn);border-color:var(--gn3)}
.card-tag.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* Continue card (big) */
.continue{
  background:linear-gradient(135deg,var(--s1) 0%,#15181a 100%);
  border:1px solid var(--bd2);border-radius:14px;padding:26px;position:relative;overflow:hidden;
}
.continue-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--gn);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.continue-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gn);box-shadow:0 0 8px var(--gn)}
.continue-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.6px;margin-bottom:8px}
.continue-desc{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:20px;max-width:440px}
.continue-meta{display:flex;align-items:center;gap:14px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mu)}
.continue-meta-item{display:flex;align-items:center;gap:5px}
.continue-meta svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.continue-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:var(--ac);color:#0a0a0a;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;transition:.15s;letter-spacing:-.2px}
.continue-btn:hover{background:#d4eb52;transform:translateX(2px);box-shadow:var(--sh-glow-ac)}
.continue-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2}

/* Daily drill card */
.drill-card{cursor:pointer}
.drill-q{font-family:'Syne',sans-serif;font-weight:600;font-size:16px;line-height:1.4;margin-bottom:16px;color:var(--tx)}
.drill-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.drill-opt{padding:11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;font-size:12px;cursor:pointer;transition:.15s;text-align:left;display:flex;align-items:center;gap:10px}
.drill-opt:hover{border-color:var(--bd2);background:var(--s3)}
.drill-opt.correct{border-color:var(--gn);background:var(--gn2);color:var(--gn)}
.drill-opt.wrong{border-color:var(--rd);background:var(--rd2);color:var(--rd)}
.drill-opt-key{width:20px;height:20px;border-radius:4px;background:var(--s4);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;color:var(--mu);flex-shrink:0}
.drill-opt.correct .drill-opt-key{background:var(--gn3);color:var(--gn)}
.drill-opt.wrong .drill-opt-key{background:var(--rd3);color:var(--rd)}
.drill-explain{background:var(--s2);border-left:2px solid var(--gn);padding:10px 14px;border-radius:0 8px 8px 0;font-size:11px;color:var(--tx2);line-height:1.5;display:none;margin-top:10px}
.drill-explain.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* Badges shelf */
.badges-shelf{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bs-slot{aspect-ratio:1;border-radius:10px;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;position:relative;transition:.15s;cursor:pointer}
.bs-slot:hover{border-color:var(--bd3);transform:scale(1.05)}
.bs-slot.locked{opacity:.3}
.bs-slot svg{width:26px;height:26px;stroke-width:1.8;fill:none;stroke:var(--mu2)}
.bs-slot.unlocked svg{stroke:var(--gd);fill:var(--gd2)}
.bs-slot.unlocked{border-color:var(--gd3);background:var(--gd2);box-shadow:var(--sh-glow-gd)}
.bs-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--bd3);padding:6px 10px;border-radius:6px;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;z-index:10}
.bs-slot:hover .bs-tooltip{opacity:1}

/* Quick cards grid (Arsenal, Codex, Défis) */
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px}
.fc{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:24px;cursor:pointer;transition:.25s cubic-bezier(.22,.68,0,1.2);
  position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block;
}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:.25s}
.fc:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:var(--sh2)}
.fc:hover::before{opacity:1}
.fc[data-c="or"]::before{background:var(--or)}
.fc[data-c="pr"]::before{background:var(--pr)}
.fc[data-c="rd"]::before{background:var(--rd)}
.fc-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.fc-icon svg{width:20px;height:20px;stroke-width:1.8;fill:none}
.fc[data-c="or"] .fc-icon{background:var(--or2);border:1px solid var(--or3)}.fc[data-c="or"] .fc-icon svg{stroke:var(--or)}
.fc[data-c="pr"] .fc-icon{background:var(--pr2);border:1px solid var(--pr3)}.fc[data-c="pr"] .fc-icon svg{stroke:var(--pr)}
.fc[data-c="rd"] .fc-icon{background:var(--rd2);border:1px solid var(--rd3)}.fc[data-c="rd"] .fc-icon svg{stroke:var(--rd)}
.fc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.4px;margin-bottom:8px}
.fc-desc{font-size:12px;color:var(--mu);line-height:1.5;margin-bottom:16px}
.fc-foot{display:flex;align-items:center;justify-content:space-between}
.fc-tag{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu2);padding:4px 10px;background:var(--s2);border-radius:999px;border:1px solid var(--bd);font-weight:500}
.fc-arrow{width:28px;height:28px;border-radius:50%;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.2s}
.fc:hover .fc-arrow{background:var(--tx);border-color:var(--tx);transform:translateX(3px)}
.fc:hover .fc-arrow svg{stroke:#000}
.fc-arrow svg{width:13px;height:13px;stroke:var(--mu);fill:none;stroke-width:2;transition:.2s}

/* ══ LEVEL VIEW ══ */
.level-hero{padding:32px 0 24px;position:relative}
.lh-crumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase}
.lh-crumb a{color:var(--mu);text-decoration:none;transition:.15s}
.lh-crumb a:hover{color:var(--tx)}
.lh-crumb svg{width:10px;height:10px;stroke:var(--mu2);fill:none;stroke-width:2}
.lh-top{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:start;margin-bottom:28px}
.lh-title-row{display:flex;align-items:center;gap:20px;margin-bottom:14px}
.lh-roman{font-family:'Syne',sans-serif;font-weight:800;font-size:82px;letter-spacing:-3px;line-height:1;opacity:.22}
.lh-title{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:-1.4px;line-height:1}
.lh-subtitle{font-family:'Syne',sans-serif;font-weight:500;font-size:20px;color:var(--tx2);letter-spacing:-.4px;margin-bottom:14px;font-style:italic}
.lh-desc{font-size:14px;color:var(--tx2);line-height:1.7;max-width:620px;margin-bottom:8px}
.lh-promise{margin-top:18px;padding:16px 20px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;border-left:3px solid currentColor;max-width:620px}
.lh-promise-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px;font-weight:600}
.lh-promise-text{font-size:13px;color:var(--tx);line-height:1.6}
.lh-stats{display:flex;flex-direction:column;gap:10px;min-width:220px}
.lh-stat{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 16px}
.lh-stat-k{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu2);margin-bottom:4px}
.lh-stat-v{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.4px;line-height:1}
.lh-stat-s{font-size:10px;color:var(--mu);margin-top:2px}

/* Module cards list */
.modules-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.ml-item{
  display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:center;
  padding:18px 22px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  cursor:pointer;transition:.2s cubic-bezier(.22,.68,0,1.2);text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
}
.ml-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:currentColor;opacity:0;transition:.2s}
.ml-item:hover{border-color:var(--bd2);transform:translateX(4px)}
.ml-item:hover::before{opacity:1}
.ml-item.completed{background:linear-gradient(90deg,var(--s1),var(--s2))}
.ml-item.completed::before{opacity:.5}
.ml-item.locked{opacity:.4;cursor:not-allowed}
.ml-item.locked:hover{transform:none}
.ml-num{
  width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;
  background:var(--s2);border:1px solid var(--bd);color:var(--mu);
  flex-shrink:0;transition:.2s;position:relative;
}
.ml-item.completed .ml-num{background:var(--gn2);border-color:var(--gn3);color:var(--gn)}
.ml-item.completed .ml-num .ml-check{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:inherit;border-radius:inherit}
.ml-item.completed .ml-num .ml-check svg{width:22px;height:22px;stroke:var(--gn);fill:none;stroke-width:2.6}
.ml-body{min-width:0}
.ml-toptags{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ml-type{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu2);font-weight:500;padding:2px 7px;background:var(--s3);border-radius:99px;border:1px solid var(--bd)}
.ml-type.quiz{color:var(--bl);border-color:var(--bl3);background:var(--bl2)}
.ml-type.scenario{color:var(--pr);border-color:var(--pr3);background:var(--pr2)}
.ml-type.drill{color:var(--or);border-color:var(--or3);background:var(--or2)}
.ml-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.3px;color:var(--tx);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.ml-desc{font-size:12px;color:var(--mu);line-height:1.5;max-width:600px}
.ml-right{display:flex;align-items:center;gap:18px;flex-shrink:0}
.ml-dur{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:5px}
.ml-dur svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.ml-xp{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);display:flex;align-items:center;gap:4px;font-weight:600}
.ml-xp svg{width:11px;height:11px;fill:var(--ac)}
.ml-go{width:32px;height:32px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;transition:.2s;border:1px solid var(--bd)}
.ml-go svg{width:13px;height:13px;stroke:var(--mu);fill:none;stroke-width:2;transition:.15s}
.ml-item:hover .ml-go{background:var(--tx);border-color:var(--tx)}
.ml-item:hover .ml-go svg{stroke:#000;transform:translateX(2px)}

/* Level color accents */
.lh-title.ac,.ml-item.ac{color:var(--ac)}
.lh-title.bl,.ml-item.bl{color:var(--bl)}
.lh-title.or,.ml-item.or{color:var(--or)}
.lh-title.pr,.ml-item.pr{color:var(--pr)}
.lh-title.gn,.ml-item.gn{color:var(--gn)}
.lh-promise.ac{border-left-color:var(--ac)}
.lh-promise.bl{border-left-color:var(--bl)}
.lh-promise.or{border-left-color:var(--or)}
.lh-promise.pr{border-left-color:var(--pr)}
.lh-promise.gn{border-left-color:var(--gn)}
.lh-promise-label.ac{color:var(--ac)}
.lh-promise-label.bl{color:var(--bl)}
.lh-promise-label.or{color:var(--or)}
.lh-promise-label.pr{color:var(--pr)}
.lh-promise-label.gn{color:var(--gn)}
.lh-stat-v.ac{color:var(--ac)}
.lh-stat-v.bl{color:var(--bl)}
.lh-stat-v.or{color:var(--or)}
.lh-stat-v.pr{color:var(--pr)}
.lh-stat-v.gn{color:var(--gn)}

/* ══ MODULE VIEW (lesson + quiz) ══ */
.mod-layout{display:grid;grid-template-columns:1fr 260px;gap:36px;align-items:start}
@media(max-width:1040px){.mod-layout{grid-template-columns:1fr}}
.mod-col{min-width:0}
.mod-aside{position:sticky;top:76px}

.mod-head{margin-bottom:28px}
.mod-crumb{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase}
.mod-crumb a{color:var(--mu);text-decoration:none;transition:.15s;cursor:pointer}
.mod-crumb a:hover{color:var(--tx)}
.mod-crumb svg{width:10px;height:10px;stroke:var(--mu2);fill:none;stroke-width:2}
.mod-topline{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.mod-num{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;padding:4px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;letter-spacing:.2px}
.mod-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);padding:4px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:99px}
.mod-tag-dur{color:var(--mu);display:flex;align-items:center;gap:5px}
.mod-tag-dur svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.mod-tag-xp{color:var(--ac);border-color:var(--ac3);background:var(--ac2)}
.mod-title{font-family:'Syne',sans-serif;font-weight:800;font-size:38px;letter-spacing:-1.2px;line-height:1.1;margin-bottom:12px}
.mod-lead{font-size:15px;color:var(--tx2);line-height:1.7;max-width:640px}

.mod-body{font-size:14px;line-height:1.7;color:var(--tx);max-width:740px}
.mod-body h3{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.5px;margin:36px 0 14px;color:var(--tx);position:relative;padding-left:18px}
.mod-body h3::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%;background:var(--ac)}
.mod-body h4{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.2px;margin:24px 0 10px;color:var(--tx)}
.mod-body p{margin-bottom:14px;color:var(--tx2)}
.mod-body strong{color:var(--tx);font-weight:600}
.mod-body ul,.mod-body ol{margin:10px 0 18px;padding-left:0}
.mod-body li{list-style:none;padding:8px 0 8px 24px;position:relative;color:var(--tx2);line-height:1.65}
.mod-body ul li::before{content:'';position:absolute;left:3px;top:17px;width:8px;height:1px;background:var(--ac)}
.mod-body ol{counter-reset:item}
.mod-body ol li{counter-increment:item}
.mod-body ol li::before{content:counter(item,decimal-leading-zero);position:absolute;left:0;top:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);font-weight:600;letter-spacing:.1em}
.mod-body blockquote{margin:22px 0;padding:16px 22px;background:var(--s1);border-left:3px solid var(--ac);border-radius:0 10px 10px 0;font-style:italic;font-family:'Syne',sans-serif;font-weight:500;font-size:17px;color:var(--tx);line-height:1.5}
.mod-body blockquote cite{display:block;font-style:normal;font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);margin-top:10px;letter-spacing:.03em}
.mod-body code{font-family:'DM Mono',monospace;font-size:12px;background:var(--s3);padding:2px 7px;border-radius:4px;border:1px solid var(--bd);color:var(--ac)}

/* Callout */
.callout{
  display:flex;gap:14px;padding:16px 20px;
  border-radius:10px;margin:20px 0;
  background:var(--s1);border:1px solid var(--bd);
  border-left-width:3px;
  font-size:13px;line-height:1.6;color:var(--tx2);
}
.callout.tip{border-left-color:var(--ac);background:linear-gradient(90deg,var(--ac2) 0%,var(--s1) 40%)}
.callout.warn{border-left-color:var(--or);background:linear-gradient(90deg,var(--or2) 0%,var(--s1) 40%)}
.callout.key{border-left-color:var(--bl);background:linear-gradient(90deg,var(--bl2) 0%,var(--s1) 40%)}
.callout.pro{border-left-color:var(--pr);background:linear-gradient(90deg,var(--pr2) 0%,var(--s1) 40%)}
.callout.success{border-left-color:var(--gn);background:linear-gradient(90deg,var(--gn2) 0%,var(--s1) 40%)}
.callout-ic{flex-shrink:0;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.callout.tip .callout-ic{background:var(--ac2)}.callout.tip .callout-ic svg{stroke:var(--ac)}
.callout.warn .callout-ic{background:var(--or2)}.callout.warn .callout-ic svg{stroke:var(--or)}
.callout.key .callout-ic{background:var(--bl2)}.callout.key .callout-ic svg{stroke:var(--bl)}
.callout.pro .callout-ic{background:var(--pr2)}.callout.pro .callout-ic svg{stroke:var(--pr)}
.callout.success .callout-ic{background:var(--gn2)}.callout.success .callout-ic svg{stroke:var(--gn)}
.callout-ic svg{width:15px;height:15px;fill:none;stroke-width:2}
.callout-body strong{display:block;color:var(--tx);font-weight:700;margin-bottom:3px;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.callout.tip strong{color:var(--ac)}
.callout.warn strong{color:var(--or)}
.callout.key strong{color:var(--bl)}
.callout.pro strong{color:var(--pr)}
.callout.success strong{color:var(--gn)}

/* Script bloc (pour modules scripts) */
.script{
  margin:18px 0;padding:16px 20px;
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  position:relative;
}
.script-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--or);margin-bottom:10px;display:flex;align-items:center;gap:6px;font-weight:600}
.script-label svg{width:12px;height:12px;stroke:var(--or);fill:none;stroke-width:2}
.script-text{font-family:'Syne',sans-serif;font-weight:500;font-size:14px;line-height:1.65;color:var(--tx);font-style:italic}
.script-text em{color:var(--ac);font-style:normal;font-weight:600}
.script-note{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd);font-size:11px;color:var(--mu);line-height:1.5}

/* Comparison table */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.cmp-col{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px}
.cmp-col.bad{border-left:3px solid var(--rd)}
.cmp-col.good{border-left:3px solid var(--gn)}
.cmp-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;font-weight:600}
.cmp-col.bad .cmp-label{color:var(--rd)}
.cmp-col.good .cmp-label{color:var(--gn)}
.cmp-body{font-size:13px;color:var(--tx2);line-height:1.6;font-style:italic}

/* Objection pair */
.obj-pair{margin:16px 0;background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.obj-q{padding:14px 18px;background:var(--rd2);border-bottom:1px solid var(--bd);font-weight:600;font-size:13px;color:var(--rd);font-style:italic}
.obj-q::before{content:'« ';color:var(--rd);opacity:.5}
.obj-q::after{content:' »';color:var(--rd);opacity:.5}
.obj-a{padding:14px 18px;font-size:13px;color:var(--tx2);line-height:1.6}
.obj-a strong{color:var(--ac);font-weight:700;display:block;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.12em}

/* Checklist interactive */
.chk{margin:18px 0;background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.chk-title{padding:12px 18px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--bl);background:var(--bl2);border-bottom:1px solid var(--bl3);font-weight:600}
.chk-list{padding:8px 0}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:10px 18px;cursor:pointer;transition:.15s;font-size:13px;color:var(--tx2);line-height:1.5}
.chk-item:hover{background:var(--s2)}
.chk-box{width:18px;height:18px;border:1.5px solid var(--mu2);border-radius:5px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.15s}
.chk-item.done .chk-box{background:var(--gn);border-color:var(--gn)}
.chk-item.done .chk-box svg{opacity:1;stroke:#0a0a0a}
.chk-box svg{width:11px;height:11px;fill:none;stroke-width:3;opacity:0;transition:.15s}
.chk-item.done{color:var(--mu2);text-decoration:line-through}

/* Stat visualization block */
.stat-viz{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}
.sv{padding:18px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;text-align:center}
.sv-big{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;letter-spacing:-.6px;line-height:1;margin-bottom:5px}
.sv-big.ac{color:var(--ac)}
.sv-big.gn{color:var(--gn)}
.sv-big.bl{color:var(--bl)}
.sv-big.or{color:var(--or)}
.sv-big.pr{color:var(--pr)}
.sv-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu)}

/* Module navigation */
.mod-nav{display:flex;gap:12px;justify-content:space-between;margin-top:40px;padding-top:28px;border-top:1px solid var(--bd)}
.mnav-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s;text-decoration:none}
.mnav-btn:hover{background:var(--s3);border-color:var(--bd2);color:var(--tx)}
.mnav-btn.primary{background:var(--ac);color:#0a0a0a;border-color:var(--ac)}
.mnav-btn.primary:hover{background:#d4eb52;box-shadow:var(--sh-glow-ac)}
.mnav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ QUIZ BLOCK (validation à la fin du module) ══ */
.quiz{
  margin-top:36px;padding:28px;
  background:linear-gradient(135deg,var(--s1),#141418);
  border:1px solid var(--bd2);border-radius:16px;
  position:relative;overflow:hidden;
}
.quiz::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--bl)}
.quiz-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.quiz-icon{width:38px;height:38px;border-radius:10px;background:var(--bl2);border:1px solid var(--bl3);display:flex;align-items:center;justify-content:center}
.quiz-icon svg{width:18px;height:18px;stroke:var(--bl);fill:none;stroke-width:1.8}
.quiz-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.3px}
.quiz-sub{font-size:12px;color:var(--mu);margin-bottom:22px}
.quiz-q{margin-top:22px;padding-top:22px;border-top:1px solid var(--bd)}
.quiz-q:first-of-type{border-top:none;margin-top:0;padding-top:0}
.quiz-qnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--bl);letter-spacing:.14em;margin-bottom:6px;font-weight:600}
.quiz-qtext{font-family:'Syne',sans-serif;font-weight:600;font-size:16px;line-height:1.4;margin-bottom:14px;color:var(--tx)}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{padding:11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;font-size:12px;cursor:pointer;transition:.15s;text-align:left;display:flex;align-items:center;gap:10px;color:var(--tx2)}
.quiz-opt:hover{border-color:var(--bd2);background:var(--s3);color:var(--tx)}
.quiz-opt.correct{border-color:var(--gn);background:var(--gn2);color:var(--gn)}
.quiz-opt.wrong{border-color:var(--rd);background:var(--rd2);color:var(--rd)}
.quiz-opt.disabled{pointer-events:none}
.quiz-opt-key{width:22px;height:22px;border-radius:5px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:'Syne',monospace;font-size:10px;font-weight:700;color:var(--mu);flex-shrink:0}
.quiz-opt.correct .quiz-opt-key{background:var(--gn3);color:var(--gn)}
.quiz-opt.wrong .quiz-opt-key{background:var(--rd3);color:var(--rd)}
.quiz-expl{background:var(--s2);border-left:2px solid var(--gn);padding:10px 14px;border-radius:0 7px 7px 0;font-size:11px;color:var(--tx2);line-height:1.5;display:none;margin-top:10px}
.quiz-expl.show{display:block;animation:fadeIn .3s ease}
.quiz-expl b{color:var(--gn)}

.quiz-result{margin-top:24px;padding:20px;border-radius:12px;text-align:center;display:none}
.quiz-result.show{display:block;animation:fadeIn .4s ease}
.quiz-result.pass{background:var(--gn2);border:1px solid var(--gn3)}
.quiz-result.fail{background:var(--or2);border:1px solid var(--or3)}
.qr-score{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;letter-spacing:-.6px;margin-bottom:6px}
.quiz-result.pass .qr-score{color:var(--gn)}
.quiz-result.fail .qr-score{color:var(--or)}
.qr-text{font-size:13px;color:var(--tx2);margin-bottom:14px}
.qr-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.quiz-result.pass .qr-btn{background:var(--gn);color:#0a0a0a;border:none}
.quiz-result.pass .qr-btn:hover{background:#4eddb4}
.quiz-result.fail .qr-btn{background:var(--s3);color:var(--tx);border:1px solid var(--bd2)}
.quiz-result.fail .qr-btn:hover{background:var(--s4)}
.qr-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ ASIDE (module sidebar) ══ */
.aside-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:12px}
.aside-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.aside-title svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.aside-nav{display:flex;flex-direction:column;gap:4px}
.aside-nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:11px;color:var(--mu);cursor:pointer;transition:.15s;line-height:1.3}
.aside-nav-item:hover{background:var(--s2);color:var(--tx2)}
.aside-nav-item.active{background:var(--ac2);color:var(--ac);border:1px solid var(--ac3)}
.aside-nav-item.done{color:var(--gn)}
.aside-nav-num{width:18px;height:18px;border-radius:4px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;color:var(--mu);flex-shrink:0}
.aside-nav-item.active .aside-nav-num{background:var(--ac3);color:var(--ac)}
.aside-nav-item.done .aside-nav-num{background:var(--gn3);color:var(--gn)}

.aside-stat{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)}
.aside-stat:last-child{border-bottom:none}
.aside-stat-k{font-size:11px;color:var(--mu)}
.aside-stat-v{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--tx)}

/* ══ ARSENAL VIEW ══ */
.arsenal-tabs{display:flex;gap:4px;border-bottom:1px solid var(--bd);margin-bottom:22px;overflow-x:auto}
.ar-tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.ar-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.ar-tab:hover{color:var(--tx2)}
.ar-tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.ar-search{margin-bottom:18px;position:relative}
.ar-search input{width:100%;padding:11px 14px 11px 38px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:13px;transition:.15s}
.ar-search input:focus{outline:none;border-color:var(--bd3);background:var(--s2)}
.ar-search svg{position:absolute;top:50%;left:14px;transform:translateY(-50%);width:15px;height:15px;stroke:var(--mu);fill:none;stroke-width:2;pointer-events:none}
.ar-content{display:none}
.ar-content.active{display:block;animation:viewIn .3s ease}
.ar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.ar-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;transition:.15s;cursor:pointer}
.ar-card:hover{border-color:var(--bd2);background:var(--s2)}
.ar-card-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:600}
.ar-card-label.or{color:var(--or)}
.ar-card-label.bl{color:var(--bl)}
.ar-card-label.pr{color:var(--pr)}
.ar-card-label.gn{color:var(--gn)}
.ar-card-label::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.ar-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px;color:var(--tx);margin-bottom:8px}
.ar-card-text{font-size:12px;color:var(--tx2);line-height:1.6;font-style:italic;font-family:'Syne',sans-serif;font-weight:400}
.ar-card-foot{margin-top:12px;padding-top:10px;border-top:1px dashed var(--bd);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.ar-copy{padding:4px 10px;background:var(--s3);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:10px;color:var(--mu);transition:.15s}
.ar-copy:hover{background:var(--s4);color:var(--tx)}
.ar-copy.copied{background:var(--gn);color:#0a0a0a;border-color:var(--gn)}

/* ══ CODEX VIEW ══ */
.codex-tabs{display:flex;gap:4px;border-bottom:1px solid var(--bd);margin-bottom:22px;overflow-x:auto}
.cx-tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.cx-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.cx-tab:hover{color:var(--tx2)}
.cx-tab.active{color:var(--pr);border-bottom-color:var(--pr)}
.cx-content{display:none}
.cx-content.active{display:block;animation:viewIn .3s ease}
.cx-table{width:100%;border-collapse:collapse;background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.cx-table thead{background:var(--s2)}
.cx-table th{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);font-weight:600;text-align:left;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.15s}
.cx-table th:hover{color:var(--tx)}
.cx-table td{padding:12px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx2);line-height:1.4}
.cx-table tr:last-child td{border-bottom:none}
.cx-table tr{transition:.1s;cursor:pointer}
.cx-table tbody tr:hover{background:var(--s2)}
.cx-table .cx-name{font-weight:600;color:var(--tx)}
.cx-table .cx-hi{color:var(--ac);font-weight:600}
.cx-table .cx-warn{color:var(--or);font-weight:600}
.cx-chip{display:inline-block;padding:2px 8px;background:var(--s3);border:1px solid var(--bd);border-radius:99px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;color:var(--tx2)}
.cx-chip.ac{background:var(--ac2);color:var(--ac);border-color:var(--ac3)}
.cx-chip.rd{background:var(--rd2);color:var(--rd);border-color:var(--rd3)}
.cx-chip.bl{background:var(--bl2);color:var(--bl);border-color:var(--bl3)}
.cx-chip.or{background:var(--or2);color:var(--or);border-color:var(--or3)}

/* ══ DÉFIS VIEW ══ */
.defis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.df-card{
  background:linear-gradient(135deg,var(--s1),#16161a);
  border:1px solid var(--bd);border-radius:14px;padding:26px;
  cursor:pointer;transition:.25s cubic-bezier(.22,.68,0,1.2);position:relative;overflow:hidden;
}
.df-card:hover{border-color:var(--bd3);transform:translateY(-3px);box-shadow:var(--sh2)}
.df-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.df-card-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.df-card-icon svg{width:20px;height:20px;stroke-width:1.8;fill:none}
.df-card[data-c="rd"] .df-card-icon{background:var(--rd2);border:1px solid var(--rd3)}.df-card[data-c="rd"] .df-card-icon svg{stroke:var(--rd)}
.df-card[data-c="or"] .df-card-icon{background:var(--or2);border:1px solid var(--or3)}.df-card[data-c="or"] .df-card-icon svg{stroke:var(--or)}
.df-card[data-c="pr"] .df-card-icon{background:var(--pr2);border:1px solid var(--pr3)}.df-card[data-c="pr"] .df-card-icon svg{stroke:var(--pr)}
.df-card[data-c="bl"] .df-card-icon{background:var(--bl2);border:1px solid var(--bl3)}.df-card[data-c="bl"] .df-card-icon svg{stroke:var(--bl)}
.df-card-reward{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);background:var(--ac2);border:1px solid var(--ac3);padding:4px 10px;border-radius:99px;display:flex;align-items:center;gap:4px;font-weight:600}
.df-card-reward svg{width:11px;height:11px;fill:var(--ac)}
.df-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.4px;margin-bottom:8px}
.df-card-desc{font-size:12px;color:var(--mu);line-height:1.5;margin-bottom:16px}
.df-card-meta{display:flex;align-items:center;gap:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu)}
.df-card-meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}

/* Objections wall (timed) */
.ow-screen{display:none;animation:fadeIn .3s ease}
.ow-screen.active{display:block}
.ow-timer{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:-2px;text-align:center;color:var(--or);line-height:1;margin:20px 0}
.ow-timer.low{color:var(--rd);animation:pulseRed .5s ease-in-out infinite}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.6}}
.ow-prog{width:100%;height:6px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:28px}
.ow-prog-fill{height:100%;background:var(--or);transition:width 1s linear;border-radius:99px}
.ow-obj{
  background:var(--rd2);border:1px solid var(--rd3);border-radius:14px;
  padding:28px;margin-bottom:18px;font-family:'Syne',sans-serif;
  font-weight:600;font-size:22px;line-height:1.4;font-style:italic;color:var(--rd);
  text-align:center;
}
.ow-opts{display:grid;grid-template-columns:1fr;gap:10px;max-width:700px;margin:0 auto}
.ow-opt{
  padding:16px 20px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  font-size:13px;cursor:pointer;transition:.1s;text-align:left;color:var(--tx2);line-height:1.5;
}
.ow-opt:hover{border-color:var(--bd2);background:var(--s2);color:var(--tx)}
.ow-opt.correct{border-color:var(--gn);background:var(--gn2);color:var(--gn);pointer-events:none}
.ow-opt.wrong{border-color:var(--rd);background:var(--rd2);color:var(--rd);pointer-events:none}
.ow-score{text-align:center;padding:32px;background:var(--s1);border:1px solid var(--bd);border-radius:14px;max-width:500px;margin:40px auto}
.ow-score-num{font-family:'Syne',sans-serif;font-weight:800;font-size:68px;letter-spacing:-2px;line-height:1;color:var(--ac);margin-bottom:6px}
.ow-score-label{font-size:13px;color:var(--mu);margin-bottom:20px}
.ow-score-btn{padding:11px 22px;background:var(--ac);color:#0a0a0a;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none}
.ow-score-btn:hover{background:#d4eb52}

/* Scenario simulator */
.sim-screen{display:none;animation:fadeIn .3s ease}
.sim-screen.active{display:block}
.sim-ctx{padding:18px 22px;background:var(--bl2);border:1px solid var(--bl3);border-radius:12px;margin-bottom:22px;font-size:13px;color:var(--tx2);line-height:1.6}
.sim-ctx strong{color:var(--bl);display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.12em}
.sim-dialog{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:20px;max-height:420px;overflow-y:auto}
.sim-msg{display:flex;gap:12px;margin-bottom:14px;animation:fadeIn .25s ease}
.sim-msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#0a0a0a}
.sim-msg.them .sim-msg-av{background:var(--or)}
.sim-msg.you .sim-msg-av{background:var(--ac)}
.sim-msg-body{background:var(--s2);border:1px solid var(--bd);border-radius:4px 12px 12px 12px;padding:12px 14px;font-size:13px;line-height:1.5;color:var(--tx);max-width:460px}
.sim-msg.you{flex-direction:row-reverse}
.sim-msg.you .sim-msg-body{border-radius:12px 4px 12px 12px;background:var(--ac2);border-color:var(--ac3);color:var(--tx)}
.sim-opts{display:flex;flex-direction:column;gap:8px}
.sim-opt{
  padding:13px 16px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  font-size:13px;cursor:pointer;transition:.15s;text-align:left;color:var(--tx2);line-height:1.5;font-family:'Syne',sans-serif;font-style:italic;font-weight:500;
}
.sim-opt:hover{border-color:var(--ac3);background:var(--ac2);color:var(--tx)}
.sim-result{padding:22px;border-radius:12px;text-align:center;margin-top:20px}
.sim-result.win{background:var(--gn2);border:1px solid var(--gn3)}
.sim-result.lose{background:var(--rd2);border:1px solid var(--rd3)}
.sim-result-t{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;margin-bottom:8px}
.sim-result.win .sim-result-t{color:var(--gn)}
.sim-result.lose .sim-result-t{color:var(--rd)}
.sim-result-s{font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.5}

/* ══ BADGES VIEW ══ */
.trophy-head{text-align:center;margin-bottom:40px;padding:32px 0}
.trophy-big{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:-1.8px;margin-bottom:10px;background:linear-gradient(135deg,var(--gd),#f0db6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trophy-sub{font-size:14px;color:var(--mu)}
.trophy-stats{display:flex;gap:10px;justify-content:center;margin-top:22px;font-family:'DM Mono',monospace;font-size:11px}
.trophy-stats span{padding:6px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:99px;color:var(--tx2)}
.trophy-stats span b{color:var(--gd);font-weight:700}

.badge-section{margin-bottom:40px}
.badge-section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:14px;letter-spacing:-.3px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.bg-item{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:20px 16px;text-align:center;position:relative;transition:.2s;
  cursor:default;
}
.bg-item:hover{transform:translateY(-3px);border-color:var(--bd3)}
.bg-item.locked{opacity:.45}
.bg-item.unlocked{background:linear-gradient(135deg,var(--s1),var(--gd2));border-color:var(--gd3);box-shadow:0 0 22px rgba(232,197,71,.12)}
.bg-visual{width:72px;height:72px;margin:0 auto 14px;position:relative}
.bg-visual svg{width:100%;height:100%;fill:none;stroke-width:1.6}
.bg-item.locked .bg-visual svg{stroke:var(--mu2)}
.bg-item.unlocked .bg-visual svg{stroke:var(--gd);filter:drop-shadow(0 0 8px rgba(232,197,71,.5))}
.bg-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:-.2px;margin-bottom:4px;line-height:1.2}
.bg-desc{font-size:10px;color:var(--mu);line-height:1.4;min-height:28px}
.bg-item.unlocked .bg-name{color:var(--gd)}

/* Toast */
#toasts{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:10px;max-width:420px}
.toast{
  padding:13px 16px;background:var(--s2);border:1px solid var(--bd3);border-radius:10px;
  box-shadow:var(--sh3);font-size:13px;color:var(--tx);display:flex;align-items:center;gap:10px;
  animation:toastIn .3s cubic-bezier(.22,.68,0,1.2);min-width:280px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(100%)}}
.toast.success{border-color:var(--gn3)}
.toast.success svg{stroke:var(--gn)}
.toast.xp{border-color:var(--ac3);background:linear-gradient(135deg,var(--s2),var(--ac2))}
.toast.xp svg{stroke:var(--ac)}
.toast.badge{border-color:var(--gd3);background:linear-gradient(135deg,var(--s2),var(--gd2))}
.toast.badge svg{stroke:var(--gd)}
.toast svg{width:16px;height:16px;fill:none;stroke-width:2;flex-shrink:0}
.toast b{font-family:'Syne',sans-serif;font-weight:700;margin-right:4px}

/* Anim classes */
.anim{opacity:0;animation:up .6s cubic-bezier(.22,.68,0,1.2) forwards}
.anim-d1{animation-delay:.05s}.anim-d2{animation-delay:.1s}.anim-d3{animation-delay:.15s}.anim-d4{animation-delay:.2s}.anim-d5{animation-delay:.25s}.anim-d6{animation-delay:.3s}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Responsive */
@media(max-width:920px){
  .home-grid{grid-template-columns:1fr}
  .feature-grid{grid-template-columns:1fr}
  .journey-nodes{grid-template-columns:repeat(2,1fr)}
  .journey-path{display:none}
  .lh-top{grid-template-columns:1fr}
  .home-hero-title{font-size:32px}
  .mod-title{font-size:28px}
  .rank-card{grid-template-columns:100px 1fr;padding:22px}
  .rank-stats{grid-column:1/-1;flex-direction:row}
  .rank-title{font-size:28px}
  .defis-grid{grid-template-columns:1fr}
  .cmp{grid-template-columns:1fr}
  .stat-viz{grid-template-columns:1fr}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="bg-grad-1"></div>
<div class="bg-grad-2"></div>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
  <a href="/hub" class="tb-back" title="Retour au hub">
    <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
    Hub
  </a>
  <a href="/hub" class="tb-logo">
    <div class="tb-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5"><path d="M12 3v10M6 9l6 6 6-6"/></svg></div>
    <div class="tb-logo-text">NOVAL<span>EM</span></div>
  </a>
  <div class="tb-sep"></div>
  <div class="tb-page">Académie Scout</div>
  <div class="tb-spacer"></div>

  <button class="tb-rank" onclick="showView('badges')" title="Ton rang">
    <div class="tb-rank-sigil" id="tb-rank-sigil"></div>
    <div>
      <div class="tb-rank-name" id="tb-rank-name">Aspirant</div>
      <div class="tb-rank-lvl" id="tb-rank-lvl">0 / 6 modules</div>
    </div>
  </button>

  <div class="tb-xp" title="Expérience accumulée">
    <div class="tb-xp-bar"><div class="tb-xp-fill" id="tb-xp-fill" style="width:0%"></div></div>
    <div class="tb-xp-text"><b id="tb-xp-cur">0</b> / <span id="tb-xp-max">300</span> XP</div>
  </div>

  <div class="tb-streak" title="Jours consécutifs d'activité">
    <svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
    <b id="tb-streak">0</b>j
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <div id="view-home" class="view active"></div>
  <div id="view-level" class="view"></div>
  <div id="view-module" class="view"></div>
  <div id="view-arsenal" class="view"></div>
  <div id="view-codex" class="view"></div>
  <div id="view-defis" class="view"></div>
  <div id="view-badges" class="view"></div>

  if (!u || !u.ts || (Date.now() - u.ts) > 8 * 3600000) {
    sessionStorage.removeItem('novalem_user'); window.location.href = '/';
  } else CURRENT_USER = u;
} catch (e) { window.location.href = '/'; }

  _perfectStreak:0, _dailiesCompleted:0, _earlyBird:false, _nightOwl:false,
};

  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return Object.assign({}, DEFAULT_STATE, JSON.parse(raw)); } catch(e){}
  return { ...DEFAULT_STATE };
})();
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(STATE)); }catch(e){} }

function touchStreak(){
  const today = new Date().toISOString().slice(0,10);
  if (STATE.lastActive === today){ saveState(); return; }
  if (STATE.lastActive){
    const last = new Date(STATE.lastActive+'T00:00:00');
    const now = new Date(today+'T00:00:00');
    const diff = Math.round((now-last)/86400000);
    if (diff === 1) STATE.streak += 1;
    else if (diff > 1) STATE.streak = 1;
  } else STATE.streak = 1;
  STATE.lastActive = today; saveState();
}

function addXP(amount, reason){

function completeModule(modId){
  if (!STATE.completed.includes(modId)){
    const prevRank = getCurrentRank().id;
    STATE.completed.push(modId);
    const lvl = modId.split('-')[0];
    const xp = XP_PER_MODULE[lvl] || 50;
    STATE.xp += xp; saveState();
    showToast({ type:'xp', title:`+${xp} XP`, text:`Module validé` });
    checkBadges();
    const newRank = getCurrentRank();
    if (newRank.id > prevRank){
      setTimeout(()=>{ showToast({ type:'badge', title:'⬆ Nouveau rang', text: newRank.name }); }, 500);
    }
  }
  updateTopbar();
}

function updateTopbar(){
  const cur = getCurrentRank();
  const next = getNextRank();
  document.getElementById('tb-rank-name').textContent = cur.name;
  document.getElementById('tb-rank-sigil').innerHTML = rankSigilSVG(cur.id, 26);
  document.getElementById('tb-rank-lvl').textContent = `${STATE.completed.length}/30 modules`;
  const xpCur = STATE.xp;
  const xpMax = next ? next.xp : cur.xp;
  const xpPrev = cur.xp;
  const xpPct = next ? Math.min(100, Math.round(((xpCur-xpPrev)/(xpMax-xpPrev))*100)) : 100;
  document.getElementById('tb-xp-fill').style.width = xpPct + '%';
  document.getElementById('tb-xp-cur').textContent = xpCur;
  document.getElementById('tb-xp-max').textContent = next ? xpMax : cur.xp;
  document.getElementById('tb-streak').textContent = STATE.streak;
}

  }
}

  };
  t.innerHTML = `<svg viewBox="0 0 24 24">${icons[type]||icons.success}</svg><span><b>${title}</b>${text}</span>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{ t.style.animation='toastOut .3s ease forwards'; setTimeout(()=>t.remove(),300); }, 3200);
}

// ── VIEW NAVIGATION ──
function showView(name, arg){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const v = document.getElementById('view-'+name);
  if (!v) return;
  v.classList.add('active');
  window.scrollTo({ top:0, behavior:'smooth' });
  if (name === 'home')    renderHome();
  if (name === 'level')   renderLevel(arg);
  if (name === 'module')  renderModule(arg);
  if (name === 'arsenal') renderArsenal();
  if (name === 'codex')   renderCodex();
  if (name === 'defis')   renderDefis();
  if (name === 'badges')  renderBadges();
}

function modulesInLevel(lvl){
  return Object.keys(MODULES).filter(k => k.startsWith(lvl+'-')).sort((a,b)=>+a.split('-')[1] - +b.split('-')[1]);
}
function moduleExists(id){ return !!MODULES[id]; }
function levelProgress(lvl){
  const all = [1,2,3,4,5,6];
  const done = all.filter(n=>STATE.completed.includes(`${lvl}-${n}`)).length;
  return { done, total:6, pct: Math.round((done/6)*100) };
}
function isLevelUnlocked(lvl){
  // Niveau I toujours ouvert, niveau II ouvert si niveau I au moins 50% complet, etc.
  const order = ['i','ii','iii','iv','v'];
  const idx = order.indexOf(lvl);
  if (idx <= 0) return true;
  const prev = order[idx-1];
  return levelProgress(prev).done >= 3; // 3/6 du niveau précédent suffit
}

function renderQuiz(quiz, modId){
  if (!quiz || !quiz.length) return '';
  const qHTML = quiz.map((q,i) => `
    <div class="quiz-q">
      <div class="quiz-qnum">Question ${i+1}/${quiz.length}</div>
      <div class="quiz-qtext">${q.q}</div>
      <div class="quiz-opts" id="qopts-${modId}-${i}">
        ${q.opts.map((o,j)=>`<button class="quiz-opt" onclick="handleQuizAnswer('${modId}',${i},${j})"><span class="quiz-opt-key">${String.fromCharCode(65+j)}</span>${o}</button>`).join('')}
      </div>
      <div class="quiz-expl" id="qexpl-${modId}-${i}"><b>Explication : </b>${q.expl||''}</div>
    </div>
  `).join('');
  return `<div class="quiz" id="quiz-${modId}">
    <div class="quiz-head">
      <div class="quiz-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <div><div class="quiz-title">Valide tes acquis</div><div class="quiz-sub">${quiz.length} questions · tu peux rater une fois, pas deux</div></div>
    </div>
    ${qHTML}
    <div class="quiz-result" id="qres-${modId}"></div>
  </div>`;
}

window._quizAnswers = window._quizAnswers || {};

function handleQuizAnswer(modId, qIdx, optIdx){
  const m = MODULES[modId]; if (!m) return;
  const q = m.quiz[qIdx];
  const key = `${modId}-${qIdx}`;
  if (window._quizAnswers[key] !== undefined) return; // déjà répondu
  window._quizAnswers[key] = optIdx;

  const opts = document.querySelectorAll(`#qopts-${modId}-${qIdx} .quiz-opt`);
  opts.forEach((el,j) => {
    el.classList.add('disabled');
    if (j === q.correct) el.classList.add('correct');
    else if (j === optIdx) el.classList.add('wrong');
  });
  const expl = document.getElementById(`qexpl-${modId}-${qIdx}`);
  if (expl) expl.classList.add('show');

  // Check si toutes les questions sont répondues
  const total = m.quiz.length;
  const answered = m.quiz.filter((_,i) => window._quizAnswers[`${modId}-${i}`] !== undefined).length;
  if (answered === total){
    const score = m.quiz.reduce((acc,qq,i) => acc + (window._quizAnswers[`${modId}-${i}`] === qq.correct ? 1 : 0), 0);
    STATE.quizzes[modId] = { score, total, ts: Date.now() };
    if (score === total) STATE._perfectStreak = (STATE._perfectStreak||0) + 1;
    else STATE._perfectStreak = 0;
    saveState();

    const passed = score >= Math.ceil(total * 0.66); // 2/3 mini
    const res = document.getElementById(`qres-${modId}`);
    if (res){
      res.className = `quiz-result show ${passed?'pass':'fail'}`;
      res.innerHTML = `
        <div class="qr-score">${score}/${total}</div>
        <div class="qr-text">${passed ? `Excellent. Tu peux valider le module et empocher les XP.` : `Pas tout à fait. Relis les passages clés et réessaie — tu apprends en te trompant.`}</div>
        ${passed ? `
          <button class="qr-btn" onclick="markModuleDone('${modId}');addXP(25,'Quiz validé')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>Valider le module</button>
        ` : `
          <button class="qr-btn" onclick="resetQuiz('${modId}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Réessayer</button>
        `}
      `;
    }
  }
}

function resetQuiz(modId){
  const m = MODULES[modId]; if (!m) return;
  m.quiz.forEach((_,i) => { delete window._quizAnswers[`${modId}-${i}`]; });
  renderModule(modId);
}

function markModuleDone(modId){
  const m = MODULES[modId]; if (!m) return;
  // Si quiz présent, exiger succès (2/3 mini)
  if (m.quiz && m.quiz.length){
    const qRecord = STATE.quizzes[modId];
    const threshold = Math.ceil(m.quiz.length * 0.66);
    if (!qRecord || qRecord.score < threshold){
      showToast({ type:'badge', title:'Quiz requis', text:'Réussis au moins 2/3 du quiz en bas de page.' });
      document.querySelector(`#quiz-${modId}`)?.scrollIntoView({ behavior:'smooth' });
      return;
    }
  }
  completeModule(modId);
  // Re-render the module view pour montrer l'état validé
  setTimeout(()=>renderModule(modId), 300);
}

function getTodayDrill(){
  const day = Math.floor(Date.now()/86400000);
  return DRILL_POOL[day % DRILL_POOL.length];
}

function renderDailyDrill(drill, answered){
  const done = STATE.dailyDrillDate === new Date().toISOString().slice(0,10);
  if (done){
    return `<div class="drill-q">${drill.q}</div>
      <div class="drill-options">${drill.opts.map((o,i)=>{
        const correct = i === drill.correct;
        const myAnswer = STATE.dailyDrillIdx === i;
        const cls = correct ? 'correct' : (myAnswer ? 'wrong' : '');
        return `<div class="drill-opt ${cls}"><span class="drill-opt-key">${String.fromCharCode(65+i)}</span>${o}</div>`;
      }).join('')}</div>
      <div class="drill-explain show"><b>${STATE.dailyDrillIdx === drill.correct ? '✓ Bonne réponse.' : '✗ Pas cette fois.'}</b> ${drill.expl}</div>`;
  }
  return `<div class="drill-q">${drill.q}</div>
    <div class="drill-options" id="drill-opts">

    </div>
    <div class="drill-explain" id="drill-explain"></div>`;
}

function answerDaily(idx){
  const drill = getTodayDrill();
  STATE.dailyDrillDate = new Date().toISOString().slice(0,10);
  STATE.dailyDrillIdx = idx;
  STATE._dailiesCompleted = (STATE._dailiesCompleted||0) + 1;
  if (idx === drill.correct){
    STATE.xp += 10; saveState();
    showToast({ type:'xp', title:'+10 XP', text:'Quiz du jour validé' });
  } else { saveState(); }
  checkBadges();
  updateTopbar();
  // Re-render drill in place
  document.getElementById('drill-content').innerHTML = renderDailyDrill(drill, true);
}

  </div>`;
}

// ══════════════════════════════════════════════════════════════
// BADGES VIEW — trophy case
// ══════════════════════════════════════════════════════════════
function renderBadges(){
  const cats = ['Progression','Combat','Assiduité','Spécialisation','Légende'];
  const unlocked = BADGES.filter(b => STATE.badges.includes(b.id)).length;
  const sections = cats.map(cat => {
    const items = BADGES.filter(b => b.cat === cat);
    if (!items.length) return '';
    return `<div class="badge-section">
      <div class="badge-section-title">${cat}</div>
      <div class="badge-grid">
        ${items.map(b => {
          const isU = STATE.badges.includes(b.id);
          return `<div class="bg-item ${isU?'unlocked':'locked'}">
            <div class="bg-visual">${b.svg}</div>
            <div class="bg-name">${b.name}</div>
            <div class="bg-desc">${b.desc}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('view-badges').innerHTML = `<div class="wrap">
    <div class="trophy-head">
      <div class="lh-crumb" style="justify-content:center;margin-bottom:18px"><a onclick="showView('home')">Accueil</a><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>Badges</div>
      <div class="trophy-big">Trophées</div>
      <div class="trophy-sub">Ta progression laisse des traces. Elles sont ici.</div>
      <div class="trophy-stats">
        <span><b>${unlocked}</b>/${BADGES.length} débloqués</span>
        <span><b>${Math.round((unlocked/BADGES.length)*100)}%</b> de collection</span>
        <span>Rang · <b>${getCurrentRank().name}</b></span>
      </div>
    </div>
    ${sections}
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
touchStreak();
checkBadges();
updateTopbar();
showView('home');

// Hotkeys globales
document.addEventListener('keydown', e=>{
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'h') showView('home');
  if (e.key === 'b') showView('badges');
  if (e.key === 'Escape') showView('home');
});

</script>
</body>
