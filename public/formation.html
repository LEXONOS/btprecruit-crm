<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Académie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   NOVALEM ACADÉMIE — Learning-platform grade
   ═══════════════════════════════════════════════════════════════ */

:root{
  --bg:#fafbfc;
  --s0:#ffffff;
  --s1:#f5f6f8;
  --s2:#eef0f3;
  --s3:#e2e5ea;

  --bd:rgba(0,0,0,.07);
  --bd2:rgba(0,0,0,.11);
  --bd3:rgba(0,0,0,.16);
  --bd4:rgba(0,0,0,.22);

  --tx:#0f1012;
  --tx2:#3a3d44;
  --mu:#6e727a;
  --mu2:#9aa0a7;
  --mu3:#c3c7cd;

  --pri:#a8c030;
  --pri-dark:#7d9020;
  --pri-ink:#4a5812;
  --pri-bg:#f0f5d8;
  --pri-br:rgba(168,192,48,.40);

  --ok:#16a34a;
  --ok-ink:#0f7a38;
  --ok-bg:#e8f5ee;
  --ok-br:rgba(22,163,74,.35);

  --ko:#dc2626;
  --ko-ink:#b01c1c;
  --ko-bg:#fdeaea;
  --ko-br:rgba(220,38,38,.32);

  --warn:#ea580c;
  --warn-ink:#b44309;
  --warn-bg:#fdece0;
  --warn-br:rgba(234,88,12,.32);

  --info:#2563eb;
  --info-ink:#1b4ec1;
  --info-bg:#e7efff;
  --info-br:rgba(37,99,235,.32);

  --pur:#9333ea;
  --pur-ink:#6b21a8;
  --pur-bg:#f2e8ff;
  --pur-br:rgba(147,51,234,.32);

  --gold:#c89618;
  --gold-ink:#9a7010;
  --gold-bg:#fbf4dd;

  --glass:rgba(255,255,255,.90);
  --sh1:0 1px 2px rgba(18,20,25,.04);
  --sh2:0 4px 14px rgba(18,20,25,.06),0 1px 3px rgba(18,20,25,.04);
  --sh3:0 12px 34px rgba(18,20,25,.10),0 4px 12px rgba(18,20,25,.06);
  --sh-glow-pri:0 0 0 4px var(--pri-br);

  --r-sm:6px;
  --r-md:10px;
  --r-lg:14px;
  --r-xl:18px;
  --r-2xl:24px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Instrument Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
::selection{background:rgba(168,192,48,.35);color:var(--tx)}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;padding:0}
input,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

.hidden{display:none !important}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ── TOPBAR ─────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid var(--bd);
  padding:0 24px;height:56px;
  display:flex;align-items:center;gap:14px;
}
.tb-back{display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:12px;background:var(--s1);border:1px solid var(--bd);color:var(--mu);border-radius:var(--r-md);cursor:pointer;transition:.15s;text-decoration:none;font-weight:500}
.tb-back:hover{border-color:var(--bd2);color:var(--tx);background:var(--s2)}
.tb-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.tb-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx)}
.tb-brand-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--pri),#8fa625);display:flex;align-items:center;justify-content:center}
.tb-brand-icon svg{width:16px;height:16px;stroke:#1a2000;fill:none;stroke-width:2.5}
.tb-brand-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.4px}
.tb-brand-text span{color:var(--pri-ink)}
.tb-sep{width:1px;height:20px;background:var(--bd2)}
.tb-crumb{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.14em;font-weight:500}
.tb-spacer{flex:1}

.tb-lives{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--s1);border:1px solid var(--bd);border-radius:999px;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx2);font-weight:600;transition:.2s}
.tb-lives.low{background:var(--ko-bg);border-color:var(--ko-br);color:var(--ko-ink)}
.tb-lives svg{width:14px;height:14px;fill:var(--pri);stroke:var(--pri-ink);stroke-width:1.5;transition:.2s}
.tb-lives.low svg{fill:var(--ko);stroke:var(--ko-ink)}
.tb-lives b{font-family:'Syne',sans-serif;font-size:13px;font-weight:800}

.tb-xp{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--pri-bg);border:1px solid var(--pri-br);border-radius:999px;font-family:'DM Mono',monospace;font-size:11px;color:var(--pri-ink);font-weight:600}
.tb-xp svg{width:13px;height:13px;fill:var(--pri-ink);stroke:none}
.tb-xp b{font-family:'Syne',sans-serif;font-size:13px;font-weight:800}

.tb-streak{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:999px;font-family:'DM Mono',monospace;font-size:11px;color:var(--warn-ink);font-weight:600}
.tb-streak svg{width:13px;height:13px;fill:var(--warn);stroke:var(--warn-ink);stroke-width:1.5}
.tb-streak b{font-family:'Syne',sans-serif;font-size:13px;font-weight:800}

.tb-progress{flex:1;max-width:420px;display:none;align-items:center;gap:10px;padding:0 6px}
.tb-progress.show{display:flex}
.tb-progress-close{width:28px;height:28px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.tb-progress-close:hover{background:var(--s2);border-color:var(--bd2)}
.tb-progress-close svg{width:12px;height:12px;stroke:var(--mu);fill:none;stroke-width:2.2}
.tb-progress-bar{flex:1;height:10px;background:var(--s2);border-radius:99px;overflow:hidden;border:1px solid var(--bd)}
.tb-progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),#90a825);border-radius:99px;transition:width .45s cubic-bezier(.22,.68,0,1.2);box-shadow:inset 0 -4px 0 rgba(0,0,0,.08)}

/* ── MAIN ─────────────────────────────────────── */
.main{position:relative;min-height:calc(100vh - 56px)}
.view{display:none;animation:viewIn .45s cubic-bezier(.22,.68,0,1.2)}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.wrap{max-width:960px;margin:0 auto;padding:32px 24px 80px}
.wrap-wide{max-width:1120px;margin:0 auto;padding:32px 24px 80px}
.wrap-narrow{max-width:680px;margin:0 auto;padding:32px 24px 80px}

/* ══ HOME VIEW ══ */
.home-hero{margin-bottom:36px}
.home-kicker{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:500}
.home-kicker::before{content:'';width:18px;height:1px;background:var(--mu2)}
.home-hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:-1.8px;line-height:1.05;margin-bottom:14px;color:var(--tx)}
.home-hero h1 .accent{color:var(--pri-ink)}
.home-hero-sub{font-size:15px;color:var(--tx2);line-height:1.65;max-width:560px}

.promise{
  display:grid;grid-template-columns:1fr auto;gap:28px;align-items:center;
  padding:26px 30px;margin-bottom:40px;
  background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-xl);
  box-shadow:var(--sh1);position:relative;overflow:hidden;
}
.promise::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--pri),var(--ok))}
.promise-body{max-width:560px}
.promise-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--pri-ink);margin-bottom:8px;font-weight:700}
.promise-text{font-family:'Syne',sans-serif;font-weight:500;font-size:19px;line-height:1.45;color:var(--tx);letter-spacing:-.3px}
.promise-text em{color:var(--pri-ink);font-style:normal;font-weight:700}
.promise-stat{text-align:right}
.promise-stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;line-height:1;color:var(--pri-ink);letter-spacing:-1.5px}
.promise-stat-lab{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);margin-top:4px;font-weight:600}

.path{position:relative;padding:20px 0 10px}
.path-intro{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.path-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);font-weight:600}
.path-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bd2),transparent)}
.path-nodes{display:flex;flex-direction:column;gap:14px;position:relative}

.chap-card{
  background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-xl);
  padding:0;cursor:pointer;transition:.25s cubic-bezier(.22,.68,0,1.2);
  position:relative;overflow:hidden;box-shadow:var(--sh1);
  display:block;text-decoration:none;color:inherit;
}
.chap-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh2)}
.chap-card.locked{opacity:.6;cursor:not-allowed}
.chap-card.locked:hover{transform:none;box-shadow:var(--sh1);border-color:var(--bd)}
.chap-card-inner{display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;padding:22px 26px}
.chap-num{
  width:58px;height:58px;border-radius:16px;
  background:var(--s1);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:24px;
  letter-spacing:-.5px;color:var(--mu);flex-shrink:0;transition:.2s;
}
.chap-card.completed .chap-num{background:var(--pri-bg);border-color:var(--pri-br);color:var(--pri-ink)}
.chap-card.in-progress .chap-num{background:var(--info-bg);border-color:var(--info-br);color:var(--info-ink)}
.chap-body{min-width:0;padding-right:20px}
.chap-kicker{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.chap-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);font-weight:600}
.chap-pill{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;padding:3px 8px;border-radius:999px;font-weight:700;background:var(--s2);color:var(--mu);border:1px solid var(--bd)}
.chap-pill.new{background:var(--pri-bg);color:var(--pri-ink);border-color:var(--pri-br)}
.chap-pill.done{background:var(--ok-bg);color:var(--ok-ink);border-color:var(--ok-br)}
.chap-pill.locked{background:var(--s2);color:var(--mu)}
.chap-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.4px;color:var(--tx);margin-bottom:6px;line-height:1.15}
.chap-desc{font-size:13px;color:var(--mu);line-height:1.55;max-width:540px}
.chap-meta{display:flex;align-items:center;gap:16px;flex-shrink:0}
.chap-prog{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:100px}
.chap-prog-bar{width:100px;height:6px;background:var(--s2);border-radius:99px;overflow:hidden;border:1px solid var(--bd)}
.chap-prog-fill{height:100%;background:var(--pri);border-radius:99px;transition:width .5s cubic-bezier(.22,.68,0,1.2)}
.chap-prog-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);font-weight:600}
.chap-prog-text b{color:var(--tx);font-weight:700}
.chap-arrow{width:36px;height:36px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.2s}
.chap-card:hover:not(.locked) .chap-arrow{background:var(--tx);border-color:var(--tx)}
.chap-card:hover:not(.locked) .chap-arrow svg{stroke:var(--s0)}
.chap-arrow svg{width:14px;height:14px;stroke:var(--mu);fill:none;stroke-width:2;transition:.2s}
.chap-lock{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center}
.chap-lock svg{width:14px;height:14px;stroke:var(--mu);fill:none;stroke-width:2}

.continue-card{
  background:linear-gradient(135deg,var(--pri-bg) 0%,#fafcec 100%);
  border:1px solid var(--pri-br);border-radius:var(--r-xl);
  padding:28px 32px;margin-bottom:24px;
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
  position:relative;overflow:hidden;box-shadow:var(--sh2);
}
.continue-card::before{content:'';position:absolute;top:0;right:0;width:240px;height:100%;background:radial-gradient(circle at 70% 50%,rgba(168,192,48,.20),transparent 60%);pointer-events:none}
.continue-body{position:relative;z-index:1}
.continue-kicker{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--pri-ink);margin-bottom:6px;font-weight:700;display:flex;align-items:center;gap:7px}
.continue-kicker::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pri);box-shadow:0 0 10px var(--pri-br)}
.continue-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.8px;line-height:1.1;color:var(--tx);margin-bottom:6px}
.continue-sub{font-size:13px;color:var(--tx2);line-height:1.5;max-width:440px}
.continue-meta{display:flex;gap:14px;margin-top:14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);font-weight:500}
.continue-meta-item{display:flex;align-items:center;gap:5px}
.continue-meta-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.continue-btn{position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:var(--tx);color:var(--s0);border-radius:var(--r-md);font-weight:700;font-size:14px;transition:.2s;border:none;cursor:pointer;font-family:inherit;letter-spacing:-.2px;white-space:nowrap}
.continue-btn:hover{background:#000;transform:translateX(2px)}
.continue-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4}

/* ══ CHAPTER VIEW ══ */
.chapter-hero{margin-bottom:36px;padding-top:8px}
.chapter-crumb{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.chapter-crumb a{color:var(--mu);cursor:pointer}
.chapter-crumb a:hover{color:var(--tx)}
.chapter-crumb svg{width:10px;height:10px;stroke:var(--mu2);fill:none;stroke-width:2}
.chapter-numrow{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.chapter-big-num{font-family:'Syne',sans-serif;font-weight:800;font-size:72px;letter-spacing:-3px;line-height:1;color:var(--pri-ink);opacity:.25}
.chapter-title-box{flex:1;min-width:0}
.chapter-title{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;letter-spacing:-1.4px;line-height:1.05;color:var(--tx);margin-bottom:6px}
.chapter-subtitle{font-family:'Syne',sans-serif;font-weight:500;font-size:17px;color:var(--mu);font-style:italic;letter-spacing:-.2px}
.chapter-desc{font-size:14px;color:var(--tx2);line-height:1.65;max-width:620px;margin-bottom:22px}

.chapter-promise{
  padding:18px 22px;margin-bottom:32px;
  background:var(--s0);border:1px solid var(--bd);
  border-left:3px solid var(--pri);border-radius:0 var(--r-md) var(--r-md) 0;
  max-width:620px;
}
.chapter-promise-lab{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--pri-ink);margin-bottom:6px;font-weight:700}
.chapter-promise-txt{font-size:14px;color:var(--tx);line-height:1.55}

.modules-section{margin-bottom:32px}
.modules-section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
.modules-section-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);font-weight:600}
.modules-section-stats{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu)}

.mod-item{
  display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;
  padding:18px 22px;background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-lg);
  cursor:pointer;transition:.2s cubic-bezier(.22,.68,0,1.2);text-decoration:none;color:inherit;
  margin-bottom:10px;box-shadow:var(--sh1);position:relative;overflow:hidden;
}
.mod-item:hover:not(.locked){border-color:var(--bd2);transform:translateX(4px);box-shadow:var(--sh2)}
.mod-item.completed{background:linear-gradient(90deg,var(--ok-bg),var(--s0) 40%)}
.mod-item.locked{opacity:.5;cursor:not-allowed}
.mod-num{
  width:48px;height:48px;border-radius:14px;
  background:var(--s1);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:17px;
  color:var(--mu);flex-shrink:0;transition:.2s;position:relative;
}
.mod-item.completed .mod-num{background:var(--ok-bg);border-color:var(--ok-br);color:var(--ok-ink)}
.mod-item.completed .mod-num svg{width:22px;height:22px;stroke:var(--ok-ink);fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.mod-item.in-progress .mod-num{background:var(--info-bg);border-color:var(--info-br);color:var(--info-ink)}
.mod-body{min-width:0}
.mod-tags{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.mod-tag{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;padding:2px 8px;border-radius:999px;background:var(--s2);color:var(--mu);border:1px solid var(--bd);font-weight:600}
.mod-tag.type{background:var(--info-bg);color:var(--info-ink);border-color:var(--info-br)}
.mod-tag.boss{background:var(--warn-bg);color:var(--warn-ink);border-color:var(--warn-br)}
.mod-title-text{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.3px;color:var(--tx);margin-bottom:4px;line-height:1.25}
.mod-lead{font-size:13px;color:var(--mu);line-height:1.5;max-width:560px}
.mod-meta{display:flex;align-items:center;gap:14px;flex-shrink:0}
.mod-dur{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:5px;font-weight:500}
.mod-dur svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.mod-xp{font-family:'DM Mono',monospace;font-size:11px;color:var(--pri-ink);display:flex;align-items:center;gap:4px;font-weight:700}
.mod-xp svg{width:12px;height:12px;fill:var(--pri-ink)}
.mod-go{width:32px;height:32px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.2s}
.mod-item:hover:not(.locked) .mod-go{background:var(--tx);border-color:var(--tx)}
.mod-item:hover:not(.locked) .mod-go svg{stroke:var(--s0);transform:translateX(1px)}
.mod-go svg{width:13px;height:13px;stroke:var(--mu);fill:none;stroke-width:2.2;transition:.15s}

/* ══ MODULE RUNNER ══ */
.module-runner{max-width:720px;margin:0 auto;padding:24px 20px 120px;min-height:calc(100vh - 56px);display:flex;flex-direction:column}

.lesson{
  background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-xl);
  padding:36px 40px;margin-bottom:24px;box-shadow:var(--sh1);
  animation:slideIn .4s cubic-bezier(.22,.68,0,1.2);
}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.lesson-kicker{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.lesson-kicker::before{content:'';width:20px;height:1px;background:var(--mu2)}
.lesson h2{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;letter-spacing:-.9px;line-height:1.15;color:var(--tx);margin-bottom:14px}
.lesson-body{font-size:15px;line-height:1.7;color:var(--tx2)}
.lesson-body p{margin-bottom:14px}
.lesson-body p:last-child{margin-bottom:0}
.lesson-body strong{color:var(--tx);font-weight:600}
.lesson-body em{color:var(--pri-ink);font-style:normal;font-weight:600}
.lesson-highlight{
  margin:20px 0;padding:16px 20px;background:var(--pri-bg);border:1px solid var(--pri-br);
  border-radius:var(--r-md);font-size:14px;line-height:1.6;color:var(--pri-ink);
  display:flex;gap:12px;align-items:flex-start;
}
.lesson-highlight svg{width:18px;height:18px;stroke:var(--pri-ink);fill:none;stroke-width:2;flex-shrink:0;margin-top:2px}
.lesson-highlight b{display:block;color:var(--pri-ink);font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;font-weight:700}

.lesson-cta{margin-top:28px;display:flex;justify-content:flex-end}
.btn-primary{
  padding:13px 28px;background:var(--tx);color:var(--s0);border-radius:var(--r-md);
  font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;border:none;
  transition:.15s;display:inline-flex;align-items:center;gap:10px;letter-spacing:-.2px;
}
.btn-primary:hover{background:#000;transform:translateY(-1px);box-shadow:var(--sh2)}
.btn-primary:active{transform:translateY(0)}
.btn-primary svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4}
.btn-primary.pri{background:var(--pri);color:#1a2000}
.btn-primary.pri:hover{background:var(--pri-dark)}

.btn-secondary{
  padding:12px 22px;background:var(--s1);color:var(--tx2);border-radius:var(--r-md);
  font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;
  transition:.15s;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bd);
}
.btn-secondary:hover{background:var(--s2);color:var(--tx);border-color:var(--bd2)}
.btn-secondary svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

.ex-card{
  background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-xl);
  padding:32px 36px;margin-bottom:20px;box-shadow:var(--sh1);
  animation:slideIn .4s cubic-bezier(.22,.68,0,1.2);
}
.ex-kicker{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.ex-type-badge{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--info-ink);background:var(--info-bg);border:1px solid var(--info-br);padding:4px 10px;border-radius:999px;font-weight:700}
.ex-retry-badge{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--warn-ink);background:var(--warn-bg);border:1px solid var(--warn-br);padding:4px 10px;border-radius:999px;font-weight:700;display:flex;align-items:center;gap:5px}
.ex-retry-badge svg{width:10px;height:10px;stroke:var(--warn-ink);fill:none;stroke-width:2}
.ex-prompt{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;line-height:1.35;color:var(--tx);letter-spacing:-.5px;margin-bottom:22px}
.ex-prompt-sub{font-size:13px;color:var(--mu);margin-top:-14px;margin-bottom:22px;line-height:1.5}

.ex-options{display:flex;flex-direction:column;gap:10px}
.ex-opt{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;background:var(--s0);border:1.5px solid var(--bd2);border-radius:var(--r-md);
  font-size:14px;line-height:1.5;cursor:pointer;transition:.15s;
  text-align:left;color:var(--tx);font-family:inherit;
}
.ex-opt:hover:not(.disabled){border-color:var(--bd3);background:var(--s1);transform:translateX(2px)}
.ex-opt.selected{border-color:var(--pri);background:var(--pri-bg)}
.ex-opt.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-ink)}
.ex-opt.wrong{border-color:var(--ko);background:var(--ko-bg);color:var(--ko-ink)}
.ex-opt.disabled{cursor:default;pointer-events:none}
.ex-opt.correct.disabled{animation:pulseOk .6s ease}
.ex-opt.wrong.disabled{animation:shake .35s}
@keyframes pulseOk{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.ex-opt-key{
  width:30px;height:30px;border-radius:8px;background:var(--s2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--mu);
  border:1px solid var(--bd);transition:.15s;
}
.ex-opt.selected .ex-opt-key{background:var(--pri);color:#1a2000;border-color:var(--pri-dark)}
.ex-opt.correct .ex-opt-key{background:var(--ok);color:#fff;border-color:var(--ok-ink)}
.ex-opt.wrong .ex-opt-key{background:var(--ko);color:#fff;border-color:var(--ko-ink)}
.ex-opt-text{flex:1}
.ex-opt-check{opacity:0;transition:.15s;flex-shrink:0}
.ex-opt.correct .ex-opt-check,.ex-opt.wrong .ex-opt-check{opacity:1}
.ex-opt-check svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.ex-tf{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.ex-tf-btn{
  padding:28px 20px;background:var(--s0);border:1.5px solid var(--bd2);border-radius:var(--r-lg);
  font-family:'Syne',sans-serif;font-weight:700;font-size:20px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:10px;color:var(--tx);
}
.ex-tf-btn:hover:not(.disabled){border-color:var(--bd3);background:var(--s1);transform:translateY(-2px);box-shadow:var(--sh2)}
.ex-tf-btn.selected{border-color:var(--pri);background:var(--pri-bg)}
.ex-tf-btn.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-ink);animation:pulseOk .6s ease}
.ex-tf-btn.wrong{border-color:var(--ko);background:var(--ko-bg);color:var(--ko-ink);animation:shake .35s}
.ex-tf-btn.disabled{pointer-events:none}
.ex-tf-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.4}

.ex-order-list{display:flex;flex-direction:column;gap:8px}
.ex-order-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--s0);border:1.5px solid var(--bd2);
  border-radius:var(--r-md);cursor:pointer;transition:.15s;
}
.ex-order-item:hover{border-color:var(--bd3);background:var(--s1)}
.ex-order-num{
  width:28px;height:28px;border-radius:8px;background:var(--s2);color:var(--mu);
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;flex-shrink:0;
  border:1px solid var(--bd);
}
.ex-order-item.placed .ex-order-num{background:var(--pri);color:#1a2000;border-color:var(--pri-dark)}
.ex-order-text{flex:1;font-size:14px;color:var(--tx)}
.ex-order-btns{display:flex;gap:4px;flex-shrink:0}
.ex-order-btn{width:28px;height:28px;border-radius:6px;background:var(--s1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:.1s;cursor:pointer}
.ex-order-btn:hover{background:var(--s2);border-color:var(--bd2)}
.ex-order-btn svg{width:12px;height:12px;stroke:var(--tx2);fill:none;stroke-width:2.4}
.ex-order-btn:disabled{opacity:.3;cursor:not-allowed}

.ex-classify{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ex-cat{background:var(--s1);border:2px dashed var(--bd2);border-radius:var(--r-lg);padding:16px;min-height:120px;transition:.15s}
.ex-cat-title{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:10px;font-weight:700;text-align:center}
.ex-cat.a{background:var(--info-bg);border-color:var(--info-br)}.ex-cat.a .ex-cat-title{color:var(--info-ink)}
.ex-cat.b{background:var(--pur-bg);border-color:var(--pur-br)}.ex-cat.b .ex-cat-title{color:var(--pur-ink)}
.ex-cat.c{background:var(--warn-bg);border-color:var(--warn-br)}.ex-cat.c .ex-cat-title{color:var(--warn-ink)}
.ex-cat-items{display:flex;flex-direction:column;gap:6px}
.ex-cat-drop{padding:10px 12px;background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--tx);animation:slideIn .25s ease}
.ex-cat-drop.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-ink)}
.ex-cat-drop.wrong{border-color:var(--ko);background:var(--ko-bg);color:var(--ko-ink)}
.ex-classify-pool{display:flex;flex-wrap:wrap;gap:8px;padding:16px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-md);min-height:60px}
.ex-classify-chip{padding:10px 14px;background:var(--s0);border:1.5px solid var(--bd2);border-radius:var(--r-md);font-size:13px;color:var(--tx);cursor:pointer;transition:.15s;font-family:inherit}
.ex-classify-chip:hover{border-color:var(--bd3);background:var(--s2);transform:translateY(-1px)}

.ex-match{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ex-match-col{display:flex;flex-direction:column;gap:8px}
.ex-match-item{
  padding:14px 16px;background:var(--s0);border:1.5px solid var(--bd2);border-radius:var(--r-md);
  font-size:13px;cursor:pointer;transition:.15s;color:var(--tx);
}
.ex-match-item:hover:not(.matched){border-color:var(--bd3);background:var(--s1)}
.ex-match-item.selected{border-color:var(--pri);background:var(--pri-bg)}
.ex-match-item.matched{cursor:default}
.ex-match-item.matched-ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-ink)}
.ex-match-item.matched-ko{border-color:var(--ko);background:var(--ko-bg);color:var(--ko-ink);animation:shake .35s}

.ex-fill-text{font-family:'Syne',sans-serif;font-weight:500;font-size:20px;line-height:1.7;color:var(--tx);margin-bottom:24px;letter-spacing:-.3px}
.ex-fill-blank{display:inline-block;min-width:100px;padding:2px 12px;background:var(--pri-bg);border:2px dashed var(--pri-br);border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:16px;color:var(--pri-ink);font-weight:700;text-align:center;margin:0 4px}
.ex-fill-blank.filled{background:var(--pri);color:#1a2000;border-style:solid;border-color:var(--pri-dark)}
.ex-fill-blank.correct{background:var(--ok-bg);color:var(--ok-ink);border-color:var(--ok-br);border-style:solid}
.ex-fill-blank.wrong{background:var(--ko-bg);color:var(--ko-ink);border-color:var(--ko-br);border-style:solid}
.ex-fill-choices{display:flex;flex-wrap:wrap;gap:8px}
.ex-fill-choice{padding:10px 18px;background:var(--s0);border:1.5px solid var(--bd2);border-radius:var(--r-md);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;color:var(--tx);font-family:inherit}
.ex-fill-choice:hover:not(.used){border-color:var(--bd3);background:var(--s1);transform:translateY(-1px)}
.ex-fill-choice.used{opacity:.35;cursor:default}

.ex-scenario-ctx{
  padding:18px 22px;margin-bottom:22px;
  background:var(--info-bg);border:1px solid var(--info-br);border-left:3px solid var(--info);
  border-radius:0 var(--r-md) var(--r-md) 0;font-size:14px;line-height:1.6;color:var(--info-ink);
}
.ex-scenario-ctx b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--info-ink);margin-bottom:6px;font-weight:700}

.ex-explain{
  margin-top:20px;padding:18px 20px;border-radius:var(--r-md);
  display:none;animation:slideIn .35s ease;
}
.ex-explain.ok{background:var(--ok-bg);border:1px solid var(--ok-br)}
.ex-explain.ko{background:var(--ko-bg);border:1px solid var(--ko-br)}
.ex-explain.show{display:block}
.ex-explain-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ex-explain-head svg{width:22px;height:22px;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.ex-explain.ok .ex-explain-head svg{stroke:var(--ok-ink)}
.ex-explain.ko .ex-explain-head svg{stroke:var(--ko-ink)}
.ex-explain-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.2px}
.ex-explain.ok .ex-explain-title{color:var(--ok-ink)}
.ex-explain.ko .ex-explain-title{color:var(--ko-ink)}
.ex-explain-body{font-size:13px;line-height:1.6;color:var(--tx2)}
.ex-explain-body strong{color:var(--tx)}
.ex-explain-bonus{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd2);font-size:12px;color:var(--mu);line-height:1.5;font-style:italic}
.ex-explain-bonus b{color:var(--tx);font-style:normal;font-weight:600;margin-right:6px}

.ex-bar{
  position:sticky;bottom:0;z-index:50;
  background:linear-gradient(180deg,transparent 0%,var(--bg) 40%);
  padding:20px 0 8px;margin-top:20px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.ex-bar-left{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);font-weight:500}
.ex-bar-right{display:flex;gap:10px}

/* ══════════════════════════════════════════════════════════════
   EXERCICES "JEU" — types ajoutés par engine-extensions.js
   ──────────────────────────────────────────────────────────────
   Les classes commencent toutes par .ex-det- / .ex-dlg- / .ex-aln-
   / .ex-bsn- pour rester isolées et faciles à retrouver.
   ══════════════════════════════════════════════════════════════ */

/* ── DÉTECTIVE — inspection de CV/document avec hotspots cliquables ── */
.ex-det{margin:8px 0 4px}
.ex-det-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;margin-bottom:12px;
  background:var(--info-bg);border:1px solid var(--info-br);border-radius:var(--r-md);
  font-family:'DM Mono',monospace;font-size:11px;color:var(--info-ink);font-weight:600;
}
.ex-det-header-left{display:flex;align-items:center;gap:10px}
.ex-det-header-left svg{width:14px;height:14px;stroke:var(--info-ink);fill:none;stroke-width:2.2}
.ex-det-timer{font-variant-numeric:tabular-nums;background:#fff;padding:3px 9px;border-radius:var(--r-sm);border:1px solid var(--info-br)}
.ex-det-timer.urgent{color:var(--ko-ink);border-color:var(--ko-br);background:var(--ko-bg);animation:pulseOk .6s infinite}
.ex-det-counter{font-variant-numeric:tabular-nums}
.ex-det-doc{
  background:#fff;border:1px solid var(--bd2);border-radius:var(--r-lg);
  padding:22px 26px;font-family:'Instrument Sans',sans-serif;font-size:13.5px;line-height:1.7;color:var(--tx);
  box-shadow:var(--sh2);
}
.ex-det-doc-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;margin-bottom:4px;color:var(--tx)}
.ex-det-doc-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);margin-bottom:18px}
.ex-det-line{
  display:block;padding:6px 10px;margin:2px -10px;border-radius:var(--r-sm);
  cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;
}
.ex-det-line:hover{background:var(--s1)}
.ex-det-line.flagged{background:var(--warn-bg);box-shadow:inset 3px 0 0 var(--warn)}
.ex-det-line.flagged::after{content:"●";position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--warn);font-size:14px}
.ex-det-line.revealed-hit{background:var(--ok-bg);box-shadow:inset 3px 0 0 var(--ok);color:var(--ok-ink);pointer-events:none}
.ex-det-line.revealed-miss{background:var(--ko-bg);box-shadow:inset 3px 0 0 var(--ko);color:var(--ko-ink);pointer-events:none}
.ex-det-line.revealed-missed{background:var(--info-bg);box-shadow:inset 3px 0 0 var(--info);color:var(--info-ink);pointer-events:none;font-style:italic}
.ex-det-line-why{display:none;font-family:'DM Mono',monospace;font-size:11px;color:inherit;opacity:.8;padding-top:4px;font-style:normal}
.ex-det-line.revealed-hit .ex-det-line-why,
.ex-det-line.revealed-missed .ex-det-line-why{display:block}

/* ── DIALOGUE (NÉGO LIVE) — conversation branching tour par tour ── */
.ex-dlg{margin:8px 0 4px}
.ex-dlg-thread{
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-lg);
  padding:18px 22px;box-shadow:var(--sh2);
}
.ex-dlg-bubble{
  display:flex;gap:12px;margin-bottom:14px;animation:slideIn .35s cubic-bezier(.22,.68,0,1.2);
}
.ex-dlg-bubble-avatar{
  flex:0 0 38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:700;
  background:var(--s2);color:var(--tx2);border:1px solid var(--bd2);
}
.ex-dlg-bubble.speaker-client .ex-dlg-bubble-avatar{background:var(--info-bg);border-color:var(--info-br);color:var(--info-ink)}
.ex-dlg-bubble.speaker-candidate .ex-dlg-bubble-avatar{background:var(--pur-bg);border-color:var(--pur-br);color:var(--pur-ink)}
.ex-dlg-bubble.speaker-self .ex-dlg-bubble-avatar{background:var(--pri-bg);border-color:var(--pri-br);color:var(--pri-ink)}
.ex-dlg-bubble-body{flex:1;min-width:0}
.ex-dlg-bubble-speaker{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:3px;font-weight:600}
.ex-dlg-bubble-text{font-size:14px;line-height:1.55;color:var(--tx)}
.ex-dlg-options{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.ex-dlg-option{
  text-align:left;padding:12px 16px;border:1px solid var(--bd2);
  background:var(--s0);border-radius:var(--r-md);cursor:pointer;
  font-size:13.5px;line-height:1.5;color:var(--tx);
  transition:all .15s;display:flex;align-items:flex-start;gap:10px;
}
.ex-dlg-option:hover:not(.disabled){border-color:var(--pri);background:var(--pri-bg);transform:translateX(3px)}
.ex-dlg-option-key{
  flex:0 0 22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:var(--s2);color:var(--mu);font-family:'DM Mono',monospace;font-size:10px;font-weight:700;
}
.ex-dlg-option:hover:not(.disabled) .ex-dlg-option-key{background:var(--pri);color:#fff}
.ex-dlg-option.picked{border-color:var(--info);background:var(--info-bg);color:var(--info-ink)}
.ex-dlg-option.picked .ex-dlg-option-key{background:var(--info);color:#fff}
.ex-dlg-option.disabled{opacity:.4;pointer-events:none}
.ex-dlg-feedback{
  margin-top:10px;padding:10px 14px;border-radius:var(--r-md);
  font-size:13px;line-height:1.55;font-style:italic;
}
.ex-dlg-feedback.positive{background:var(--ok-bg);color:var(--ok-ink);border-left:3px solid var(--ok)}
.ex-dlg-feedback.negative{background:var(--ko-bg);color:var(--ko-ink);border-left:3px solid var(--ko)}
.ex-dlg-feedback.neutral{background:var(--s1);color:var(--tx2);border-left:3px solid var(--bd3)}
.ex-dlg-progress{display:flex;gap:4px;margin-bottom:14px;justify-content:center}
.ex-dlg-progress-dot{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:background .2s}
.ex-dlg-progress-dot.done{background:var(--pri)}
.ex-dlg-progress-dot.current{background:var(--info);box-shadow:0 0 0 4px var(--info-br)}

/* ── ALIGNER — curseurs d'alignement des planètes ── */
.ex-aln{margin:8px 0 4px}
.ex-aln-scenario{
  padding:14px 18px;margin-bottom:18px;
  background:var(--info-bg);border:1px solid var(--info-br);border-radius:var(--r-md);
  font-size:13.5px;line-height:1.55;color:var(--info-ink);
}
.ex-aln-scenario b{display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}
.ex-aln-score{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;margin-bottom:16px;
  background:linear-gradient(135deg,var(--s0) 0%,var(--s1) 100%);
  border:1px solid var(--bd2);border-radius:var(--r-lg);box-shadow:var(--sh2);
}
.ex-aln-score-label{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--mu);font-weight:600}
.ex-aln-score-val{
  font-family:'Syne',sans-serif;font-weight:800;font-size:46px;letter-spacing:-2px;line-height:1;
  transition:color .3s;
}
.ex-aln-score-val.low{color:var(--ko)}
.ex-aln-score-val.mid{color:var(--warn)}
.ex-aln-score-val.high{color:var(--ok)}
.ex-aln-score-bar{
  flex:1;max-width:200px;height:8px;background:var(--s2);border-radius:99px;overflow:hidden;
  margin:0 18px;position:relative;
}
.ex-aln-score-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--ko) 0%,var(--warn) 50%,var(--ok) 100%);
  transition:width .35s cubic-bezier(.22,.68,0,1.2);
}
.ex-aln-score-threshold{position:absolute;top:-3px;width:2px;height:14px;background:var(--tx);opacity:.4}
.ex-aln-dim{
  padding:14px 16px;margin-bottom:10px;
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-md);
}
.ex-aln-dim-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
}
.ex-aln-dim-label{font-size:13px;font-weight:600;color:var(--tx)}
.ex-aln-dim-val{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:600;
  padding:2px 8px;border-radius:var(--r-sm);background:var(--s2);color:var(--tx2);
  transition:all .2s;
}
.ex-aln-dim-val.aligned{background:var(--ok-bg);color:var(--ok-ink)}
.ex-aln-dim-val.off{background:var(--ko-bg);color:var(--ko-ink)}
.ex-aln-dim-slider{
  position:relative;height:32px;cursor:pointer;
}
.ex-aln-dim-slider input{
  -webkit-appearance:none;appearance:none;
  position:absolute;inset:0;width:100%;height:100%;
  background:transparent;cursor:pointer;
}
.ex-aln-dim-slider input::-webkit-slider-runnable-track{
  height:6px;background:var(--s2);border-radius:99px;border:1px solid var(--bd);
  margin-top:13px;
}
.ex-aln-dim-slider input::-moz-range-track{
  height:6px;background:var(--s2);border-radius:99px;border:1px solid var(--bd);
}
.ex-aln-dim-slider input::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;background:var(--pri);border-radius:50%;
  border:3px solid #fff;box-shadow:var(--sh2);margin-top:-9px;cursor:grab;
}
.ex-aln-dim-slider input::-moz-range-thumb{
  width:18px;height:18px;background:var(--pri);border-radius:50%;
  border:3px solid #fff;box-shadow:var(--sh2);cursor:grab;
}
.ex-aln-dim-ideal{
  position:absolute;top:9px;width:14px;height:14px;border-radius:50%;
  background:transparent;border:2px dashed var(--ok);pointer-events:none;
  transform:translateX(-50%);
}
.ex-aln-dim-hint{font-size:11px;color:var(--mu);margin-top:6px;font-style:italic;display:flex;justify-content:space-between}

/* ── BISON — quiz chronométré rapide ── */
.ex-bsn-intro{
  text-align:center;padding:36px 22px 30px;
  background:linear-gradient(135deg,var(--s0) 0%,var(--pri-bg) 200%);
  border:1px solid var(--bd2);border-radius:var(--r-xl);
  box-shadow:var(--sh2);margin-bottom:18px;
}
.ex-bsn-intro-icon{
  width:64px;height:64px;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
  background:var(--pri-bg);border-radius:50%;border:2px solid var(--pri-br);
  font-size:30px;
}
.ex-bsn-intro-title{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;letter-spacing:-1px;margin-bottom:8px;color:var(--tx)}
.ex-bsn-intro-sub{font-size:14px;color:var(--mu);line-height:1.55;max-width:380px;margin:0 auto 22px}
.ex-bsn-intro-rules{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:520px;margin:0 auto 22px;
  text-align:left;
}
.ex-bsn-intro-rule{
  padding:11px 14px;background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-md);
}
.ex-bsn-intro-rule-lab{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:3px;font-weight:600}
.ex-bsn-intro-rule-val{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--tx)}
.ex-bsn-game{margin:8px 0 4px}
.ex-bsn-header{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:11px 16px;margin-bottom:14px;
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-md);
}
.ex-bsn-pos{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--tx2)}
.ex-bsn-pos b{color:var(--tx)}
.ex-bsn-timer-wrap{flex:1;max-width:320px;display:flex;align-items:center;gap:10px}
.ex-bsn-timer-bar{flex:1;height:6px;background:var(--s2);border-radius:99px;overflow:hidden}
.ex-bsn-timer-fill{
  height:100%;background:linear-gradient(90deg,var(--ok),var(--warn),var(--ko));
  transform-origin:right;transition:none;
}
.ex-bsn-timer-text{font-family:'DM Mono',monospace;font-size:12px;font-variant-numeric:tabular-nums;font-weight:700;color:var(--tx)}
.ex-bsn-timer-text.urgent{color:var(--ko)}
.ex-bsn-score{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu)}
.ex-bsn-score b{color:var(--pri-ink);font-size:14px}
.ex-bsn-q{
  padding:24px 22px 16px;margin-bottom:12px;
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-lg);
  box-shadow:var(--sh2);
  animation:slideIn .25s cubic-bezier(.22,.68,0,1.2);
}
.ex-bsn-q-text{font-family:'Syne',sans-serif;font-weight:600;font-size:19px;line-height:1.35;color:var(--tx);letter-spacing:-.4px;margin-bottom:18px}
.ex-bsn-q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ex-bsn-q-opts.single{grid-template-columns:1fr 1fr}
.ex-bsn-q-opts.tf{grid-template-columns:1fr 1fr}
.ex-bsn-q-opt{
  padding:14px 16px;border:1px solid var(--bd2);background:var(--s0);
  border-radius:var(--r-md);cursor:pointer;font-size:13.5px;line-height:1.4;color:var(--tx);text-align:left;
  transition:all .12s;
}
.ex-bsn-q-opt:hover:not(.disabled){border-color:var(--pri);background:var(--pri-bg)}
.ex-bsn-q-opt.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-ink);animation:pulseOk .35s}
.ex-bsn-q-opt.wrong{border-color:var(--ko);background:var(--ko-bg);color:var(--ko-ink);animation:shake .25s}
.ex-bsn-q-opt.disabled{pointer-events:none;opacity:.6}
.ex-bsn-end{
  text-align:center;padding:40px 22px 30px;
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-xl);box-shadow:var(--sh2);
}
.ex-bsn-end-rank{
  font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-2px;line-height:1;
  margin-bottom:8px;
}
.ex-bsn-end-rank.gold{color:var(--gold-ink)}
.ex-bsn-end-rank.silver{color:#6b7280}
.ex-bsn-end-rank.bronze{color:#9a5b1f}
.ex-bsn-end-rank.iron{color:var(--mu)}
.ex-bsn-end-stats{display:flex;gap:24px;justify-content:center;margin:18px 0}
.ex-bsn-end-stat{text-align:center}
.ex-bsn-end-stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-1px;color:var(--tx)}
.ex-bsn-end-stat-lab{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);font-weight:600;margin-top:3px}

/* ══ SPÉCIALISATIONS — section bonus de la home ══ */
.spec-section{margin-top:48px;padding-top:32px;border-top:1px solid var(--bd2)}
.spec-section-head{margin-bottom:20px;max-width:620px}
.spec-section-kicker{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold-ink);font-weight:700;margin-bottom:8px}
.spec-section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.8px;line-height:1.1;color:var(--tx);margin-bottom:10px}
.spec-section-desc{font-size:14px;color:var(--tx2);line-height:1.6}
.spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.spec-card{
  display:flex;align-items:flex-start;gap:14px;padding:18px 20px;
  background:linear-gradient(135deg,var(--s0) 0%,var(--gold-bg) 220%);
  border:1px solid var(--bd2);border-radius:var(--r-lg);
  cursor:pointer;transition:all .18s cubic-bezier(.22,.68,0,1.2);
  opacity:0;transform:translateY(8px);
}
.spec-card.visible{opacity:1;transform:translateY(0)}
.spec-card:not(.locked):hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--sh3)}
.spec-card.locked{opacity:.55;cursor:not-allowed;background:var(--s1)}
.spec-card.completed{border-color:var(--ok-br);background:linear-gradient(135deg,var(--s0) 0%,var(--ok-bg) 250%)}
.spec-icon{
  flex:0 0 44px;height:44px;border-radius:var(--r-md);
  background:var(--gold-bg);border:1px solid rgba(200,150,24,.3);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.spec-body{flex:1;min-width:0}
.spec-kicker{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.spec-tag{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold-ink);font-weight:700}
.spec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.4px;line-height:1.2;color:var(--tx);margin-bottom:4px}
.spec-desc{font-size:12.5px;color:var(--tx2);line-height:1.5;margin-bottom:8px}
.spec-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu)}
.spec-meta b{color:var(--tx);font-size:12px}
.spec-arrow{flex:0 0 auto;color:var(--mu)}
.spec-arrow svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ CHAPITRE VIDE (À VENIR) ══ */
.chap-pill.soon{background:var(--info-bg);color:var(--info-ink);border:1px solid var(--info-br)}
.chap-soon{
  text-align:center;padding:60px 24px;
  background:var(--s0);border:1px dashed var(--bd3);border-radius:var(--r-xl);
}
.chap-soon-icon{
  width:54px;height:54px;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
  background:var(--info-bg);border-radius:50%;
}
.chap-soon-icon svg{width:26px;height:26px;stroke:var(--info-ink);fill:none;stroke-width:2}
.chap-soon-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.6px;color:var(--tx);margin-bottom:10px}
.chap-soon-text{font-size:14px;color:var(--tx2);line-height:1.6;max-width:480px;margin:0 auto 22px}

/* ══ CLIFFHANGER ══ */
.cliff{max-width:680px;margin:0 auto;padding:64px 24px 48px;text-align:center;animation:slideIn .5s cubic-bezier(.22,.68,0,1.2)}
.cliff-badge{
  display:inline-flex;align-items:center;gap:8px;padding:7px 16px;
  background:var(--ok-bg);border:1px solid var(--ok-br);border-radius:999px;
  font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.14em;
  color:var(--ok-ink);font-weight:700;margin-bottom:24px;
}
.cliff-badge svg{width:13px;height:13px;stroke:var(--ok-ink);fill:none;stroke-width:2.4}
.cliff-title{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:-1.4px;line-height:1.1;color:var(--tx);margin-bottom:14px}
.cliff-sub{font-size:15px;color:var(--tx2);line-height:1.6;max-width:500px;margin:0 auto 32px}

.cliff-rewards{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;margin:0 auto 40px;
}
.cliff-reward{padding:18px 14px;background:var(--s0);border:1px solid var(--bd);border-radius:var(--r-md);box-shadow:var(--sh1)}
.cliff-reward-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.cliff-reward.xp .cliff-reward-icon{background:var(--pri-bg);border:1px solid var(--pri-br)}
.cliff-reward.xp .cliff-reward-icon svg{fill:var(--pri-ink)}
.cliff-reward.acc .cliff-reward-icon{background:var(--info-bg);border:1px solid var(--info-br)}
.cliff-reward.acc .cliff-reward-icon svg{stroke:var(--info-ink);fill:none}
.cliff-reward.streak .cliff-reward-icon{background:var(--warn-bg);border:1px solid var(--warn-br)}
.cliff-reward.streak .cliff-reward-icon svg{fill:var(--warn);stroke:var(--warn-ink)}
.cliff-reward-icon svg{width:16px;height:16px;stroke-width:1.8}
.cliff-reward-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.6px;color:var(--tx);line-height:1}
.cliff-reward-lab{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-top:4px;font-weight:600}

.cliff-next{
  max-width:520px;margin:0 auto 28px;
  padding:24px 28px;background:linear-gradient(135deg,var(--tx) 0%,#1e2024 100%);
  border-radius:var(--r-lg);color:var(--s0);text-align:left;
  position:relative;overflow:hidden;
}
.cliff-next::before{content:'';position:absolute;top:0;right:0;width:180px;height:100%;background:radial-gradient(circle at 70% 50%,rgba(168,192,48,.25),transparent 60%);pointer-events:none}
.cliff-next-lab{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--pri);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px}
.cliff-next-lab::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--pri);box-shadow:0 0 10px var(--pri)}
.cliff-next-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.4px;line-height:1.2;margin-bottom:10px}
.cliff-next-hook{font-size:13px;line-height:1.6;color:rgba(255,255,255,.75);font-style:italic;max-width:420px;position:relative;z-index:1}
.cliff-next-hook::before{content:'\201C ';color:var(--pri);font-family:'Syne',sans-serif;font-size:20px;margin-right:2px;opacity:.8}
.cliff-next-hook::after{content:' \201D';color:var(--pri);font-family:'Syne',sans-serif;font-size:20px;opacity:.8}

.cliff-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ══ PERFECT OVERLAY ══ */
.overlay-perfect{
  position:fixed;inset:0;z-index:1000;
  background:rgba(15,16,18,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:.25s;
}
.overlay-perfect.show{opacity:1;pointer-events:auto}
.overlay-perfect-card{
  background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-xl);
  padding:36px 40px;max-width:440px;width:100%;text-align:center;
  box-shadow:var(--sh3);transform:scale(.92);transition:.3s cubic-bezier(.22,.68,0,1.2);
  position:relative;overflow:hidden;
}
.overlay-perfect.show .overlay-perfect-card{transform:scale(1)}
.overlay-perfect-card::before{content:'';position:absolute;top:-2px;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pri),var(--ok))}
.overlay-perfect-big{font-family:'Syne',sans-serif;font-weight:800;font-size:46px;letter-spacing:-1.5px;line-height:1;color:var(--ok-ink);margin-bottom:10px}
.overlay-perfect-sub{font-size:13px;color:var(--mu);margin-bottom:20px}
.overlay-perfect-insight{padding:16px;background:var(--pri-bg);border:1px solid var(--pri-br);border-radius:var(--r-md);font-size:13px;line-height:1.55;color:var(--tx2);text-align:left}
.overlay-perfect-insight b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--pri-ink);margin-bottom:6px;font-weight:700}
.overlay-perfect-btn{margin-top:22px;width:100%;padding:13px;background:var(--tx);color:var(--s0);border-radius:var(--r-md);font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.overlay-perfect-btn:hover{background:#000}

.confetti{position:absolute;width:8px;height:12px;pointer-events:none;animation:confettiFall 1.4s cubic-bezier(.22,.68,0,1.2) forwards;border-radius:2px}
@keyframes confettiFall{
  0%{opacity:0;transform:translateY(-20px) rotate(0)}
  20%{opacity:1}
  100%{opacity:0;transform:translateY(180px) rotate(720deg)}
}

/* ══ TOAST ══ */
#toasts{position:fixed;bottom:24px;right:24px;z-index:900;display:flex;flex-direction:column;gap:10px;max-width:380px}
.toast{
  padding:13px 16px;background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r-md);
  box-shadow:var(--sh3);font-size:13px;color:var(--tx);display:flex;align-items:center;gap:10px;
  animation:toastIn .3s cubic-bezier(.22,.68,0,1.2);min-width:260px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(100%)}}
.toast svg{width:16px;height:16px;fill:none;stroke-width:2.2;flex-shrink:0}
.toast b{font-family:'Syne',sans-serif;font-weight:700;margin-right:4px}
.toast.success{border-color:var(--ok-br)}.toast.success svg{stroke:var(--ok-ink)}
.toast.xp{border-color:var(--pri-br);background:linear-gradient(135deg,var(--s0),var(--pri-bg))}.toast.xp svg{stroke:none;fill:var(--pri-ink)}
.toast.info svg{stroke:var(--info-ink)}

/* Responsive */
@media(max-width:720px){
  .topbar{padding:0 14px;gap:8px}
  .tb-crumb,.tb-sep{display:none}
  .wrap,.wrap-wide,.wrap-narrow{padding:20px 16px 80px}
  .home-hero h1{font-size:32px}
  .chap-card-inner{grid-template-columns:auto 1fr;gap:14px;padding:18px}
  .chap-meta{display:none}
  .chapter-title{font-size:28px}
  .chapter-big-num{font-size:54px}
  .mod-item{padding:14px;grid-template-columns:42px 1fr;gap:14px}
  .mod-meta{display:none}
  .continue-card{grid-template-columns:1fr;text-align:left}
  .continue-title{font-size:22px}
  .lesson,.ex-card{padding:24px 22px}
  .lesson h2{font-size:24px}
  .ex-prompt{font-size:18px}
  .ex-tf-btn{padding:22px;font-size:17px}
  .ex-match,.ex-classify{grid-template-columns:1fr}
  .cliff-title{font-size:32px}
  .cliff-rewards{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .cliff-reward{padding:12px 8px}
  .cliff-reward-val{font-size:20px}
  .promise{grid-template-columns:1fr;gap:16px;padding:22px}
  .promise-stat{text-align:left}
}

/* ═══ ACADÉMIE — PREMIUM ANIMATIONS ═══ */

/* Topbar entrance */
.topbar{animation:topIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes topIn{from{transform:translateY(-56px);opacity:0}to{transform:none;opacity:1}}

/* View transition enhanced */
.view.active{animation:viewSlide .45s cubic-bezier(.16,1,.3,1)}
@keyframes viewSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Hero title gradient */
.home-hero h1{background:linear-gradient(120deg,var(--tx) 0%,var(--pri-ink) 45%,var(--ok-ink) 80%,var(--tx) 100%);background-size:280%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:heroGrad 9s ease-in-out infinite}
@keyframes heroGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Chapter cards — staggered entrance */
.chap-card{opacity:0;transform:translateY(16px) scale(.97);transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1),border-color .2s,box-shadow .2s}
.chap-card.visible{opacity:1;transform:none}
.chap-card:not(.locked):hover{transform:translateY(-3px) scale(1.005);box-shadow:var(--sh3)}

/* Chapter num bounce on hover */
.chap-num{transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s}
.chap-card:not(.locked):hover .chap-num{transform:scale(1.1) rotate(-3deg)}

/* Chapter arrow spring */
.chap-arrow{transition:.25s cubic-bezier(.34,1.56,.64,1)}
.chap-card:not(.locked):hover .chap-arrow{transform:translateX(4px) scale(1.1)}

/* Module items stagger */
.mod-item{opacity:0;transform:translateX(-12px);transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1)}
.mod-item.visible{opacity:1;transform:none}
.mod-item:not(.locked):hover{transform:translateX(6px) !important;box-shadow:var(--sh2)}

/* Module num bounce */
.mod-num{transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s}
.mod-item:not(.locked):hover .mod-num{transform:scale(1.08)}

/* Progress fill shimmer */
@keyframes progShimmer{0%,100%{box-shadow:0 0 0 0 var(--pri-br)}50%{box-shadow:0 0 12px 2px var(--pri-br)}}
.chap-prog-fill{animation:progShimmer 2.5s ease-in-out infinite}
.tb-progress-fill{animation:progShimmer 2.5s ease-in-out infinite}

/* Continue card shine */
.continue-card{position:relative;overflow:hidden}
.continue-card::after{content:'';position:absolute;top:0;left:-150%;width:80%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.1),transparent);transform:skewX(-20deg);pointer-events:none}
.continue-card:hover::after{left:180%;transition:left .6s ease}
.continue-btn{transition:.2s cubic-bezier(.16,1,.3,1)}
.continue-btn:hover{transform:translateX(4px) scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,.2)}

/* Lesson slide-in */
.lesson{animation:lessonIn .45s cubic-bezier(.16,1,.3,1)}
@keyframes lessonIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* Ex card animation */
.ex-card{animation:lessonIn .45s cubic-bezier(.16,1,.3,1)}

/* XP chips topbar pop */
.tb-xp,.tb-lives,.tb-streak{transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.tb-xp:hover,.tb-lives:hover,.tb-streak:hover{transform:scale(1.05)}

/* Promise card accent bar gradient shift */
.promise::before,.chapter-promise{border-color:transparent;border-left-color:var(--pri)}
.promise::before{background:linear-gradient(180deg,var(--pri),var(--ok));background-size:100% 200%;animation:barShift 3s ease-in-out infinite alternate}
@keyframes barShift{from{background-position:0 0}to{background-position:0 100%}}

/* Kicker dot pulse */
.continue-kicker::before{animation:kickPulse 2s ease-in-out infinite}
@keyframes kickPulse{0%,100%{box-shadow:0 0 0 0 var(--pri-br)}50%{box-shadow:0 0 0 8px rgba(168,192,48,0),0 0 14px var(--pri-br)}}

/* Button premium */
.btn-primary{position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;top:0;left:-115%;width:80%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-25deg)}
.btn-primary:hover::before{left:130%;transition:left .5s ease}
.btn-primary:hover{transform:translateY(-2px) !important;box-shadow:var(--sh2) !important}

/* Cursor glow */
.cursor-acad{position:fixed;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(168,192,48,.03) 0%,transparent 60%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .2s linear,top .2s linear}
</style>
</head>
