<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Novalem — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#faf9f5;--s1:#ffffff;--s2:#f4f2ec;--s3:#ebe9e1;--s4:#dcd9cf;
  --bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.09);--bd3:rgba(0,0,0,.14);
  --tx:#18181a;--tx2:#3a3a34;--mu:#6f6f68;--mu2:#9a9a92;--mu3:#c2c2ba;
  --ac:#c8e040;--ac-ink:#5d7a14;--ac2:rgba(200,224,64,.20);--ac3:rgba(200,224,64,.45);--ac4:rgba(200,224,64,.65);
  --gn:#2dd4a0;--gn-ink:#0e8a60;--gn2:rgba(45,212,160,.12);--gn3:rgba(45,212,160,.32);
  --bl:#5b8def;--bl-ink:#2a5cc4;--bl2:rgba(91,141,239,.10);--bl3:rgba(91,141,239,.28);
  --or:#e8983c;--or-ink:#b06a10;--or2:rgba(232,152,60,.12);--or3:rgba(232,152,60,.30);
  --rd:#e05252;--rd-ink:#b22828;--rd2:rgba(224,82,82,.10);--rd3:rgba(224,82,82,.28);
  --pr:#a36bea;--pr-ink:#6e3ac0;--pr2:rgba(163,107,234,.10);--pr3:rgba(163,107,234,.28);
  --gd:#c89618;--gd-ink:#9a7010;--gd2:rgba(200,150,24,.12);--gd3:rgba(200,150,24,.32);
  --glass:rgba(255,255,255,.86);
  --sh1:0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 14px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --sh3:0 12px 32px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:'Instrument Sans','DM Mono',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;position:relative}
::selection{background:rgba(200,224,64,.35);color:var(--tx)}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grad-1{position:fixed;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(200,224,64,.10) 0%,transparent 55%);top:-300px;right:-200px;pointer-events:none;z-index:0;filter:blur(60px)}
.bg-grad-2{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,.06) 0%,transparent 55%);bottom:-200px;left:-100px;pointer-events:none;z-index:0;filter:blur(60px)}

.topbar{position:sticky;top:0;z-index:200;background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--bd);padding:0 28px;height:54px;display:flex;align-items:center;gap:12px}
.tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx)}
.tb-logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--ac),#a8c030);display:flex;align-items:center;justify-content:center}
.tb-logo-icon svg{width:16px;height:16px}
.tb-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px}
.tb-logo-text span{color:var(--ac-ink)}
.tb-divider{width:1px;height:20px;background:var(--bd2);margin:0 4px}
.tb-env{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:99px;font-weight:600;border:1px solid}
.tb-env.scout{background:var(--ac2);color:var(--ac-ink);border-color:var(--ac3)}
.tb-env.superviseur{background:var(--rd2);color:var(--rd-ink);border-color:var(--rd3)}
.tb-spacer{flex:1}
.tb-cmd{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--mu)}
.tb-cmd:hover{border-color:var(--bd2);background:var(--s3);color:var(--tx2)}
.tb-cmd kbd{font-size:9px;padding:1px 5px;background:var(--s1);border:1px solid var(--bd2);border-radius:3px;font-family:'DM Mono',monospace;color:var(--mu)}
.tb-cmd svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;opacity:.5}
.tb-clock{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);letter-spacing:.04em}
.tb-user{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 5px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:.15s}
.tb-user:hover{border-color:var(--bd2);background:var(--s3)}
.tb-avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;flex-shrink:0;position:relative}
.tb-avatar::after{content:'';position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:var(--gn);border:2px solid var(--s2)}
.tb-uinfo{line-height:1.3}
.tb-uname{font-size:11px;font-weight:600;color:var(--tx)}
.tb-urole{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.tb-logout{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--bd);cursor:pointer;transition:.15s}
.tb-logout svg{width:15px;height:15px;stroke:var(--mu);fill:none;stroke-width:1.8}
.tb-logout:hover{border-color:rgba(224,82,82,.3);background:var(--rd2)}
.tb-logout:hover svg{stroke:var(--rd-ink)}

.main{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:36px 32px 64px}

.hero{margin-bottom:28px}
.hero-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hero-date::before{content:'';width:18px;height:1px;background:var(--mu2)}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:44px;letter-spacing:-1.8px;line-height:1.05;margin-bottom:12px}
.hero-title .accent{color:var(--ac-ink)}
.hero-sub{font-size:14px;color:var(--tx2);line-height:1.65;max-width:640px}

.scout-card{display:grid;grid-template-columns:180px 1fr auto;gap:28px;align-items:center;padding:28px 32px;margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#fafaf5 100%);border:1px solid var(--bd2);border-radius:16px;position:relative;overflow:hidden;text-decoration:none;color:inherit;transition:.3s cubic-bezier(.22,.68,0,1.2);box-shadow:var(--sh1)}
.scout-card:hover{border-color:var(--bd3);transform:translateY(-2px);box-shadow:var(--sh2)}
.scout-card::before{content:'';position:absolute;top:0;right:0;width:420px;height:100%;background:radial-gradient(circle at 80% 50%,var(--ac2),transparent 60%);pointer-events:none}
